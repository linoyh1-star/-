                  </div>
                );
              })}
              {/* Results summary when complete */}
              {fmkAllAssigned && (() => {
                const letterColors = { F: PB.orange, M: PB.pink, K: PB.ink };
                const inv = {};
                Object.entries(currentFmk).forEach(([nameIdx, letter]) => { inv[letter] = prompt[nameIdx]; });
                return (
                  <div style={{
                    marginTop: big ? 14 : 10,
                    padding: big ? "clamp(14px,1.8vw,22px)" : "12px 13px",
                    background: big ? "rgba(0,0,0,0.85)" : "#161616",
                    borderRadius: big ? 16 : 12,
                    border: big ? "1.5px solid rgba(255,255,255,0.25)" : "none",
                  }}>
                    <div style={{
                      fontSize: big ? "clamp(10.5px,1.2vw,16px)" : 10, fontWeight: 800,
                      color: "rgba(255,255,255,0.55)", letterSpacing: 1.6, textTransform: "uppercase",
                      marginBottom: big ? 10 : 8, textAlign: "center",
                    }}>✓ הבחירה שלך</div>
                    <div style={{ display: "flex", flexDirection: "column", gap: big ? 8 : 6 }}>
                      {["F", "M", "K"].map(letter => {
                        const lc = letterColors[letter];
                        return (
                          <div key={letter} style={{
                            display: "flex", alignItems: "center", gap: big ? 12 : 9,
                            padding: big ? "clamp(8px,1.2vw,14px) clamp(10px,1.6vw,18px)" : "7px 10px",
                            background: lc.main, color: lc.on,
                            borderRadius: big ? 10 : 8,
                          }}>
                            <span style={{
                              fontSize: big ? "clamp(15px,1.8vw,22px)" : 13, fontWeight: 800,
                              background: "rgba(255,255,255,0.22)", color: lc.on,
                              padding: big ? "3px 9px" : "2px 7px", borderRadius: 5,
                            }}>{letter}</span>
                            <span style={{ flex: 1, fontSize: big ? "clamp(16px,2vw,26px)" : 14.5, fontWeight: 800, letterSpacing: -0.2 }}>{inv[letter] || ""}</span>
                          </div>
                        );
                      })}
                    </div>
                    {/* Everyone's results — simulated tally across the group */}
                    {fmkTally && (
                      <div style={{ marginTop: big ? 14 : 10, paddingTop: big ? 12 : 9,
                        borderTop: "1px solid rgba(255,255,255,0.15)" }}>
                        <div style={{
                          fontSize: big ? "clamp(10.5px,1.2vw,16px)" : 10, fontWeight: 800,
                          color: "rgba(255,255,255,0.55)", letterSpacing: 1.6, textTransform: "uppercase",
                          marginBottom: big ? 10 : 8, textAlign: "center",
                        }}>איך הבנות הצביעו</div>
                        <div style={{ display: "flex", flexDirection: "column", gap: big ? 6 : 5 }}>
                          {prompt.map((nm, idx) => {
                            const tally = fmkTally[idx];
                            const total = tally.F + tally.M + tally.K;
                            return (
                              <div key={idx} style={{
                                padding: big ? "6px 10px" : "5px 8px",
                                background: "rgba(255,255,255,0.08)",
                                borderRadius: big ? 8 : 6,
                                display: "flex", alignItems: "center", gap: big ? 10 : 7,
                              }}>
                                <span style={{ fontSize: big ? "clamp(13px,1.4vw,18px)" : 12, fontWeight: 700, color: "#fff", minWidth: big ? 70 : 50 }}>{nm}</span>
                                <div style={{ flex: 1, display: "flex", gap: big ? 5 : 3 }}>
                                  {["F", "M", "K"].map(L => {
                                    const c = letterColors[L];
                                    const pct = total ? (tally[L] / total) * 100 : 0;
                                    return (
                                      <div key={L} style={{
                                        flex: pct || 0.001,
                                        background: c.main, color: c.on,
                                        padding: big ? "3px 6px" : "2px 5px",
                                        borderRadius: big ? 5 : 4,
                                        fontSize: big ? "clamp(10.5px,1.1vw,14px)" : 10,
                                        fontWeight: 800, textAlign: "center",
                                        opacity: tally[L] ? 1 : 0.15,
                                        whiteSpace: "nowrap", overflow: "hidden",
                                      }}>{tally[L] ? `${L} · ${tally[L]}` : L}</div>
                                    );
                                  })}
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    )}
                  </div>
                );
              })()}
            </div>
          ) : (
            <div style={{
              fontSize: big ? (prompt.length > 40 ? "clamp(32px,5vw,68px)" : "clamp(40px,6vw,84px)") : (prompt.length > 40 ? 22 : 25),
              fontWeight: 800, lineHeight: 1.25,
              color: big ? T.onAccent : T.ink, textAlign: "center", textWrap: "balance", letterSpacing: -0.5,
            }}>{prompt}</div>
          )}
          {/* X badge removed per feedback — the deck label already signals 'אף פעם לא' */}
          {/* Groomq: reveal answer (if loaded) + ✓/✗ marking */}
          {isGroomq && (
            <div style={{ width: "100%", display: "flex", flexDirection: "column", gap: big ? 12 : 8 }}>
              {/* If groom answer is loaded and revealed, show it */}
              {groomAnswerForPrompt && revealed[i] && (
                <div style={{
                  width: "100%",
                  padding: big ? "clamp(16px,2vw,28px)" : "12px 14px",
                  background: big ? "rgba(255,255,255,0.95)" : PB.orange.soft,
                  color: PB.orange.deep,
                  border: big ? "none" : `1px solid ${PB.orange.main}55`,
                  borderRadius: big ? 18 : 12,
                  animation: "cardIn 280ms ease-out",
                }}>
                  <div style={{ fontSize: big ? "clamp(11px,1.2vw,16px)" : 10.5, fontWeight: 800,
                    letterSpacing: 1.2, textTransform: "uppercase", opacity: 0.75 }}>תשובת החתן</div>
                  <div style={{ fontSize: big ? "clamp(22px,3vw,42px)" : 16, fontWeight: 700,
                    lineHeight: 1.35, marginTop: big ? 6 : 4, color: big ? "#1A1A1A" : PB.orange.deep }}>
                    {groomAnswerForPrompt}
                  </div>
                </div>
              )}

              {/* Reveal button if answers loaded and not yet revealed */}
              {groomAnswerForPrompt && !revealed[i] && (
                <button onClick={() => setRevealed({ ...revealed, [i]: true })} style={{
                  padding: big ? "clamp(12px,1.4vw,20px) clamp(24px,3vw,40px)" : "10px 20px",
                  background: big ? "rgba(255,255,255,0.18)" : PB.orange.main,
                  color: "#fff",
                  border: big ? "1.5px solid rgba(255,255,255,0.4)" : "none",
                  borderRadius: 999,
                  fontSize: big ? "clamp(13px,1.5vw,20px)" : 13, fontWeight: 800, cursor: "pointer", fontFamily: T.font,
                  display: "flex", alignItems: "center", justifyContent: "center", gap: 8, alignSelf: "center",
                }}>
                  <Icon name="check" size={big ? 18 : 14} color="#fff" w={2}/>
                  חשפי את תשובת החתן
                </button>
              )}

              {/* ✓/✗ marking — ALWAYS available (works with or without groom answers) */}
              {groomMarks[i] ? (
                <div style={{
                  padding: big ? "10px 16px" : "8px 14px",
                  background: groomMarks[i] === "right" ? T.ok : PB.pink.main,
                  color: groomMarks[i] === "right" ? "#fff" : PB.pink.on,
                  borderRadius: 999, textAlign: "center",
                  fontSize: big ? "clamp(13px,1.4vw,18px)" : 13, fontWeight: 800,
                }}>
                  {groomMarks[i] === "right" ? "✓ נקודה לכלה" : "✗ פספסה — לגימה לכלה"}
                </div>
              ) : (
                <div style={{ display: "flex", gap: big ? 12 : 8 }}>
                  <button onClick={() => {
                    const next = { ...groomMarks, [i]: "wrong" };
                    setGroomMarks(next);
                    if (i + 1 >= total) setGroomSummary(true);
                  }} style={{
                    flex: 1,
                    padding: big ? "clamp(12px,1.4vw,18px)" : "11px 14px",
                    background: big ? "rgba(255,255,255,0.18)" : PB.pink.main,
                    color: big ? "#fff" : PB.pink.on,
                    border: big ? "1.5px solid rgba(255,255,255,0.4)" : "none",
                    borderRadius: T.radius,
                    fontSize: big ? "clamp(13px,1.4vw,18px)" : 13.5, fontWeight: 800, cursor: "pointer", fontFamily: T.font,
                  }}>✗ פספסה</button>
                  <button onClick={() => {
                    const next = { ...groomMarks, [i]: "right" };
                    setGroomMarks(next);
                    if (i + 1 >= total) setGroomSummary(true);
                  }} style={{
                    flex: 1,
                    padding: big ? "clamp(12px,1.4vw,18px)" : "11px 14px",
                    background: T.ok, color: "#fff",
                    border: "none", borderRadius: T.radius,
                    fontSize: big ? "clamp(13px,1.4vw,18px)" : 13.5, fontWeight: 800, cursor: "pointer", fontFamily: T.font,
                  }}>✓ צדקה!</button>
                </div>
              )}
            </div>
          )}
        </div>
      </div>

      <div style={{ display: "flex", gap: big ? 16 : 9, justifyContent: "center", flexShrink: 0 }}>
        <button onClick={prev} disabled={atStart} style={{
          padding: big ? "clamp(12px,1.6vw,18px) clamp(20px,2.4vw,32px)" : "14px",
          minWidth: big ? "auto" : 54, flex: big ? "none" : "0 0 auto",
          background: atStart ? (big ? "rgba(255,255,255,0.10)" : T.surfaceAlt) : (big ? "rgba(255,255,255,0.12)" : T.surface),
          color: big ? "#fff" : T.ink,
          border: big ? "1px solid rgba(255,255,255,0.18)" : T.border,
          borderRadius: T.radius, fontSize: big ? "clamp(16px,2vw,24px)" : 15, fontWeight: 700,
          boxShadow: big || atStart ? "none" : T.shadowSm,
          cursor: atStart ? "not-allowed" : "pointer", opacity: atStart ? 0.45 : 1, fontFamily: T.font,
          display: "flex", alignItems: "center", justifyContent: "center",
        }}>{big ? "הקודם" : <Icon name="chevR" size={16} color={T.ink} w={1.6}/>}</button>
        <button onClick={next} disabled={atEnd} style={{
          flex: big ? "none" : 1,
          padding: big ? "clamp(12px,1.6vw,18px) clamp(36px,4vw,60px)" : "14px",
          background: atEnd ? (big ? "rgba(255,255,255,0.10)" : T.surfaceAlt) : T.surfaceInk,
          color: atEnd ? (big ? "rgba(255,255,255,0.6)" : T.inkSoft) : "#fff",
          border: big ? (atEnd ? "1px solid rgba(255,255,255,0.18)" : "none") : (atEnd ? T.border : "none"),
          borderRadius: T.radius, fontSize: big ? "clamp(16px,2vw,24px)" : 15, fontWeight: 700,
          boxShadow: big || atEnd ? "none" : T.shadowSm,
          cursor: atEnd ? "not-allowed" : "pointer", opacity: atEnd ? 0.7 : 1, fontFamily: T.font,
        }}>{atEnd ? "סיימנו" : "הבא"}</button>
      </div>
    </>
  );

  return (
    <>
      <StatusBar T={T}/>
      <div style={{ position: "absolute", inset: 0, padding: "48px 22px 24px", display: "flex", flexDirection: "column" }}>
        <GameTopBar T={T} onBack={onBack} onProject={() => setProjecting(true)} title={game.t}/>
        {body(false)}
      </div>
      <HomeBar/>
      {projecting && (
        <ProjectionShell T={T} headline={deck.headline} onClose={() => setProjecting(false)}>
          {body(true)}
        </ProjectionShell>
      )}
    </>
  );
}

/* ──────────────────────────────────────────────────────────────
   APP SHELL — routing + per-screen skin
   ────────────────────────────────────────────────────────────── */
function App() {
  // Default landing is the login screen now; the demo "welcome" code screen is still
  // reachable via ?demo=1 for showcasing without paying.
  const [screen, setScreen] = React.useState("login");
  const [name, setName] = React.useState("");
  const [event, setEvent] = React.useState(null);
  const [eventName, setEventName] = React.useState("");
  const [gameId, setGameId] = React.useState("lipread");
  const [groomData, setGroomData] = React.useState(null);
  const [toast, setToast] = React.useState(null);
  // pendingUser still used by the legacy SMS path; new login flow populates authSession instead.
  const [pendingUser, setPendingUser] = React.useState(null);
  const [pendingLoading, setPendingLoading] = React.useState(false);
  const [authSession, setAuthSession] = React.useState(loadAuthSession);
  const [prefillUsername, setPrefillUsername] = React.useState("");
  const [participantCode, setParticipantCode] = React.useState("");

  // hash + URL detection — runs ONCE on mount before anything else
  React.useEffect(() => {
    const hash = window.location.hash.slice(1);
    if (hash.startsWith("groom=")) {
      const data = b64Decode(hash.slice(6));
      if (data && Array.isArray(data.q)) {
        setGroomData(data);
        setScreen("groomMode");
        return; // skip localStorage restore — groom uses a fresh session
      }
    } else if (hash.startsWith("answers=")) {
      const data = b64Decode(hash.slice(8));
      if (data && Array.isArray(data.a)) {
        saveGroomAnswers(data);
        setToast({ msg: "✓ תשובות החתן נטענו", type: "ok" });
        // clean URL so refresh doesn't re-trigger
        try { history.replaceState(null, "", window.location.pathname); } catch (e) {}
      }
    }

    const params = new URLSearchParams(window.location.search);

    // ?join=CODE — guest joins a multiplayer game session. No login required;
    // this lives in its own little universe and doesn't touch the host's state.
    const joinCode = params.get("join");
    if (joinCode) {
      setParticipantCode(joinCode.toUpperCase());
      setScreen("participant");
      try { history.replaceState(null, "", window.location.pathname); } catch (e) {}
      return;
    }

    // Demo mode — old code/welcome screen for showcasing without payment
    if (params.get("demo") === "1") {
      setScreen("welcome");
      try { history.replaceState(null, "", window.location.pathname); } catch (e) {}
      return;
    }

    // ?u=username — prefill the login form (still requires typing the password from email)
    const urlUser = params.get("u");
    if (urlUser) {
      setPrefillUsername(urlUser);
      try { history.replaceState(null, "", window.location.pathname); } catch (e) {}
    }

    // If we already have a valid auth session in localStorage, restore the user's screen
    const existingAuth = loadAuthSession();
    if (existingAuth) {
      if (existingAuth.fullName) {
        const firstName = existingAuth.fullName.split(" ")[0];
        if (firstName && !name) setName(firstName);
      }
      // try to restore the last in-app screen too
      try {
        const raw = localStorage.getItem("chogegot_state");
        if (raw) {
          const s = JSON.parse(raw);
          if (s.screen && s.screen !== "welcome" && s.screen !== "smsVerify" && s.screen !== "login") setScreen(s.screen);
          else setScreen("username"); // signed in but never finished onboarding
          if (s.name) setName(s.name);
          if (s.event) setEvent(s.event);
          if (s.eventName) setEventName(s.eventName);
          if (s.gameId) setGameId(s.gameId);
        } else {
          setScreen("username");
        }
      } catch (e) { setScreen("username"); }
      return;
    }

    // No auth yet — stay on the default login screen.
    // We do NOT pre-load other localStorage fields here so a new buyer starts clean.
  }, []);

  // auto-dismiss toast
  React.useEffect(() => {
    if (!toast) return;
    const t = setTimeout(() => setToast(null), 3800);
    return () => clearTimeout(t);
  }, [toast]);

  // Firebase Auth state — UID for Firestore sync
  const [uid, setUid] = React.useState(null);
  React.useEffect(() => {
    if (!window.FB) return;
    const off = fbOnAuthChange(async (user) => {
      setUid(user?.uid || null);
      // The cloud screen-restore used to live here, but since we moved to Make.com auth it
      // was hijacking flows like groom mode for users that still had a stale Firebase
      // session from earlier SMS testing. Keep the uid for any future Firestore sync, but
      // never let an old Firebase session override the current screen.
    });
    return () => off && off();
  }, []);

  // Persist to localStorage (always) + Firestore (cross-browser, debounced)
  React.useEffect(() => {
    // Gating screens (login / welcome / smsVerify) shouldn't be restored on refresh — those
    // are entry doors that need a fresh auth/URL context, not the screen the user was on.
    const persistableScreen = (screen === "welcome" || screen === "smsVerify" || screen === "login") ? null : screen;
    try { localStorage.setItem("chogegot_state", JSON.stringify({ screen: persistableScreen, name, event, eventName, gameId })); } catch (e) {}

    const username = authSession?.username;
    if (!username) return;
    const t = setTimeout(() => {
      // Capture the per-feature data from localStorage so a re-login from another
      // browser still gets the checklist, budget, groom answers etc.
      let checklistItems, budgetExpenses, budgetParticipants, groomAnswers;
      try { checklistItems = JSON.parse(localStorage.getItem("chogegot_checklist_items") || "null"); } catch (e) {}
      try { budgetExpenses = JSON.parse(localStorage.getItem("chogegot_budget_expenses") || "null"); } catch (e) {}
      try { budgetParticipants = JSON.parse(localStorage.getItem("chogegot_budget_participants") || "null"); } catch (e) {}
      try { groomAnswers = JSON.parse(localStorage.getItem(GROOM_STORAGE_KEY) || "null"); } catch (e) {}
      fbSaveAppState(username, {
        screen: persistableScreen, name, event, eventName, gameId,
        checklistItems, budgetExpenses, budgetParticipants, groomAnswers,
      });
    }, 1500); // debounce 1.5s
    return () => clearTimeout(t);
  }, [screen, name, event, eventName, gameId, authSession]);

  const nav = (to, params = {}) => {
    if (params.gameId) setGameId(params.gameId);
    setScreen(to);
  };
  const reset = async () => {
    setScreen("login"); setName(""); setEvent(null); setEventName("");
    setAuthSession(null); setPendingUser(null);
    clearAuthSession();
    localStorage.removeItem("chogegot_state");
    try { await fbSignOut(); } catch (e) {}
  };

  // pick skin
  const skinName = SCREEN_SKIN[screen] || "orange";
  const T = skin(skinName);

  let content;
  if (screen === "login") content = <ScreenLogin T={T} prefillUsername={prefillUsername} onSuccess={async (res) => {
    const fresh = loadAuthSession();
    setAuthSession(fresh);

    // Try to pull this user's saved app state from Firestore (cross-browser sync).
    // Falls back silently to the per-payment defaults if there's no cloud doc yet.
    const cloud = fresh?.username ? await fbLoadAppState(fresh.username) : null;

    if (cloud?.name) setName(cloud.name);
    else if (res?.fullName) {
      const first = res.fullName.split(" ")[0];
      if (first) setName(first);
    }

    if (cloud?.event) setEvent(cloud.event);
    else if (res?.eventType) setEvent(res.eventType);

    if (cloud?.eventName) setEventName(cloud.eventName);
    if (cloud?.gameId) setGameId(cloud.gameId);

    // Per-feature state lives in its own localStorage keys — drop the cloud copy in
    // so the components hydrate from it on next mount.
    try {
      if (Array.isArray(cloud?.checklistItems)) localStorage.setItem("chogegot_checklist_items", JSON.stringify(cloud.checklistItems));
      if (Array.isArray(cloud?.budgetExpenses)) localStorage.setItem("chogegot_budget_expenses", JSON.stringify(cloud.budgetExpenses));
      if (Array.isArray(cloud?.budgetParticipants)) localStorage.setItem("chogegot_budget_participants", JSON.stringify(cloud.budgetParticipants));
      if (cloud?.groomAnswers !== undefined && cloud.groomAnswers) localStorage.setItem(GROOM_STORAGE_KEY, JSON.stringify(cloud.groomAnswers));
    } catch (e) {}

    // Returning user with a saved screen jumps straight back to it (skipping
    // username again). New user goes through the normal onboarding.
    if (cloud?.screen && cloud.screen !== "welcome" && cloud.screen !== "smsVerify" && cloud.screen !== "login") {
      setScreen(cloud.screen);
    } else {
      setScreen("username");
    }
  }}/>;
  // Demo mode: welcome screen used to chain into SMS verify, which now requires Firebase
  // Blaze. We bypass it and send the demo straight to the username step instead.
  else if (screen === "welcome") content = <ScreenWelcome T={T} onNext={() => setScreen("username")} pendingUser={pendingUser} pendingLoading={pendingLoading}/>;
  else if (screen === "smsVerify") content = <ScreenSmsVerify T={T} onNext={() => setScreen("username")} onBack={() => setScreen("welcome")} pendingUser={pendingUser}/>;
  else if (screen === "username") content = <ScreenUsername T={T}
    onNext={() => setScreen(event ? "nameEvent" : "event")}
    onBack={() => setScreen("login")} name={name} setName={setName}/>;
  else if (screen === "event") content = <ScreenEventPicker T={T} onNext={() => setScreen("nameEvent")} onBack={() => setScreen("username")} selected={event} setSelected={setEvent}/>;
  else if (screen === "nameEvent") content = <ScreenNameEvent T={T} eventId={event} eventName={eventName} setEventName={setEventName}
    onNext={() => setScreen(event === "bach" ? "slideshow" : "comingSoon")} onBack={() => setScreen("event")}/>;
  else if (screen === "slideshow") content = <ScreenSlideshow T={T} slides={BACH_SLIDES} eventName={eventName} onDone={() => setScreen("bachHome")}/>;
  else if (screen === "bachHome") content = <ScreenBachHome T={T} onNav={nav} user={{ name }} eventName={eventName}/>;
  else if (screen === "qrjoin") content = <ScreenQRJoin T={T} onBack={() => setScreen("bachHome")}/>;
  else if (screen === "checklist") content = <ScreenChecklist T={T} onBack={() => setScreen("bachHome")}/>;
  else if (screen === "playlist") content = <ScreenPlaylist T={T} onBack={() => setScreen("bachHome")}/>;
  else if (screen === "budget") content = <ScreenBudget T={T} onBack={() => setScreen("bachHome")}/>;
  else if (screen === "games") content = <ScreenGamesHub T={T} onNav={nav} onBack={() => setScreen("bachHome")}/>;
  else if (screen === "game") {
    const g = GAMES.find(x => x.id === gameId) || GAMES[0];
    const back = () => setScreen("games");
    if (g.type === "timer") content = <TimerGame T={T} game={g} onBack={back}/>;
    else if (g.type === "quiz") content = <QuizGame T={T} game={g} onBack={back}/>;
    else content = <CardGame T={T} game={g} onBack={back}/>;
  }
  else if (screen === "comingSoon") content = <ScreenComingSoon T={T} eventId={event} onBack={() => setScreen("event")}/>;
  else if (screen === "helpCenter") content = <ScreenHelpCenter T={T} onBack={() => setScreen("bachHome")}/>;
  else if (screen === "groomMode") content = <ScreenGroomMode T={T} data={groomData} onSent={() => {}}/>;
  else if (screen === "participant") content = <ScreenParticipant T={T} code={participantCode}
    onLeave={() => { setParticipantCode(""); setScreen("login"); }}/>;

  return (
    <>
      <PhoneShell T={T}>
        <div key={screen} style={{ position: "absolute", inset: 0, animation: "screenIn 280ms ease-out" }}>
          {content}
        </div>
      </PhoneShell>
      {/* Toast notification (groom answers loaded, etc.) */}
      {toast && (
        <div style={{
          position: "fixed", top: 28, left: "50%", transform: "translateX(-50%)",
          zIndex: 1100,
          padding: "12px 22px",
          background: "#1A1A1A", color: "#fff",
          border: "none", borderRadius: 999,
          fontSize: 13.5, fontWeight: 700,
          boxShadow: "0 12px 32px -10px rgba(20,18,16,0.5)",
          fontFamily: '"Assistant", system-ui, sans-serif',
          animation: "screenIn 280ms ease-out",
        }}>{toast.msg}</div>
      )}

    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
