<script type="text/babel">
/* ──────────────────────────────────────────────────────────────
   URL HASH ENCODER — stateless data sharing between bride ↔ groom
   - #groom=... → contains the questionnaire (bride sends this)
   - #answers=... → contains groom's answers (groom sends back)
   Encoded as URL-safe base64 of UTF-8 JSON (handles Hebrew).
   ────────────────────────────────────────────────────────────── */
const b64Encode = (obj) =>
  btoa(unescape(encodeURIComponent(JSON.stringify(obj))))
    .replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
const b64Decode = (str) => {
  try {
    let s = str.replace(/-/g, "+").replace(/_/g, "/");
    while (s.length % 4) s += "=";
    return JSON.parse(decodeURIComponent(escape(atob(s))));
  } catch (e) { return null; }
};
const baseUrl = () => window.location.href.split("#")[0].split("?")[0];
const buildGroomLink   = (data) => `${baseUrl()}#groom=${b64Encode(data)}`;
const buildAnswersLink = (data) => `${baseUrl()}#answers=${b64Encode(data)}`;
const openWhatsApp = (text) => {
  const url = `https://wa.me/?text=${encodeURIComponent(text)}`;
  window.open(url, "_blank", "noopener");
};

const GROOM_STORAGE_KEY = "chogegot_groom_answers";
const saveGroomAnswers = (payload) => {
  try { localStorage.setItem(GROOM_STORAGE_KEY, JSON.stringify({ ...payload, receivedAt: Date.now() })); } catch (e) {}
};
const loadGroomAnswers = () => {
  try { const raw = localStorage.getItem(GROOM_STORAGE_KEY); return raw ? JSON.parse(raw) : null; }
  catch (e) { return null; }
};
const clearGroomAnswers = () => { try { localStorage.removeItem(GROOM_STORAGE_KEY); } catch (e) {} };

/* ──────────────────────────────────────────────────────────────
   PER-FEATURE PERSISTENCE — checklist items, budget expenses,
   budget participants. Each value lives under its own localStorage
   key so a refresh / re-login keeps the user's progress intact.
   ────────────────────────────────────────────────────────────── */
function usePersistedState(key, initialValue) {
  const [state, setState] = React.useState(() => {
    try {
      const raw = localStorage.getItem(key);
      if (raw && raw !== "null") return JSON.parse(raw);
    } catch (e) {}
    return typeof initialValue === "function" ? initialValue() : initialValue;
  });
  React.useEffect(() => {
    try { localStorage.setItem(key, JSON.stringify(state)); } catch (e) {}
  }, [key, state]);
  return [state, setState];
}

/* ──────────────────────────────────────────────────────────────
   AUTH (username + password via Make.com Data Store)

   Cheap alternative to Firebase Phone Auth: Make.com generates
   credentials at payment time, stores them in a Make Data Store, and
   the app authenticates by POSTing here. First-device-wins enforcement
   lives on Make's side (when a deviceId is already bound to a record,
   subsequent logins from a different deviceId are rejected).
   ────────────────────────────────────────────────────────────── */
// Make.com login validation scenario — receives {username, password, deviceId},
// looks the user up in the chogegot_users Data Store, returns success/error JSON.
const MAKE_LOGIN_URL = "https://hook.eu1.make.com/coi9bjj6dxny0g7j6edppcm7i2bpedjy";
const DEVICE_ID_KEY = "chogegot_device_id";
const AUTH_SESSION_KEY = "chogegot_auth_session";

const getOrCreateDeviceId = () => {
  try {
    let id = localStorage.getItem(DEVICE_ID_KEY);
    if (!id) {
      // Random 16-char ID — stable per browser/device until localStorage is cleared
      id = "dev_" + Array.from(crypto.getRandomValues(new Uint8Array(8)))
        .map(b => b.toString(16).padStart(2, "0")).join("");
      localStorage.setItem(DEVICE_ID_KEY, id);
    }
    return id;
  } catch (e) { return "dev_fallback"; }
};

const loadAuthSession = () => {
  try {
    const raw = localStorage.getItem(AUTH_SESSION_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch (e) { return null; }
};
const saveAuthSession = (data) => {
  try { localStorage.setItem(AUTH_SESSION_KEY, JSON.stringify(data)); } catch (e) {}
};
const clearAuthSession = () => {
  try { localStorage.removeItem(AUTH_SESSION_KEY); } catch (e) {}
};

// Make.com expected response shape:
//   success: { ok: true, fullName, phone, email, token }
//   wrong creds: { ok: false, error: "bad_credentials" }
//   different device already bound: { ok: false, error: "device_locked" }
const makeLoginRequest = async (username, password) => {
  const deviceId = getOrCreateDeviceId();
  const res = await fetch(MAKE_LOGIN_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ username: username.trim(), password: password.trim(), deviceId }),
  });
  const text = (await res.text() || "").trim();
  // Empty body with a 200 means none of the router branches matched in Make — almost always
  // because the username doesn't exist in the Data Store. Treat that as bad credentials.
  if (!text) return { ok: false, error: "bad_credentials", deviceId };
  let data; try { data = JSON.parse(text); } catch (e) { data = { ok: false, error: "bad_response", raw: text }; }
  return { ...data, deviceId };
};

/* ──────────────────────────────────────────────────────────────
   FIREBASE HELPERS — Auth (phone) + Firestore (user data)
   The `firebase` global is set up in <head> before React mounts.
   Kept around so we can switch back to phone auth later if desired.
   ────────────────────────────────────────────────────────────── */
const FB = window.FB; // { auth, db } — null if init failed

// reCAPTCHA verifier (invisible) — Firebase requires this for web phone auth.
let _recaptcha = null;
const ensureRecaptcha = () => {
  if (!FB || _recaptcha) return _recaptcha;
  try {
    _recaptcha = new firebase.auth.RecaptchaVerifier("recaptcha-container", {
      size: "invisible",
      callback: () => {},
      "expired-callback": () => { _recaptcha = null; },
    });
    return _recaptcha;
  } catch (e) {
    console.error("[Firebase] recaptcha error:", e);
    return null;
  }
};

const fbSendSMS = async (phoneE164) => {
  if (!FB) throw new Error("Firebase לא הותחל");
  const verifier = ensureRecaptcha();
  if (!verifier) throw new Error("reCAPTCHA לא הוטען");
  return FB.auth.signInWithPhoneNumber(phoneE164, verifier);
};

const fbCurrentUser = () => FB?.auth?.currentUser || null;
const fbOnAuthChange = (cb) => FB ? FB.auth.onAuthStateChanged(cb) : () => {};
const fbSignOut = () => FB ? FB.auth.signOut() : Promise.resolve();

// Firestore — store user data under /users/{uid}
const fbSaveUserData = async (uid, data) => {
  if (!FB || !uid) return;
  try {
    await FB.db.collection("users").doc(uid).set(data, { merge: true });
  } catch (e) { console.error("[FS] save failed:", e); }
};
const fbLoadUserData = async (uid) => {
  if (!FB || !uid) return null;
  try {
    const doc = await FB.db.collection("users").doc(uid).get();
    return doc.exists ? doc.data() : null;
  } catch (e) { console.error("[FS] load failed:", e); return null; }
};

// Cross-device app state — keyed by Make.com username. Saves the same shape as
// localStorage so a user can log in from a different browser (e.g. Gmail's in-app
// browser vs Safari) and pick up where she left off.
const APP_STATE_COLLECTION = "app_user_states";
const fbSaveAppState = async (username, payload) => {
  if (!FB || !username) return;
  try {
    await FB.db.collection(APP_STATE_COLLECTION).doc(username).set(
      { ...payload, lastSeen: Date.now() }, { merge: true }
    );
  } catch (e) { console.error("[FS] save app state failed:", e); }
};
const fbLoadAppState = async (username) => {
  if (!FB || !username) return null;
  try {
    const doc = await FB.db.collection(APP_STATE_COLLECTION).doc(username).get();
    return doc.exists ? doc.data() : null;
  } catch (e) { console.error("[FS] load app state failed:", e); return null; }
};

/* ──────────────────────────────────────────────────────────────
   MULTIPLAYER GAME SESSIONS — host + participants on different devices
   Doc shape under /game_sessions/{code}:
     hostUsername, gameId, state ('lobby' | 'playing' | 'reveal' | 'done'),
     currentQi, brideName, eventName, questions[], createdAt, expiresAt
   Subcollection /participants/{participantId}:
     name, joinedAt, answers: { 0: 'string', 1: 'string', ... } | votes: { 0: 'F' }
   ────────────────────────────────────────────────────────────── */
const SESSION_COLLECTION = "game_sessions";

// 6-char human-friendly code. Skips look-alikes (0/O, 1/I) so guests don't mistype.
const SESSION_CODE_ALPHABET = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
const generateSessionCode = () => {
  const arr = new Uint8Array(6);
  try { crypto.getRandomValues(arr); }
  catch (e) { for (let i = 0; i < 6; i++) arr[i] = Math.floor(Math.random() * 256); }
  return Array.from(arr, b => SESSION_CODE_ALPHABET[b % SESSION_CODE_ALPHABET.length]).join("");
};

const fbCreateSession = async ({ hostUsername, gameId, questions, brideName, eventName }) => {
  if (!FB) return null;
  // Loop a couple of times in case of an accidental collision.
  for (let attempt = 0; attempt < 5; attempt++) {
    const code = generateSessionCode();
    try {
      const ref = FB.db.collection(SESSION_COLLECTION).doc(code);
      const existing = await ref.get();
      if (existing.exists) continue;
      const now = Date.now();
      await ref.set({
        hostUsername: hostUsername || null,
        gameId,
        state: "lobby",
        currentQi: 0,
        brideName: brideName || "",
        eventName: eventName || "",
        questions: questions || [],
        createdAt: now,
        expiresAt: now + 1000 * 60 * 60 * 12, // 12 hours
      });
      return code;
    } catch (e) {
      console.error("[FS] create session failed:", e);
      return null;
    }
  }
  return null;
};

const fbSubscribeSession = (code, cb) => {
  if (!FB || !code) return () => {};
  try {
    return FB.db.collection(SESSION_COLLECTION).doc(code).onSnapshot(
      doc => cb(doc.exists ? { code, ...doc.data() } : null),
      err => { console.error("[FS] session subscribe error:", err); cb(null); }
    );
  } catch (e) { console.error("[FS] subscribe failed:", e); return () => {}; }
};

const fbSubscribeParticipants = (code, cb) => {
  if (!FB || !code) return () => {};
  try {
    return FB.db.collection(SESSION_COLLECTION).doc(code).collection("participants")
      .onSnapshot(
        snap => cb(snap.docs.map(d => ({ id: d.id, ...d.data() }))),
        err => { console.error("[FS] participants subscribe error:", err); cb([]); }
      );
  } catch (e) { console.error("[FS] subscribe participants failed:", e); return () => {}; }
};

const fbUpdateSession = async (code, updates) => {
  if (!FB || !code) return;
  try { await FB.db.collection(SESSION_COLLECTION).doc(code).update(updates); }
  catch (e) { console.error("[FS] update session failed:", e); }
};

// Participants — joining the session and submitting answers.
const fbJoinSession = async (code, name) => {
  if (!FB || !code || !name) return null;
  try {
    // Use the trimmed name as the doc id so a refresh by the same person reuses the slot.
    const participantId = name.trim().slice(0, 40);
    const ref = FB.db.collection(SESSION_COLLECTION).doc(code).collection("participants").doc(participantId);
    await ref.set({ name: name.trim(), joinedAt: Date.now() }, { merge: true });
    return participantId;
  } catch (e) { console.error("[FS] join session failed:", e); return null; }
};

const fbSubmitParticipantAnswer = async (code, participantId, qi, value) => {
  if (!FB || !code || !participantId) return;
  try {
    const ref = FB.db.collection(SESSION_COLLECTION).doc(code).collection("participants").doc(participantId);
    // Firestore field-path update: answers.{qi} = value
    await ref.update({ [`answers.${qi}`]: value, lastSubmitAt: Date.now() });
  } catch (e) {
    // If the doc has no answers map yet, the field-path update fails. Fall back to a set+merge.
    try {
      const ref = FB.db.collection(SESSION_COLLECTION).doc(code).collection("participants").doc(participantId);
      await ref.set({ answers: { [qi]: value }, lastSubmitAt: Date.now() }, { merge: true });
    } catch (e2) { console.error("[FS] submit answer failed:", e2); }
  }
};

// FMK votes: { 0: 'F', 1: 'M', 2: 'K' } for the three options on a card.
const fbSubmitParticipantVotes = async (code, participantId, qi, votes) => {
  if (!FB || !code || !participantId) return;
  try {
    const ref = FB.db.collection(SESSION_COLLECTION).doc(code).collection("participants").doc(participantId);
    await ref.set({ votes: { [qi]: votes }, lastSubmitAt: Date.now() }, { merge: true });
  } catch (e) { console.error("[FS] submit votes failed:", e); }
};

// Pending users (pre-auth) — written by Make.com when customer pays
const fbLoadPendingUser = async (token) => {
  if (!FB || !token) return null;
  try {
    const doc = await FB.db.collection("pending_users").doc(token).get();
    if (!doc.exists) return null;
    const data = doc.data();
    if (data.used) return { ...data, alreadyUsed: true };
    return data;
  } catch (e) { console.error("[FS] load pending failed:", e); return null; }
};
const fbMarkPendingUsed = async (token) => {
  if (!FB || !token) return;
  try {
    await FB.db.collection("pending_users").doc(token).update({ used: true, usedAt: Date.now() });
  } catch (e) { console.error("[FS] mark used failed:", e); }
};

function PhoneShell({ children, T }) {
  const [isMobile, setIsMobile] = React.useState(window.innerWidth <= 480);
  React.useEffect(() => {
    const h = () => setIsMobile(window.innerWidth <= 480);
    h(); window.addEventListener("resize", h);
    return () => window.removeEventListener("resize", h);
  }, []);

  if (isMobile) {
    return (
      <div style={{
        position: "fixed", inset: 0, background: T.bg, direction: "rtl",
        fontFamily: T.font, color: T.ink, overflow: "hidden",
      }}>{children}</div>
    );
  }
  return (
    <div style={{
      minHeight: "100vh", width: "100%",
      background: "radial-gradient(circle at 0% 0%, #FBE4DB22 0%, transparent 40%), radial-gradient(circle at 100% 100%, #F9E8EE22 0%, transparent 40%), #F2EFEB",
      display: "flex", alignItems: "center", justifyContent: "center",
      padding: "24px", fontFamily: T.font,
    }}>
      <div style={{
        width: 380, height: 760, background: T.bg,

      }}>{children}</div>

}

/* Pill button */
function Btn({ T, children, onClick, variant = "primary", icon, disabled = false, style, size = "lg" }) {
  const [pressed, setPressed] = React.useState(false);
  const variants = {
    primary: { bg: T.accent, fg: T.onAccent, border: "none", shadow: T.shadowSm },
    ink:     { bg: T.surfaceInk, fg: "#FFFFFF", border: "none", shadow: T.shadowSm },
    quiet:   { bg: T.surface, fg: T.ink, border: T.border, shadow: T.shadowSm },
    ok:      { bg: T.ok, fg: "#FFFFFF", border: "none", shadow: T.shadowSm },
  };
  const v = variants[variant];
  const sz = size === "sm" ? { padding: "10px 16px", fs: 14 }
           : size === "md" ? { padding: "13px 18px", fs: 15 }
           : { padding: "15px 22px", fs: 16 };
  return (
    <button
      onMouseDown={() => setPressed(true)} onMouseUp={() => setPressed(false)} onMouseLeave={() => setPressed(false)}
      onTouchStart={() => setPressed(true)} onTouchEnd={() => setPressed(false)}
      onClick={disabled ? undefined : onClick} disabled={disabled}
      style={{
        width: "100%", display: "flex", alignItems: "center", justifyContent: "center", gap: 9,
        padding: sz.padding, fontSize: sz.fs, fontWeight: 700, fontFamily: T.font,
        background: disabled ? T.surfaceAlt : v.bg,
        color: disabled ? T.muted : v.fg,
        border: v.border === "none" ? "none" : v.border,
        borderRadius: T.radius, cursor: disabled ? "not-allowed" : "pointer",
        boxShadow: v.shadow, letterSpacing: 0.1,
        transform: pressed && !disabled ? "translateY(1px)" : "none",
        transition: "transform 80ms, background-color 120ms",
        opacity: disabled ? 0.8 : 1,
        touchAction: "manipulation", WebkitUserSelect: "none", userSelect: "none",
        ...style,
      }}
    >{icon && <Icon name={icon} size={18} color={disabled ? T.muted : v.fg} w={1.6}/>}{children}</button>
  );
}

/* Round icon button (40x40) */
function RoundBtn({ T, icon, onClick, dark = false, style }) {
  return (
    <button onClick={onClick} style={{
      width: 40, height: 40, borderRadius: 12, flexShrink: 0,

/* ──────────────────────────────────────────────────────────────
   ONBOARDING — Welcome / Username / EventPicker / NameEvent
   ────────────────────────────────────────────────────────────── */
const VALID_CODE = "123456";

function ScreenWelcome({ T, onNext, pendingUser, pendingLoading }) {
  const [code, setCode] = React.useState(["", "", "", "", "", ""]);
  const inputsRef = React.useRef([]);
  React.useEffect(() => { inputsRef.current[0]?.focus(); }, []);

  const setDigit = (i, v) => {
    const clean = (v || "").replace(/[^0-9]/g, "");
    if (!clean) { const next = [...code]; next[i] = ""; setCode(next); return; }
    if (clean.length > 1) {
      const next = [...code];
      for (let k = 0; k < clean.length && i + k < 6; k++) next[i + k] = clean[k];
      setCode(next);
      inputsRef.current[Math.min(i + clean.length, 5)]?.focus(); return;
    }
    const next = [...code]; next[i] = clean; setCode(next);
    if (i < 5) inputsRef.current[i + 1]?.focus();
  };
  const onKey = (i, e) => {
    if (e.key === "Backspace") {
      if (code[i]) { const next = [...code]; next[i] = ""; setCode(next); }
      else if (i > 0) { inputsRef.current[i - 1]?.focus(); const n = [...code]; n[i-1]=""; setCode(n); }
      e.preventDefault();
    } else if (e.key === "ArrowLeft" && i < 5) inputsRef.current[i + 1]?.focus();
    else if (e.key === "ArrowRight" && i > 0) inputsRef.current[i - 1]?.focus();
  };
  const filled = code.every(c => c.length === 1);
  // If pendingUser exists, compare to her unique code; otherwise fall back to demo code
  const expectedCode = pendingUser?.code || VALID_CODE;
  const isValid = code.join("") === expectedCode;
  const isWrong = filled && !isValid;
  const greeting = pendingUser?.fullName ? `היי ${pendingUser.fullName.split(" ")[0]}!` : null;

  return (
    <>
      <StatusBar T={T}/>
      <div style={{ position: "absolute", inset: 0, padding: "48px 22px 28px", display: "flex", flexDirection: "column" }}>
        {/* Wordmark */}
        <div style={{ display: "flex", alignItems: "center", gap: 10, paddingTop: 4 }}>
          <div style={{ width: 32, height: 32, borderRadius: 9, background: T.accent,
            display: "flex", alignItems: "center", justifyContent: "center" }}>
            <Icon name="sparkle" size={18} color={T.onAccent} w={1.6}/>
          </div>
          <div style={{ fontSize: 20, fontWeight: 800, letterSpacing: -0.3 }}>חוגגות</div>
        </div>

        {/* Hero */}
        <div style={{ flex: 1, display: "flex", flexDirection: "column", justifyContent: "center" }}>
          <Eyebrow T={T}>{greeting ? "ברוכה הבאה!" : "ברוכים הבאים!"}</Eyebrow>
          <h1 style={{ fontSize: 32, fontWeight: 800, lineHeight: 1.15, margin: "12px 0 0", letterSpacing: -0.6 }}>
            {greeting ? <>{greeting}<br/>הזיני את הקוד</> : <>איזה כיף<br/>שהצטרפתם.ן</>}
          </h1>
          <p style={{ fontSize: 15, lineHeight: 1.65, color: T.inkSoft, margin: "16px 0 0", maxWidth: 300, fontWeight: 500 }}>
            {pendingUser ? <>שלחנו לך במייל קוד 6 ספרות. הזיני אותו כאן כדי להמשיך.</> : <>לפני כל הכיף, הזינו את הקוד שנשלח לכם.ן למייל ממש כאן למטה.</>}
          </p>
        </div>

        {/* Code */}
        <div style={{ marginBottom: 14 }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
            <span style={{ fontSize: 13, fontWeight: 700, color: T.ink }}>הקוד הסודי שלי</span>
            <span style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 12.5, color: T.muted, fontWeight: 600 }}>
              <Icon name="lock" size={14} color={T.muted} w={1.5}/> 6 ספרות
            </span>
          </div>
          <div style={{ display: "flex", gap: 8, direction: "ltr" }}>
            {code.map((ch, i) => {
              const active = !isWrong && (ch || (i === code.findIndex(c => !c)));
              return (
                <input key={i}
                  ref={el => { inputsRef.current[i] = el; }}
                  value={ch}
                  onChange={e => setDigit(i, e.target.value)}
                  onKeyDown={e => onKey(i, e)}
                  onFocus={e => e.target.select()}
                  inputMode="numeric" autoComplete="one-time-code" pattern="[0-9]*"
                  style={{
                    flex: 1, width: 0, height: 56, borderRadius: 13,
                    background: isWrong ? "#FDEDE9" : T.surfaceAlt,
                    boxShadow: isWrong ? `inset 0 0 0 1.5px ${T.accent}` :
                              active ? `inset 0 0 0 1.5px ${T.accent}` :
                              `inset 0 0 0 1px ${T.line}`,
                    border: "none", textAlign: "center",
                    fontSize: 24, fontWeight: 700, color: T.ink,
                    outline: "none", padding: 0, direction: "ltr",
                    fontVariantNumeric: "tabular-nums",
                  }}/>
              );
            })}
          </div>
          <div style={{ marginTop: 12, fontSize: 12.5, color: isWrong ? T.accent : T.inkSoft, fontWeight: 500 }}>
            {isWrong ? "אופס, הקוד לא נכון. נסי שוב." : pendingLoading ? "טוענת את הפרטים שלך..." : pendingUser ? "הקוד נשלח אלייך למייל ששוייך לתשלום." : (
              <>רמז (לדמו): <span style={{ color: T.accent, fontWeight: 700 }}>123456</span></>
            )}
          </div>
        </div>

        <Btn T={T} onClick={onNext} disabled={!isValid}>
          {isValid ? "יאללה, נכנסות" : isWrong ? "קוד שגוי" : "ממלאות קוד..."}
        </Btn>
        {!pendingUser && (
          <div style={{ textAlign: "center", marginTop: 14, fontSize: 13, color: T.inkSoft, fontWeight: 500 }}>
            עוד לא רכשת? <span style={{ color: T.accent, fontWeight: 700, borderBottom: `1.5px solid ${T.accentSoft}` }}>בואי נסדר את זה</span>
          </div>
        )}
      </div>
      <HomeBar/>
    </>
  );
}

/* ──────────────────────────────────────────────────────────────
   LOGIN — username + password (replaces the SMS/code gate)
   ────────────────────────────────────────────────────────────── */
function ScreenLogin({ T, onSuccess, prefillUsername }) {
  const [username, setUsername] = React.useState(prefillUsername || "");
  const [password, setPassword] = React.useState("");
  const [busy, setBusy] = React.useState(false);
  const [error, setError] = React.useState("");
  const userRef = React.useRef(null);
  const passRef = React.useRef(null);

  React.useEffect(() => {
    if (prefillUsername) passRef.current?.focus();
    else userRef.current?.focus();
  }, [prefillUsername]);

  const canSubmit = username.trim().length >= 3 && password.trim().length >= 4;

  const submit = async () => {
    if (!canSubmit || busy) return;
    setBusy(true); setError("");
    try {
      const res = await makeLoginRequest(username, password);
      if (res.ok) {
        saveAuthSession({
          username: username.trim(),
          token: res.token || null,
          deviceId: res.deviceId,
          fullName: res.fullName || "",
          phone: res.phone || "",
          email: res.email || "",
          eventType: res.eventType || "bach",
          loggedInAt: Date.now(),
        });
        onSuccess(res);
      } else {
        const msg = res.error === "bad_credentials" ? "שם המשתמש או הסיסמה שגויים" :
          res.error === "device_locked" ? "המשתמש כבר מחובר ממכשיר אחר. פני אלינו לאיפוס." :
          res.error === "bad_response" ? "תקלה זמנית, נסי שוב" :
          "התחברות נכשלה — בדקי שהפרטים מהמייל הוקלדו נכון";
        setError(msg);
      }
    } catch (e) {
      console.error("[Login]", e);
      setError("לא הצלחנו להתחבר לשרת. בדקי חיבור לאינטרנט ונסי שוב.");
    } finally {
      setBusy(false);
    }
  };

  const onKey = (e) => { if (e.key === "Enter") submit(); };

  return (
    <>

      <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", overflow: "auto" }}>

        <div style={{

          padding: "44px 22px 18px",
          borderRadius: "0 0 22px 22px",
          color: "#fff",
          boxShadow: "0 6px 18px -10px rgba(232,81,42,0.45)",
          position: "relative", overflow: "hidden",
        }}>
          <div style={{
            position: "absolute", top: -30, right: -40,
            width: 110, height: 110, borderRadius: "50%",
            background: "rgba(255,255,255,0.08)", pointerEvents: "none",
          }}/>
          <div style={{ display: "flex", alignItems: "center", gap: 10, position: "relative" }}>
            <div style={{ width: 32, height: 32, borderRadius: 9, background: "rgba(255,255,255,0.22)",
              border: "1.5px solid rgba(255,255,255,0.45)",
              display: "flex", alignItems: "center", justifyContent: "center" }}>
              <Icon name="sparkle" size={17} color="#fff" w={1.7}/>
            </div>
            <div style={{ fontSize: 18, fontWeight: 800, letterSpacing: -0.3, color: "#fff" }}>חוגגות</div>
          </div>
          <div style={{ position: "relative", marginTop: 14 }}>
            <h1 style={{ fontSize: 22, fontWeight: 800, margin: "0 0 4px", lineHeight: 1.1, letterSpacing: -0.4, color: "#fff" }}>
              ברוכ.ה הבא.ה
            </h1>
            <p style={{ fontSize: 12.5, color: "rgba(255,255,255,0.85)", lineHeight: 1.45, fontWeight: 600, margin: 0, maxWidth: 280 }}>
              הזיני את שם המשתמש והסיסמה שקיבלת במייל לאחר התשלום.
            </p>
          </div>
        </div>

        {/* Content */}
        <div style={{ padding: "22px 22px 28px", display: "flex", flexDirection: "column", flex: 1 }}>
          {/* Username */}
          <label style={{ fontSize: 12, fontWeight: 800, color: T.muted, letterSpacing: 0.6, textTransform: "uppercase", marginBottom: 8 }}>
            שם משתמש
          </label>
          <input
            ref={userRef}
            value={username}
            onChange={e => { setUsername(e.target.value); setError(""); }}
            onKeyDown={onKey}
            placeholder="כפי שמופיע במייל"
            autoComplete="username"
            style={{
              width: "100%", padding: "13px 16px", borderRadius: 13,
              background: T.surfaceAlt,
              boxShadow: `inset 0 0 0 1.5px ${error ? PB.orange.main : (username ? PB.orange.main : T.line)}`,
              border: "none", outline: "none",
              fontSize: 16, fontWeight: 700, color: T.ink,
              unicodeBidi: "plaintext", textAlign: "center", fontFamily: T.font,

          {/* Password */}
          <label style={{ fontSize: 12, fontWeight: 800, color: T.muted, letterSpacing: 0.6, textTransform: "uppercase", marginTop: 16, marginBottom: 8 }}>
            סיסמה

          <input
            ref={passRef}

            }}/>

          {/* Error */}
          {error && (
            <div style={{ marginTop: 12, padding: "10px 12px", borderRadius: 10,
              background: "#FDEDE9", border: `1px solid ${PB.orange.main}55`,

            <div style={{ fontSize: 11.5, lineHeight: 1.5, color: PB.orange.deep, fontWeight: 600 }}>
              הפרטים אישיים — אל תעבירי אותם לאף אחת. כניסה ממכשיר אחר תינעל אוטומטית.
            </div>
          </div>
        </div>
      </div>
      <HomeBar/>
    </>
  );
}

/* ──────────────────────────────────────────────────────────────
   SMS PHONE VERIFICATION (after email code)
   Kept around as a fallback path; the live flow uses ScreenLogin now.
   ────────────────────────────────────────────────────────────── */
// Normalize Israeli phone input to E.164 (+972...) — returns null if invalid
const normalizePhoneIL = (input) => {
  const d = (input || "").replace(/[^\d]/g, "");
  if (!d) return null;
  if (d.startsWith("972")) return "+" + d;
  if (d.startsWith("0")) return "+972" + d.substring(1);
  if (d.length === 9 && d.startsWith("5")) return "+972" + d;
  return null;
};

function ScreenSmsVerify({ T, onNext, onBack, pendingUser }) {
  // If pendingUser has a phone from the paid transaction, lock it (no manual entry)
  const lockedPhone = pendingUser?.phone ? normalizePhoneIL(pendingUser.phone) : null;
  const hasLockedPhone = !!lockedPhone;
  const [phase, setPhase] = React.useState("phone"); // phone | code
  const [phone, setPhone] = React.useState(hasLockedPhone ? pendingUser.phone : "");
  const [code, setCode] = React.useState(["", "", "", "", "", ""]);
  const [confirmation, setConfirmation] = React.useState(null);
  const [sending, setSending] = React.useState(false);
  const [verifying, setVerifying] = React.useState(false);
  const [error, setError] = React.useState("");
  const [seconds, setSeconds] = React.useState(0);
  const inputsRef = React.useRef([]);

  const normalized = hasLockedPhone ? lockedPhone : normalizePhoneIL(phone);
  const phoneValid = normalized !== null;

  React.useEffect(() => {
    if (phase === "code") inputsRef.current[0]?.focus();
  }, [phase]);
  React.useEffect(() => {
    if (seconds <= 0) return;
    const t = setTimeout(() => setSeconds(s => s - 1), 1000);
    return () => clearTimeout(t);
  }, [seconds]);

  const sendCode = async () => {
    if (!phoneValid || sending) return;
    setSending(true); setError("");
    try {
      if (!window.FB) throw new Error("חיבור Firebase לא הצליח. נסי לרענן.");
      const result = await fbSendSMS(normalized);
      setConfirmation(result);
      setPhase("code"); setSeconds(45);
      setCode(["", "", "", "", "", ""]);
    } catch (e) {
      console.error("[SMS send]", e);
      const msg = e?.code === "auth/invalid-phone-number" ? "מספר לא תקין" :
        e?.code === "auth/too-many-requests" ? "יותר מדי ניסיונות, נסי בעוד כמה דקות" :
        e?.code === "auth/captcha-check-failed" ? "אימות נכשל, רענני ונסי שוב" :
        e?.message || "שליחת SMS נכשלה";
      setError(msg);
      try { window._recaptcha?.clear(); } catch (_) {}
      _recaptcha = null;
    } finally { setSending(false); }
  };

  const verifyCode = async () => {
    const codeStr = code.join("");
    if (codeStr.length !== 6 || verifying || !confirmation) return;
    setVerifying(true); setError("");
    try {
      await confirmation.confirm(codeStr);
      // Mark the one-time link as used so it can't be replayed
      if (pendingUser?.token) {
        try { await fbMarkPendingUsed(pendingUser.token); } catch (_) {}
      }
      onNext();
    } catch (e) {
      console.error("[SMS verify]", e);
      const msg = e?.code === "auth/invalid-verification-code" ? "הקוד לא נכון, נסי שוב" :
        e?.code === "auth/code-expired" ? "הקוד פג תוקף, בקשי קוד חדש" :
        e?.message || "אימות נכשל";
      setError(msg);
    } finally { setVerifying(false); }
  };

  const setDigit = (i, v) => {
    const clean = (v || "").replace(/[^0-9]/g, "");
    if (!clean) { const next = [...code]; next[i] = ""; setCode(next); return; }
    if (clean.length > 1) {
      const next = [...code];
      for (let k = 0; k < clean.length && i + k < 6; k++) next[i + k] = clean[k];
      setCode(next);
      inputsRef.current[Math.min(i + clean.length, 5)]?.focus(); return;
    }
    const next = [...code]; next[i] = clean; setCode(next);
    if (i < 5) inputsRef.current[i + 1]?.focus();
  };
  const onKey = (i, e) => {
    if (e.key === "Backspace") {
      if (code[i]) { const next = [...code]; next[i] = ""; setCode(next); }
      else if (i > 0) { inputsRef.current[i - 1]?.focus(); const n = [...code]; n[i-1]=""; setCode(n); }
      e.preventDefault();
    } else if (e.key === "ArrowLeft" && i < 5) inputsRef.current[i + 1]?.focus();
    else if (e.key === "ArrowRight" && i > 0) inputsRef.current[i - 1]?.focus();
  };
  const filled = code.every(c => c.length === 1);

  return (
    <>
      <StatusBar T={T}/>
      <div style={{ position: "absolute", inset: 0, padding: "48px 24px 28px", display: "flex", flexDirection: "column" }}>
        <TopBar T={T} onBack={phase === "code" ? () => setPhase("phone") : (hasLockedPhone ? null : onBack)}/>

        <div style={{ flex: 1, display: "flex", flexDirection: "column", justifyContent: "center" }}>
          <Eyebrow T={T}>אימות בטחוני</Eyebrow>
          <h1 style={{ fontSize: 30, fontWeight: 800, lineHeight: 1.15, margin: "12px 0 0", letterSpacing: -0.5 }}>
            {phase === "phone" ? <>אימות מספר<br/>הנייד שלכם.ן</> : <>הזיני את הקוד<br/>שקיבלת ב-SMS</>}
          </h1>
          <p style={{ fontSize: 15, lineHeight: 1.65, color: T.inkSoft, margin: "16px 0 0", maxWidth: 300, fontWeight: 500 }}>
            {phase === "phone" ? (
              hasLockedPhone ? (
                <>נשלח אלייך קוד אימות לנייד שאיתו שילמת.<br/>
                  <span style={{ fontSize: 12, color: T.muted }}>(ככה הפרטים לא עוברים בקלות למישהי אחרת.)</span>
                </>
              ) : (
                <>הזיני את מספר הנייד שלך, נשלח אלייך קוד אימות ב-SMS.<br/>
                  <span style={{ fontSize: 12, color: T.muted }}>(הקוד מבטיח שהאפליקציה לא מועברת למישהי אחרת.)</span>
                </>
              )
            ) : (
              <>שלחנו קוד 6 ספרות ל-<b style={{ color: T.ink, direction: "ltr", display: "inline-block" }}>{normalized}</b>.<br/>
                <span style={{ fontSize: 12, color: T.muted }}>הקוד יגיע תוך מספר שניות.</span>
              </>
            )}
          </p>
        </div>

        {phase === "phone" ? (
          <div style={{ marginBottom: 14 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
              <span style={{ fontSize: 13, fontWeight: 700, color: T.ink }}>מספר הנייד שלי</span>
              {hasLockedPhone && (
                <span style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 12, color: T.muted, fontWeight: 600 }}>
                  <Icon name="lock" size={13} color={T.muted} w={1.5}/> נעול לפי התשלום
                </span>
              )}
            </div>
            <input
              autoFocus={!hasLockedPhone}
              readOnly={hasLockedPhone}
              value={hasLockedPhone ? lockedPhone : phone}
              onChange={e => { if (!hasLockedPhone) { setPhone(e.target.value); setError(""); } }}
              placeholder="050-1234567"
              inputMode="tel"
              autoComplete="tel"
              style={{
                width: "100%", height: 56, borderRadius: 13,
                background: hasLockedPhone ? T.surface : T.surfaceAlt,
                boxShadow: `inset 0 0 0 ${phoneValid ? 1.5 : 1}px ${phoneValid ? T.accent : T.line}`,
                border: "none", textAlign: "center",
                fontSize: 22, fontWeight: 700, color: T.ink,
                outline: "none", padding: 0, direction: "ltr",
                fontVariantNumeric: "tabular-nums",
                cursor: hasLockedPhone ? "default" : "text",
              }}/>
            <div style={{ marginTop: 12, fontSize: 12.5, color: error ? T.accent : T.inkSoft, fontWeight: 500, minHeight: 18 }}>
              {error ? error : phoneValid ? `יישלח ל: ${normalized}` : "פורמט: 0501234567 או 050-123-4567"}
            </div>
          </div>
        ) : (
          <div style={{ marginBottom: 14 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
              <span style={{ fontSize: 13, fontWeight: 700, color: T.ink }}>קוד מ-SMS</span>
              <span style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 12.5, color: T.muted, fontWeight: 600 }}>
                <Icon name="lock" size={14} color={T.muted} w={1.5}/> 6 ספרות
              </span>
            </div>
            <div style={{ display: "flex", gap: 8, direction: "ltr" }}>
              {code.map((ch, i) => {
                const active = !error && (ch || (i === code.findIndex(c => !c)));
                return (
                  <input key={i}
                    ref={el => { inputsRef.current[i] = el; }}
                    value={ch}
                    onChange={e => setDigit(i, e.target.value)}
                    onKeyDown={e => onKey(i, e)}
                    onFocus={e => e.target.select()}
                    inputMode="numeric" autoComplete="one-time-code" pattern="[0-9]*"
                    style={{
                      flex: 1, width: 0, height: 56, borderRadius: 13,
                      background: error ? "#FDEDE9" : T.surfaceAlt,
                      boxShadow: error ? `inset 0 0 0 1.5px ${T.accent}` :
                                active ? `inset 0 0 0 1.5px ${T.accent}` :
                                `inset 0 0 0 1px ${T.line}`,
                      border: "none", textAlign: "center",
                      fontSize: 24, fontWeight: 700, color: T.ink,
                      outline: "none", padding: 0, direction: "ltr",
                      fontVariantNumeric: "tabular-nums",
                    }}/>
                );
              })}
            </div>
            <div style={{ marginTop: 12, fontSize: 12.5, color: error ? T.accent : T.inkSoft, fontWeight: 500, minHeight: 18 }}>
              {error || "מקבלות את הקוד? הזיני אותו פה."}
            </div>
          </div>
        )}

        {phase === "phone" ? (
          <Btn T={T} onClick={sendCode} disabled={!phoneValid || sending}>
            {sending ? "שולחת SMS..." : "שלחי לי קוד SMS"}
          </Btn>
        ) : (
          <Btn T={T} onClick={verifyCode} disabled={!filled || verifying}>
            {verifying ? "מאמתת..." : filled ? "אישור והמשך" : "ממתינות לקוד..."}
          </Btn>
        )}

        {phase === "code" && (
          <div style={{ textAlign: "center", marginTop: 14, fontSize: 13, color: T.inkSoft, fontWeight: 500 }}>
            {seconds > 0 ? (
              <>לא קיבלת? אפשר לשלוח שוב בעוד <b className="num" style={{ color: T.ink }}>{seconds}</b> שניות</>
            ) : (
              <span onClick={sendCode} style={{ color: T.accent, fontWeight: 700, cursor: "pointer", borderBottom: `1.5px solid ${T.accentSoft}` }}>שלחי לי קוד חדש</span>
            )}
          </div>
        )}
      </div>
      <HomeBar/>
    </>
  );
}

/* ──────────────────────────────────────────────────────────────
   MINI QR (refined modules)
   ────────────────────────────────────────────────────────────── */
function MiniQR({ size = 70, color = "#161616", bg = "#fff", radius = 10 }) {
  const N = 11;
  const seed = (x, y) => ((x * 37 + y * 19 + x * y * 7) % 13) > 6;
  const finder = (x, y) => (x < 3 && y < 3) || (x >= N - 3 && y < 3) || (x < 3 && y >= N - 3);
  const u = size / N, cells = [];
  for (let y = 0; y < N; y++) for (let x = 0; x < N; x++) {
    if (finder(x, y)) continue;
    if (seed(x, y)) cells.push({ x, y });
  }
  const F = ({ ox, oy }) => (
    <><rect x={ox * u} y={oy * u} width={3 * u} height={3 * u} rx={u * 0.7} fill={color}/>
      <rect x={(ox + 0.7) * u} y={(oy + 0.7) * u} width={1.6 * u} height={1.6 * u} rx={u * 0.4} fill={bg}/></>
  );
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ display: "block", borderRadius: radius }}>
      <rect width={size} height={size} fill={bg} rx={radius}/>
      {cells.map((c, i) => <rect key={i} x={c.x*u+u*0.12} y={c.y*u+u*0.12} width={u*0.76} height={u*0.76} rx={u*0.25} fill={color}/>)}
      <F ox={0} oy={0}/><F ox={N-3} oy={0}/><F ox={0} oy={N-3}/>
    </svg>
  );
}

/* ──────────────────────────────────────────────────────────────
   PARTICIPANT MODE — guest side of a multiplayer game session.
   Reached via ?join=CODE. Stays in sync with the host's screen
   through Firestore's onSnapshot.
   ────────────────────────────────────────────────────────────── */
const PARTICIPANT_NAME_KEY = "chogegot_participant_name";

function ScreenParticipant({ T, code, onLeave }) {
  const [session, setSession] = React.useState(null);
  const [sessionLoading, setSessionLoading] = React.useState(true);
  const [name, setName] = React.useState(() => {
    try { return localStorage.getItem(PARTICIPANT_NAME_KEY) || ""; } catch (e) { return ""; }
  });
  const [participantId, setParticipantId] = React.useState(null);
  const [joining, setJoining] = React.useState(false);
  const [currentAnswer, setCurrentAnswer] = React.useState("");
  const [submitted, setSubmitted] = React.useState(false);

  // Subscribe to session updates as soon as we have a code
  React.useEffect(() => {
    if (!code) return;
    setSessionLoading(true);
    const off = fbSubscribeSession(code, (data) => {
      setSessionLoading(false);
      setSession(data);
    });
    return () => { try { off(); } catch (e) {} };
  }, [code]);

  // Reset 'submitted' flag whenever a new question is broadcast
  React.useEffect(() => {
    setSubmitted(false);
    setCurrentAnswer("");
  }, [session?.currentQi, session?.state]);

  const join = async () => {
    if (!name.trim() || joining || !code) return;
    setJoining(true);
    try {
      const id = await fbJoinSession(code, name);
      if (id) {
        setParticipantId(id);
        try { localStorage.setItem(PARTICIPANT_NAME_KEY, name.trim()); } catch (e) {}
      }
    } finally { setJoining(false); }
  };

  const submitAnswer = async () => {
    if (!currentAnswer.trim() || !participantId || submitted) return;
    setSubmitted(true);
    await fbSubmitParticipantAnswer(code, participantId, session.currentQi, currentAnswer.trim());
  };

  // ── Loading ───────────────────────────────────────────────
  if (sessionLoading) return (
    <ParticipantShell T={T} onLeave={onLeave}>
      <ParticipantCenter>
        <div style={{ fontSize: 14, color: T.inkSoft }}>טוענת את המשחק...</div>
      </ParticipantCenter>
    </ParticipantShell>
  );

  // ── Bad / expired code ────────────────────────────────────
  if (!session) return (
    <ParticipantShell T={T} onLeave={onLeave}>
      <ParticipantCenter>
        <Icon name="close" size={32} color={PB.orange.deep} w={2}/>
        <h2 style={{ fontSize: 22, fontWeight: 800, margin: "12px 0 6px" }}>הקוד לא נמצא</h2>
        <p style={{ fontSize: 14, color: T.inkSoft, lineHeight: 1.5 }}>
          ייתכן שהמארחת עוד לא פתחה את המשחק או שהקוד כבר נסגר.<br/>
          בקשי קוד חדש או נסי שוב בעוד רגע.
        </p>
      </ParticipantCenter>
    </ParticipantShell>
  );

  // ── Name entry ────────────────────────────────────────────
  if (!participantId) return (
    <ParticipantShell T={T} onLeave={onLeave} code={code} brideName={session.brideName} gameId={session.gameId}>
      <ParticipantCenter>
        <Eyebrow T={T}>הצטרפת לחידון</Eyebrow>
        <h1 style={{ fontSize: 26, fontWeight: 800, margin: "10px 0 8px", letterSpacing: -0.4 }}>
          איך לקרוא לך?
        </h1>
        <p style={{ fontSize: 13.5, color: T.inkSoft, lineHeight: 1.5, marginBottom: 18 }}>
          השם שלך יוצג למארחת כשתעני על שאלות.
        </p>
        <input value={name} onChange={e => setName(e.target.value)}
          onKeyDown={e => e.key === "Enter" && join()}
          placeholder="השם שלי..." autoFocus
          style={{
            width: "100%", padding: "14px 16px", borderRadius: 13,
            background: T.surfaceAlt, boxShadow: `inset 0 0 0 1.5px ${name ? PB.pink.main : T.line}`,
            border: "none", outline: "none", fontSize: 17, fontWeight: 700,
            color: T.ink, textAlign: "center", fontFamily: T.font,
          }}/>
        <Btn T={T} onClick={join} disabled={!name.trim() || joining} style={{ marginTop: 16 }}>
          {joining ? "מצטרפת..." : "אני בפנים"}
        </Btn>
      </ParticipantCenter>
    </ParticipantShell>
  );

  // ── Lobby ────────────────────────────────────────────────
  if (session.state === "lobby") return (
    <ParticipantShell T={T} onLeave={onLeave} code={code} brideName={session.brideName} gameId={session.gameId}>
      <ParticipantCenter>
        <div style={{ fontSize: 38, marginBottom: 6 }}>👯</div>
        <h1 style={{ fontSize: 24, fontWeight: 800, margin: "0 0 6px", letterSpacing: -0.4 }}>היי {name}!</h1>
        <p style={{ fontSize: 14, color: T.inkSoft, lineHeight: 1.55 }}>
          את כבר בפנים. ברגע שהמארחת מתחילה, השאלה הראשונה תופיע כאן.
        </p>
      </ParticipantCenter>
    </ParticipantShell>
  );

  // ── Playing — show current question + input ──────────────
  if (session.state === "playing") {
    // FMK gets its own branch — same shell, different body.
    if (session.gameId === "fmk") {
      return (
        <ParticipantFMK
          T={T} onLeave={onLeave} code={code} session={session}
          submitted={submitted} setSubmitted={setSubmitted}
          participantId={participantId}
        />
      );
    }
    const q = session.questions?.[session.currentQi] || "";
    return (
      <ParticipantShell T={T} onLeave={onLeave} code={code} brideName={session.brideName} gameId={session.gameId}>
        <div style={{ padding: "16px 22px 28px", display: "flex", flexDirection: "column", flex: 1 }}>
          <div style={{ fontSize: 11, fontWeight: 800, color: T.muted, letterSpacing: 0.8, textTransform: "uppercase" }}>
            שאלה {session.currentQi + 1} / {session.questions?.length || 0}
          </div>
          <h1 style={{ fontSize: 22, fontWeight: 800, margin: "8px 0 18px", letterSpacing: -0.3, lineHeight: 1.25 }}>
            {q}
          </h1>
          {submitted ? (
            <div style={{ padding: "18px 16px", background: PB.pink.soft, borderRadius: 14,
              border: `1px solid ${PB.pink.main}55`, textAlign: "center" }}>
              <Icon name="check" size={28} color={PB.pink.deep} w={2}/>
              <div style={{ fontSize: 14.5, fontWeight: 800, color: PB.pink.deep, marginTop: 6 }}>נשלח!</div>
              <div style={{ fontSize: 12.5, color: T.inkSoft, marginTop: 4 }}>מחכות לשאר הבנות...</div>
            </div>
          ) : (
            <>
              <textarea value={currentAnswer} onChange={e => setCurrentAnswer(e.target.value)}
                placeholder="התשובה שלך..." rows={3}
                onFocus={e => setTimeout(() => e.target.scrollIntoView({ behavior: "smooth", block: "center" }), 350)}
                style={{
                  width: "100%", padding: "14px 16px", borderRadius: 13,
                  background: T.surfaceAlt, boxShadow: `inset 0 0 0 1.5px ${currentAnswer ? PB.pink.main : T.line}`,
                  border: "none", outline: "none", fontSize: 16, fontWeight: 500,
                  color: T.ink, fontFamily: T.font, resize: "none", lineHeight: 1.4,
                  WebkitAppearance: "none",
                }}/>
              <Btn T={T} onClick={submitAnswer} disabled={!currentAnswer.trim()} style={{ marginTop: 14 }}>
                שליחת תשובה
              </Btn>
            </>
          )}
        </div>
      </ParticipantShell>
    );
  }

  // ── Reveal — show all answers ─────────────────────────────
  if (session.state === "reveal") {
    return (
      <ParticipantShell T={T} onLeave={onLeave} code={code} brideName={session.brideName} gameId={session.gameId}>
        <ParticipantCenter>
          <Eyebrow T={T}>מתאספים</Eyebrow>
          <h2 style={{ fontSize: 22, fontWeight: 800, margin: "10px 0 6px", letterSpacing: -0.3 }}>
            המארחת חושפת תשובות
          </h2>
          <p style={{ fontSize: 13.5, color: T.inkSoft, lineHeight: 1.5 }}>
            תסתכלי על המסך הגדול — שאלה הבאה בעוד רגע.
          </p>
        </ParticipantCenter>
      </ParticipantShell>
    );
  }

  // ── Done ──────────────────────────────────────────────────
  if (session.state === "done") {
    return (
      <ParticipantShell T={T} onLeave={onLeave} code={code} brideName={session.brideName} gameId={session.gameId}>
        <ParticipantCenter>
          <div style={{ fontSize: 48, marginBottom: 8 }}>🎉</div>
          <h2 style={{ fontSize: 24, fontWeight: 800, margin: "0 0 8px", letterSpacing: -0.4 }}>
            סיימנו!
          </h2>
          <p style={{ fontSize: 14, color: T.inkSoft, lineHeight: 1.5 }}>
            תודה שהשתתפת. תהנו מהמסיבה 🥂
          </p>
        </ParticipantCenter>
      </ParticipantShell>
    );
  }

  return null;
}

function ParticipantFMK({ T, onLeave, code, session, submitted, setSubmitted, participantId }) {
  const qi = session.currentQi;
  const options = Array.isArray(session.questions?.[qi]) ? session.questions[qi] : [];
  const total = session.questions?.length || 0;

  // Local FMK votes for the CURRENT card: { 0: 'F', 1: 'M', 2: 'K' }
  const [votes, setVotes] = React.useState({});

  // Reset votes whenever the card changes
  React.useEffect(() => { setVotes({}); }, [qi]);

  const assign = (optIdx, letter) => {
    setVotes(prev => {
      const next = { ...prev };
      // Each letter only once; clicking the same one again clears.
      Object.keys(next).forEach(k => { if (next[k] === letter) delete next[k]; });
      if (prev[optIdx] === letter) delete next[optIdx];
      else next[optIdx] = letter;
      return next;
    });
  };

  const allAssigned = Object.keys(votes).length === 3;

  const submit = async () => {
    if (!allAssigned || submitted) return;
    setSubmitted(true);
    await fbSubmitParticipantVotes(code, participantId, qi, votes);
  };

  const letters = [
    { l: "F", c: PB.orange, label: "Fuck" },
    { l: "M", c: PB.pink,   label: "Marry" },
    { l: "K", c: PB.ink,    label: "Kill" },
  ];

  return (
    <ParticipantShell T={T} onLeave={onLeave} code={code} brideName={session.brideName} gameId={session.gameId}>
      <div style={{ padding: "16px 22px 28px", display: "flex", flexDirection: "column", flex: 1 }}>
        <div style={{ fontSize: 11, fontWeight: 800, color: T.muted, letterSpacing: 0.8, textTransform: "uppercase" }}>
          כרטיס {qi + 1} / {total}
        </div>
        <h1 style={{ fontSize: 20, fontWeight: 800, margin: "8px 0 14px", letterSpacing: -0.3, lineHeight: 1.25 }}>
          סמני F · M · K לכל אחת
        </h1>

        {submitted ? (
          <div style={{ padding: "18px 16px", background: PB.pink.soft, borderRadius: 14,
            border: `1px solid ${PB.pink.main}55`, textAlign: "center" }}>
            <Icon name="check" size={28} color={PB.pink.deep} w={2}/>
            <div style={{ fontSize: 14.5, fontWeight: 800, color: PB.pink.deep, marginTop: 6 }}>נשלח!</div>
            <div style={{ fontSize: 12.5, color: T.inkSoft, marginTop: 4 }}>מחכות לכרטיס הבא...</div>
          </div>
        ) : (
          <>
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {options.map((opt, idx) => {
                const assigned = votes[idx];
                const bg = assigned ? letters.find(x => x.l === assigned).c.main : "#FFFFFF";
                const fg = assigned ? (assigned === "M" ? "#1A1A1A" : "#fff") : "#1A1A1A";
                return (
                  <div key={idx} style={{
                    padding: "12px 13px", background: bg, color: fg, borderRadius: 12,
                    boxShadow: T.shadowSm, border: assigned ? "none" : T.border,
                    display: "flex", alignItems: "center", gap: 8,
                    transition: "background 180ms",
                  }}>
                    <div style={{ display: "flex", gap: 4, flexShrink: 0 }}>
                      {letters.map(it => {
                        const isSel = assigned === it.l;
                        const isUsedByOther = Object.values(votes).includes(it.l) && !isSel;
                        return (
                          <button key={it.l} onClick={() => assign(idx, it.l)} disabled={isUsedByOther} style={{
                            width: 44, height: 44, borderRadius: 10,
                            background: isSel ? "#fff" : (isUsedByOther ? "rgba(0,0,0,0.05)" : "transparent"),
                            color: isSel ? it.c.main : (isUsedByOther ? "#A7A39F" : (assigned ? "rgba(255,255,255,0.7)" : it.c.main)),
                            border: isSel ? "none" : (isUsedByOther ? "1px solid rgba(0,0,0,0.08)" :
                              `1.5px solid ${assigned ? (assigned === "M" ? "rgba(0,0,0,0.25)" : "rgba(255,255,255,0.45)") : it.c.main}`),
                            fontSize: 13, fontWeight: 800, cursor: isUsedByOther ? "not-allowed" : "pointer",
                            opacity: isUsedByOther ? 0.55 : 1, padding: 0, fontFamily: T.font,
                          }}>{it.l}</button>
                        );
                      })}
                    </div>
                    <span style={{ flex: 1, textAlign: "right", fontSize: 17, fontWeight: 800, letterSpacing: -0.2, lineHeight: 1.2 }}>
                      {opt}
                    </span>
                  </div>
                );
              })}
            </div>
            <div style={{ flex: 1, minHeight: 12 }}/>
            <Btn T={T} onClick={submit} disabled={!allAssigned}>
              {allAssigned ? "שליחת ההצבעה" : `סמני עוד ${3 - Object.keys(votes).length}`}
            </Btn>
          </>
        )}
      </div>
    </ParticipantShell>
  );
}

function ParticipantShell({ T, children, code, brideName, onLeave, gameId }) {
  const titleByGame = { bridequiz: "חידון על הכלה", fmk: "Fuck Marry Kill" };
  const title = titleByGame[gameId] || "חוגגות";
  const scrollRef = React.useRef(null);

  // iOS Safari: when the soft keyboard appears, visualViewport shrinks.
  // We resize the scrollable container so content above the keyboard is reachable.
  React.useEffect(() => {
    const vv = window.visualViewport;
    if (!vv || !scrollRef.current) return;
    const update = () => {
      if (!scrollRef.current) return;
      scrollRef.current.style.height = vv.height + "px";
      scrollRef.current.style.top = vv.offsetTop + "px";
    };
    vv.addEventListener("resize", update);
    vv.addEventListener("scroll", update);
    return () => { vv.removeEventListener("resize", update); vv.removeEventListener("scroll", update); };
  }, []);

  return (
    <>
      <StatusBar T={T}/>
      <div ref={scrollRef} style={{ position: "absolute", top: 0, left: 0, right: 0, bottom: 0, display: "flex", flexDirection: "column", overflow: "auto", WebkitOverflowScrolling: "touch", overscrollBehavior: "contain" }}>

        {children}
      </div>
      <HomeBar/>
    </>
  );
}

/* ──────────────────────────────────────────────────────────────
   GROOM MODE — side entrance for the groom to answer the questionnaire
   ────────────────────────────────────────────────────────────── */
function ScreenGroomMode({ T, data, onSent }) {
  const questions = data?.q || [];

  // Build a stable per-questionnaire localStorage key so the groom can revisit the link
  // days later and find his previous answers waiting for him to edit.
  const questionnaireKey = React.useMemo(() => {
    if (!questions.length) return null;
    try {
      const fingerprint = questions.join("|").slice(0, 200);
      // Simple djb2 hash so we don't need a crypto API
      let h = 5381;
      for (let i = 0; i < fingerprint.length; i++) h = ((h << 5) + h + fingerprint.charCodeAt(i)) >>> 0;
      return `chogegot_groom_draft_${h.toString(36)}`;
    } catch (e) { return null; }
  }, [questions]);

  const initialAnswers = React.useMemo(() => {
    if (!questionnaireKey) return questions.map(() => "");
    try {
      const raw = localStorage.getItem(questionnaireKey);
      if (raw) {
        const saved = JSON.parse(raw);
        if (Array.isArray(saved) && saved.length === questions.length) return saved;
      }
    } catch (e) {}
    return questions.map(() => "");
  }, [questionnaireKey, questions]);

  const [answers, setAnswers] = React.useState(initialAnswers);
  const [sent, setSent] = React.useState(false);

  // Save the draft on every keystroke so the groom can leave + come back without losing anything.
  React.useEffect(() => {
    if (!questionnaireKey) return;
    try { localStorage.setItem(questionnaireKey, JSON.stringify(answers)); } catch (e) {}
  }, [questionnaireKey, answers]);

  const filledCount = answers.filter(a => a.trim()).length;
  const allFilled = filledCount === questions.length && questions.length > 0;
  const pct = questions.length ? Math.round((filledCount / questions.length) * 100) : 0;
  const hasPriorDraft = initialAnswers.some(a => a.trim());

  const update = (i, v) => setAnswers(answers.map((a, idx) => idx === i ? v : a));

  const submit = () => {
    if (!allFilled) return;
    const link = buildAnswersLink({
      a: answers.map(s => s.trim()),
      q: questions,
      bn: data.bn || "הכלה",
      en: data.en || "",
      gid: data.gid || "groomq",
    });
    // The return link goes back to the organizer, not the bride — keep the message neutral.
    const msg = `מילאתי! הנה התשובות שלי 💍\n${link}`;
    setSent(true);
    openWhatsApp(msg);
  };

  if (!questions.length) {
    return (
      <>
        <StatusBar T={T}/>
        <div style={{ position: "absolute", inset: 0, padding: "48px 24px", display: "flex", flexDirection: "column", justifyContent: "center", textAlign: "center" }}>
          <h1 style={{ fontSize: 22, fontWeight: 800, margin: 0 }}>הקישור לא תקין</h1>
          <p style={{ fontSize: 14, color: T.inkSoft, marginTop: 12, lineHeight: 1.5 }}>נראה שהשאלון פג או שהקישור נחתך באמצע. בקשי מהכלה לשלוח שאלון חדש.</p>
        </div>
        <HomeBar/>
      </>
    );
  }

  return (
    <>
      <StatusBar T={T}/>
      <div style={{ position: "absolute", inset: 0, padding: "48px 22px 24px", display: "flex", flexDirection: "column" }}>
        {/* Brand mini-header */}
        <div style={{ display: "flex", alignItems: "center", gap: 10, paddingTop: 4 }}>
          <div style={{ width: 28, height: 28, borderRadius: 8, background: T.accent,
            display: "flex", alignItems: "center", justifyContent: "center" }}>
            <Icon name="sparkle" size={16} color={T.onAccent} w={1.6}/>
          </div>
          <div style={{ fontSize: 14, fontWeight: 800, letterSpacing: -0.2 }}>חוגגות · שאלון לחתן</div>
        </div>

        {/* Hero */}
        <div style={{ marginTop: 18 }}>
          <Eyebrow T={T}>{data.en || "מסיבת רווקות"}</Eyebrow>
          <h1 style={{ fontSize: 26, fontWeight: 800, margin: "10px 0 0", letterSpacing: -0.4, lineHeight: 1.15 }}>
            {data.bn ? `${data.bn} רוצה לדעת...` : "הכלה רוצה לדעת..."}
          </h1>
          <p style={{ fontSize: 14, lineHeight: 1.6, color: T.inkSoft, marginTop: 10, fontWeight: 500 }}>
            ענה על כל השאלות בקצרה (משפט-שניים) ולחץ "שלחי לכלה". התשובות יחזרו אליה אוטומטית.
          </p>
        </div>

        {/* Progress */}
        <div style={{ marginTop: 14, padding: "10px 14px", background: T.surfaceAlt, borderRadius: T.radius,
          display: "flex", alignItems: "center", justifyContent: "space-between" }}>

        {/* Questions */}
        <div style={{ flex: 1, overflow: "auto", marginTop: 14, display: "flex", flexDirection: "column", gap: 14, paddingBottom: 8 }}>
          {questions.map((q, i) => (
            <div key={i}>
              <div style={{ display: "flex", alignItems: "baseline", gap: 8, marginBottom: 6 }}>

                  fontSize: 11, fontWeight: 800, flexShrink: 0,

                <div style={{ fontSize: 14.5, fontWeight: 700, color: T.ink, lineHeight: 1.35 }}>{q}</div>
              </div>
              <textarea
                value={answers[i]}
                onChange={e => update(i, e.target.value)}
                placeholder="התשובה שלי..."
                rows={2}
                style={{
                  width: "100%", padding: "11px 13px", borderRadius: T.radius,
                  border: `1px solid ${answers[i].trim() ? T.accent : T.lineStrong}`,
                  background: T.surface, color: T.ink,
                  fontSize: 16, fontWeight: 500, fontFamily: T.font,
                  outline: "none", resize: "vertical", minHeight: 50,
                  boxShadow: T.shadowSm, direction: "rtl",
                  WebkitAppearance: "none",
                }}/>
            </div>
          ))}
        </div>

        {sent ? (
          <div style={{ padding: "14px 16px", background: PB.orange.soft, color: PB.orange.deep,
            borderRadius: T.radius, fontSize: 13.5, fontWeight: 700, textAlign: "center" }}>
            ✓ נשלח! חזור לוואטסאפ ולחץ "שלח" כדי שיגיע לכלה.
          </div>
        ) : (
          <Btn T={T} icon="send" onClick={submit} disabled={!allFilled}>
            {allFilled ? "שלח בחזרה את התשובות" : `עוד ${questions.length - filledCount} שאלות`}
          </Btn>
        )}
      </div>
      <HomeBar/>
    </>
  );
}

function ScreenSlideshow({ T, slides, onDone, eventName }) {
  const scrollRef = React.useRef(null);
  const [idx, setIdx] = React.useState(0);
  const isLast = idx === slides.length - 1;

  const goTo = (newIdx) => {
    const clamped = Math.max(0, Math.min(slides.length - 1, newIdx));
    const w = scrollRef.current?.clientWidth || 0;
    scrollRef.current?.scrollTo({ left: clamped * w, behavior: "smooth" });
  };
  const onScroll = () => {
    const el = scrollRef.current; if (!el) return;
    const w = el.clientWidth; if (!w) return;
    const newIdx = Math.round(el.scrollLeft / w);
    if (newIdx !== idx) setIdx(newIdx);
  };

  return (
    <>
      <StatusBar T={T}/>
      <div style={{ position: "absolute", inset: 0, paddingTop: 48, paddingBottom: 28, display: "flex", flexDirection: "column" }}>
        {/* Header — skip on left, brand on right */}
        <div style={{ padding: "0 22px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <div style={{ width: 26, height: 26, borderRadius: 8, background: T.accent,
              display: "flex", alignItems: "center", justifyContent: "center" }}>
              <Icon name="sparkle" size={15} color={T.onAccent} w={1.6}/>
            </div>
            <div style={{ fontSize: 14, fontWeight: 800, letterSpacing: -0.2 }}>חוגגות</div>
          </div>
          <button onClick={onDone} style={{
            background: "transparent", border: "none",
            fontSize: 13, fontWeight: 600, color: T.inkSoft,
            cursor: "pointer", fontFamily: T.font, padding: "8px 4px",
          }}>דלגי</button>
        </div>

        {/* Slides scroller (LTR for predictable scroll math) */}
        <div ref={scrollRef} onScroll={onScroll} style={{
          flex: 1, overflowX: "auto", overflowY: "hidden",
          display: "flex", scrollSnapType: "x mandatory",
          scrollbarWidth: "none", direction: "ltr", WebkitOverflowScrolling: "touch",
        }}>
          {slides.map((s, i) => {
            const p = PB[s.pop || "pink"];
            const Mockup = s.Mockup;
            return (
              <div key={i} dir="rtl" style={{
                minWidth: "100%", scrollSnapAlign: "start",
                padding: "8px 20px 4px",
                display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "flex-start",
                textAlign: "center",
              }}>
                <div style={{ fontSize: 10.5, fontWeight: 700, letterSpacing: 1.8, textTransform: "uppercase", color: p.deep }}>
                  שלב {i + 1} / {slides.length}
                </div>
                <h1 style={{ fontSize: 20, fontWeight: 800, margin: "4px 0 6px", letterSpacing: -0.4, lineHeight: 1.15 }}>{s.title}</h1>
                {/* Description first so it's never clipped under the mockup */}
                <p style={{ fontSize: 12.5, color: T.inkSoft, lineHeight: 1.5, fontWeight: 500, margin: "0 0 10px", maxWidth: 290 }}>
                  {s.desc}
                </p>
                {Mockup ? <Mockup T={T}/> : null}
              </div>
            );
          })}
        </div>

        {/* Dots */}
        <div style={{ display: "flex", justifyContent: "center", gap: 7, padding: "14px 0 12px" }}>
          {slides.map((_, i) => (
            <button key={i} onClick={() => goTo(i)} aria-label={`לשקופית ${i+1}`} style={{
              width: i === idx ? 28 : 8, height: 8,
              borderRadius: 4,
              background: i === idx ? T.accent : T.lineStrong,
              border: "none", padding: 0, cursor: "pointer",
              transition: "all 250ms",
            }}/>
          ))}
        </div>

        {/* CTA */}
        <div style={{ padding: "0 22px" }}>
          <Btn T={T} onClick={isLast ? onDone : () => goTo(idx + 1)}>
            {isLast ? `כניסה ל${eventName || "הרווקות של מאיה"}` : "הבא"}
          </Btn>
        </div>
      </div>
      <HomeBar/>
    </>
  );
}

const buildSeedItems = () => {
  const out = [];
  CHECKLIST_SECTIONS.forEach(sec => sec.items.forEach((t, idx) =>
    out.push({ id: `${sec.id}-${idx}`, section: sec.id, t, done: false, custom: false })));
  return out;
};

function ScreenChecklist({ T, onBack }) {
  const [items, setItems] = usePersistedState("chogegot_checklist_items", buildSeedItems);

  // One-time migration: surface any newly-added seed items to existing users whose
  // localStorage was filled before the new rows were defined. Anything they've already
  // ticked / removed stays as-is; we only append the missing seed IDs.
  React.useEffect(() => {
    if (!Array.isArray(items)) { setItems(buildSeedItems()); return; }
    const existingIds = new Set(items.map(i => i.id));
    const seed = buildSeedItems();
    const missing = seed.filter(s => !existingIds.has(s.id));
    if (missing.length > 0) setItems(prev => [...(Array.isArray(prev) ? prev : []), ...missing]);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);
  const [adding, setAdding] = React.useState("");
  const [addingTo, setAddingTo] = React.useState(CHECKLIST_SECTIONS[0].id);

  const done = items.filter(i => i.done).length;
  const pct = Math.round((done / items.length) * 100);
  const toggle = id => setItems(items.map(i => i.id === id ? { ...i, done: !i.done } : i));
  const removeItem = id => setItems(items.filter(i => i.id !== id));
  const add = () => {
    if (!adding.trim()) return;
    setItems([...items, { id: `c-${Date.now()}`, section: addingTo, t: adding.trim(), done: false, custom: true }]);
    setAdding("");
  };

  return (
    <>
      <StatusBar T={T}/>
      <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column" }}>
        {/* Pink header with progress — slim */}
        <div style={{
          background: `linear-gradient(160deg, ${PB.pink.main} 0%, #EAB0C2 60%, ${PB.pink.deep} 130%)`,
          padding: "36px 22px 14px",
          borderRadius: "0 0 22px 22px",
          color: "#1A1A1A",
          boxShadow: `0 6px 18px -10px ${PB.pink.main}66`,
          position: "relative", overflow: "hidden", flexShrink: 0,
        }}>
          <div style={{
            position: "absolute", top: -30, right: -40,
            width: 110, height: 110, borderRadius: "50%",
            background: "rgba(255,255,255,0.18)", pointerEvents: "none",
          }}/>

          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", position: "relative" }}>
            <RoundBtn T={T} icon="chevR" onClick={onBack} dark/>
            <div style={{ fontSize: 13, fontWeight: 800, letterSpacing: 0.3, color: "#1A1A1A" }}>צ'קליסט המארגנת</div>
            <div style={{ width: 40 }}/>
          </div>

          <div style={{ marginTop: 12, position: "relative", display: "flex", alignItems: "flex-end", justifyContent: "space-between", gap: 12 }}>
            <div>
              <div style={{ fontSize: 11.5, color: "rgba(26,26,26,0.78)", fontWeight: 700, letterSpacing: 0.4 }}>משימות לארגון</div>
              <div className="num" style={{ fontSize: 30, fontWeight: 800, letterSpacing: -0.5, color: "#1A1A1A", lineHeight: 1, marginTop: 2 }}>{done}<span style={{ opacity: 0.55, fontSize: 22 }}>/{items.length}</span></div>
            </div>
            <div style={{ padding: "5px 12px", borderRadius: 999,
              background: "#1A1A1A", color: "#fff",
              fontSize: 13, fontWeight: 800, letterSpacing: 0.3 }} className="num">{pct}%</div>
          </div>

          <div style={{ marginTop: 10, height: 5, background: "rgba(0,0,0,0.18)", borderRadius: 999, overflow: "hidden", position: "relative" }}>
            <div style={{ height: "100%", width: `${pct}%`, background: "#1A1A1A", borderRadius: 999, transition: "width 300ms" }}/>
          </div>
        </div>

        {/* Sections */}
        <div style={{ flex: 1, overflow: "auto", padding: "20px 22px 14px", display: "flex", flexDirection: "column", gap: 18 }}>
          {CHECKLIST_SECTIONS.map((sec, sidx) => {
            const sectionItems = items.filter(i => i.section === sec.id);
            const secDone = sectionItems.filter(i => i.done).length;
            const secPct = sectionItems.length ? Math.round((secDone / sectionItems.length) * 100) : 0;
            // Rotate through orange, pink, black for visual variety across timeline sections.
            const palette = [PB.orange, PB.pink, PB.ink, PB.orange, PB.pink, PB.ink];
            const sp = palette[sidx % palette.length];
            return (
              <div key={sec.id}>
                <div style={{
                  display: "flex", alignItems: "center", justifyContent: "space-between",
                  marginBottom: 10, padding: "8px 12px",
                  background: sp.soft, borderRadius: 12,

                  <div>
                    <div style={{ fontSize: 16, fontWeight: 800, color: sp.deep, letterSpacing: -0.2 }}>{sec.t}</div>
                    <div style={{ fontSize: 11.5, color: sp.deep, fontWeight: 600, marginTop: 1, letterSpacing: 0.3, opacity: 0.75 }}>{sec.sub}</div>
                  </div>
                  <div className="num" style={{ fontSize: 12.5, fontWeight: 800, color: sp.on,
                    background: sp.main, padding: "4px 10px", borderRadius: 999 }}>

                <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>

                      }}>{it.t}</div>
                      <button onClick={() => removeItem(it.id)} title="הסרת משימה" style={{
                        width: 26, height: 26, borderRadius: 7, background: "transparent",
                        border: "none", cursor: "pointer", padding: 0,
                        display: "flex", alignItems: "center", justifyContent: "center",
                      }}><Icon name="close" size={13} color={T.muted} w={1.6}/></button>
                    </div>

                </div>
              </div>
            );
          })}
          <div style={{ height: 4 }}/>
        </div>

        {/* Add row */}
        <div style={{ display: "flex", gap: 6, padding: "10px 22px 24px", flexShrink: 0, background: T.surface,

            outline: "none", maxWidth: 110,
          }}>
            {CHECKLIST_SECTIONS.map(s => <option key={s.id} value={s.id}>{s.t}</option>)}
          </select>
          <input
            value={adding} onChange={e => setAdding(e.target.value)}

            style={{
