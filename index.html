<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>חוגגות</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: #F6F3F1;
    font-family: "Assistant", system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased; color: #1A1A1A;
  }
  #root { width: 100%; min-height: 100vh; }

  @keyframes screenIn { from { transform: translateY(6px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  @keyframes cardIn { 0% { transform: translateY(8px); opacity: 0; } 100% { transform: none; opacity: 1; } }
  @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.04); } }

  input, select, button { font-family: inherit; }
  input::placeholder { color: #A7A39F; font-weight: 500; }
  ::-webkit-scrollbar { width: 0; height: 0; }

  /* Tighter Hebrew rhythm + nice tabular numbers */
  body { letter-spacing: -0.1px; }
  .num { font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script type="text/babel">
/* ──────────────────────────────────────────────────────────────
   THEME — variant B "Love · Laugh · Get Lucky"
   White base + accent that shifts per screen (orange / pink / ink)
   ────────────────────────────────────────────────────────────── */
const T_BASE = {
  bg:           "#FFFFFF",
  surface:      "#FFFFFF",
  surfaceAlt:   "#F6F3F1",
  surfaceInk:   "#161616",
  ink:          "#1A1A1A",
  inkSoft:      "#6B6764",
  muted:        "#A7A39F",
  line:         "#ECE8E4",
  lineStrong:   "#DBD6D1",
  ok:           "#E8512A",
  okSoft:       "#FBE4DB",
  warn:         "#E8512A",
  warnSoft:     "#FBE4DB",
  radius:       18,
  radiusLg:     22,
  radiusSm:     12,
  font:         '"Assistant", system-ui, sans-serif',
  shadow:       "0 2px 6px rgba(20,18,16,0.05), 0 12px 26px -16px rgba(20,18,16,0.15)",
  shadowSm:     "0 1px 3px rgba(20,18,16,0.06)",
  shadowLg:     "0 4px 12px rgba(20,18,16,0.08), 0 24px 48px -20px rgba(20,18,16,0.18)",
  border:       "1px solid #ECE8E4",
};

const SKINS = {
  orange: { accent: "#E8512A", accentDeep: "#C73E1C", accentSoft: "#FBE4DB", onAccent: "#FFFFFF" },
  pink:   { accent: "#EAA0BA", accentDeep: "#C75E82", accentSoft: "#F9E8EE", onAccent: "#1A1A1A" },
  ink:    { accent: "#1A1A1A", accentDeep: "#000000", accentSoft: "#ECEAE8", onAccent: "#FFFFFF" },
};
// PB — palette using design's exact property names (main/deep/soft/on)
const PB = {
  orange: { main: "#E8512A", deep: "#C73E1C", soft: "#FBE4DB", on: "#FFFFFF" },
  pink:   { main: "#EAA0BA", deep: "#C75E82", soft: "#F9E8EE", on: "#1A1A1A" },
  ink:    { main: "#1A1A1A", deep: "#000000", soft: "#ECEAE8", on: "#FFFFFF" },
};

const skin = (name) => ({ ...T_BASE, ...SKINS[name], _skin: name });

// per-screen skin assignment
const SCREEN_SKIN = {
  welcome: "orange", smsVerify: "orange", username: "orange",
  event: "pink", nameEvent: "pink", slideshow: "pink",
  bachHome: "ink", qrjoin: "ink", comingSoon: "ink",
  checklist: "orange", playlist: "ink", budget: "orange",
  games: "ink", game: "ink",
};

/* ──────────────────────────────────────────────────────────────
   THIN-LINE ICONS (stroke 1.5)
   ────────────────────────────────────────────────────────────── */
const Icon = ({ name, size = 22, color = "currentColor", w = 1.5 }) => {
  const s = { width: size, height: size, display: "block", flexShrink: 0 };
  const p = { stroke: color, strokeWidth: w, strokeLinecap: "round", strokeLinejoin: "round", fill: "none" };
  const paths = {
    sparkle: <><path d="M12 4l1.8 4.8L18.5 10.5 13.8 12.2 12 17l-1.8-4.8L5.5 10.5l4.7-1.7L12 4z" {...p}/><path d="M18.5 4.5l.6 1.7 1.7.6-1.7.6-.6 1.7-.6-1.7-1.7-.6 1.7-.6.6-1.7z" {...p}/></>,
    lock: <><rect x="5" y="10.5" width="14" height="9.5" rx="2.5" {...p}/><path d="M8 10.5V8a4 4 0 0 1 8 0v2.5" {...p}/></>,
    chevL: <path d="M14.5 6l-6 6 6 6" {...p}/>,
    chevR: <path d="M9.5 6l6 6-6 6" {...p}/>,
    chevD: <path d="M6 9.5l6 6 6-6" {...p}/>,
    check: <path d="M5 12.5l4.5 4.5L19 7.5" {...p}/>,
    close: <path d="M6 6l12 12M18 6L6 18" {...p}/>,
    plus: <path d="M12 6v12M6 12h12" {...p}/>,
    ring: <><circle cx="12" cy="14.5" r="5.5" {...p}/><path d="M9.2 9.6L12 4l2.8 5.6" {...p}/></>,
    cake: <><path d="M4 20h16M5 14.5h14V20H5zM7.5 14.5v-4a4.5 4.5 0 0 1 9 0v4M12 3v3" {...p}/></>,
    rocket: <><path d="M5.5 14.5l-2 5.5 5.5-2M14.5 4.5c4 .2 5 1.2 5.2 5.2l-7 7-5.4-5.4 7.2-6.8z" {...p}/><circle cx="14.2" cy="9.8" r="1.6" {...p}/></>,
    heart: <path d="M12 19.5s-6.5-4.2-6.5-9A3.6 3.6 0 0 1 12 8a3.6 3.6 0 0 1 6.5 2.5c0 4.8-6.5 9-6.5 9z" {...p}/>,
    list: <><path d="M9 6.5h11M9 12h11M9 17.5h7" {...p}/><circle cx="4.5" cy="6.5" r="1" fill={color} stroke="none"/><circle cx="4.5" cy="12" r="1" fill={color} stroke="none"/><circle cx="4.5" cy="17.5" r="1" fill={color} stroke="none"/></>,
    music: <><path d="M9 17V5.5l10-2V15" {...p}/><circle cx="6.3" cy="17.2" r="2.7" {...p}/><circle cx="16.3" cy="14.8" r="2.7" {...p}/></>,
    wallet: <><rect x="3.5" y="6" width="17" height="13" rx="2.6" {...p}/><path d="M3.5 9.5h17M16.5 13.8h.01" {...p}/></>,
    camera: <><rect x="3.5" y="7" width="17" height="12.5" rx="2.6" {...p}/><circle cx="12" cy="13.2" r="3.6" {...p}/><path d="M8.5 7l1.5-2.4h4L15.5 7" {...p}/></>,
    tv: <><rect x="3.5" y="5.5" width="17" height="11" rx="2.2" {...p}/><path d="M9 20h6M12 16.5V20" {...p}/></>,
    dots: <><circle cx="5" cy="12" r="1.4" fill={color} stroke="none"/><circle cx="12" cy="12" r="1.4" fill={color} stroke="none"/><circle cx="19" cy="12" r="1.4" fill={color} stroke="none"/></>,
    home: <><path d="M3.5 11l8.5-7.5L20.5 11M5.5 9.5V20h13V9.5" {...p}/><path d="M10 20v-5.5h4V20" {...p}/></>,
    share: <><path d="M12 3.5v11M8.5 7L12 3.5 15.5 7M6 13v5.5a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V13" {...p}/></>,
    users: <><circle cx="9" cy="8.5" r="3" {...p}/><path d="M3.5 19c0-3 2.7-4.8 5.5-4.8s5.5 1.8 5.5 4.8M16 6a2.8 2.8 0 0 1 0 5.6M20.5 19c0-2.4-1.6-3.9-3.8-4.4" {...p}/></>,
    send: <path d="M20 4L3.5 11.2l6.4 2.4L12.3 20 20 4z" {...p}/>,
    clock: <><circle cx="12" cy="12" r="9" {...p}/><path d="M12 7v5l3 2" {...p}/></>,
    play: <path d="M7 5l12 7-12 7V5z" fill={color} stroke="none"/>,
    spotify: <><circle cx="12" cy="12" r="9" fill="#1DB954" stroke="none"/><path d="M7.2 10.2c3-.8 6.5-.6 9.2 1M7.8 13c2.4-.6 5.2-.5 7.4 .9M8.2 15.6c1.9-.4 4.1-.3 5.8 .7" stroke="#fff" strokeWidth="1.4" strokeLinecap="round" fill="none"/></>,
    star: <path d="M12 4l2.2 4.9 5.3.5-4 3.6 1.2 5.2L12 16l-4.7 2.7 1.2-5.2-4-3.6 5.3-.5L12 4z" {...p}/>,
    qr: <><rect x="4" y="4" width="6.5" height="6.5" rx="1.4" {...p}/><rect x="13.5" y="4" width="6.5" height="6.5" rx="1.4" {...p}/><rect x="4" y="13.5" width="6.5" height="6.5" rx="1.4" {...p}/><path d="M13.5 13.5h3v3h-3zM20 13.5v3M13.5 20h3v.5M20 20h.5" {...p}/></>,
  };
  return <svg viewBox="0 0 24 24" style={s}>{paths[name] || null}</svg>;
};

/* ──────────────────────────────────────────────────────────────
   SHELL & PRIMITIVES
   ────────────────────────────────────────────────────────────── */
function PhoneShell({ children, T }) {
  const [isMobile, setIsMobile] = React.useState(window.innerWidth <= 480);
  React.useEffect(() => {
    const h = () => setIsMobile(window.innerWidth <= 480);
    h(); window.addEventListener("resize", h);
    return () => window.removeEventListener("resize", h);
  }, []);

  if (isMobile) {
    return (
      <div style={{
        position: "fixed", inset: 0, background: T.bg, direction: "rtl",
        fontFamily: T.font, color: T.ink, overflow: "hidden",
      }}>{children}</div>
    );
  }
  return (
    <div style={{
      minHeight: "100vh", width: "100%",
      background: "radial-gradient(circle at 0% 0%, #FBE4DB22 0%, transparent 40%), radial-gradient(circle at 100% 100%, #F9E8EE22 0%, transparent 40%), #F2EFEB",
      display: "flex", alignItems: "center", justifyContent: "center",
      padding: "24px", fontFamily: T.font,
    }}>
      <div style={{
        width: 380, height: 760, background: T.bg,
        borderRadius: 46, overflow: "hidden", position: "relative",
        direction: "rtl", color: T.ink,
        boxShadow: "0 36px 80px -28px rgba(20,18,16,0.30), 0 0 0 1px rgba(20,18,16,0.05), inset 0 0 0 6px #1A1A1A, inset 0 0 0 7px #2A2A2A",
      }}>{children}</div>
    </div>
  );
}

function StatusBar({ T, dark = false }) {
  const c = dark ? "#FFFFFF" : T.ink;
  return (
    <div style={{
      position: "absolute", top: 0, left: 0, right: 0,
      height: 42, display: "flex", alignItems: "center", justifyContent: "space-between",
      padding: "0 24px", color: c, fontSize: 13.5, fontWeight: 700,
      zIndex: 50, direction: "ltr", letterSpacing: 0.2,
    }}>
      <span className="num">9:41</span>
      <span style={{ display: "flex", gap: 6, alignItems: "center" }}>
        <svg width="17" height="11" viewBox="0 0 17 11" fill="none">
          <rect x="0" y="7" width="2.6" height="4" rx="0.6" fill="currentColor"/>
          <rect x="3.8" y="5" width="2.6" height="6" rx="0.6" fill="currentColor"/>
          <rect x="7.6" y="2.6" width="2.6" height="8.4" rx="0.6" fill="currentColor"/>
          <rect x="11.4" y="0" width="2.6" height="11" rx="0.6" fill="currentColor" opacity="0.4"/>
        </svg>
        <svg width="22" height="11" viewBox="0 0 22 11" fill="none">
          <rect x="0.6" y="0.6" width="18" height="9.8" rx="3" stroke="currentColor" strokeWidth="1" opacity="0.5"/>
          <rect x="2.2" y="2.2" width="13.5" height="6.6" rx="1.6" fill="currentColor"/>
          <rect x="20" y="3.4" width="1.6" height="4.2" rx="0.8" fill="currentColor" opacity="0.5"/>
        </svg>
      </span>
    </div>
  );
}

function HomeBar({ dark = false }) {
  return (
    <div style={{
      position: "absolute", bottom: 9, left: "50%", transform: "translateX(-50%)",
      width: 130, height: 5, borderRadius: 3,
      background: dark ? "rgba(255,255,255,0.85)" : "rgba(26,26,26,0.85)", zIndex: 50,
    }}/>
  );
}

/* Pill button */
function Btn({ T, children, onClick, variant = "primary", icon, disabled = false, style, size = "lg" }) {
  const [pressed, setPressed] = React.useState(false);
  const variants = {
    primary: { bg: T.accent, fg: T.onAccent, border: "none", shadow: T.shadowSm },
    ink:     { bg: T.surfaceInk, fg: "#FFFFFF", border: "none", shadow: T.shadowSm },
    quiet:   { bg: T.surface, fg: T.ink, border: T.border, shadow: T.shadowSm },
    ok:      { bg: T.ok, fg: "#FFFFFF", border: "none", shadow: T.shadowSm },
  };
  const v = variants[variant];
  const sz = size === "sm" ? { padding: "10px 16px", fs: 14 }
           : size === "md" ? { padding: "13px 18px", fs: 15 }
           : { padding: "15px 22px", fs: 16 };
  return (
    <button
      onMouseDown={() => setPressed(true)} onMouseUp={() => setPressed(false)} onMouseLeave={() => setPressed(false)}
      onTouchStart={() => setPressed(true)} onTouchEnd={() => setPressed(false)}
      onClick={disabled ? undefined : onClick} disabled={disabled}
      style={{
        width: "100%", display: "flex", alignItems: "center", justifyContent: "center", gap: 9,
        padding: sz.padding, fontSize: sz.fs, fontWeight: 700, fontFamily: T.font,
        background: disabled ? T.surfaceAlt : v.bg,
        color: disabled ? T.muted : v.fg,
        border: v.border === "none" ? "none" : v.border,
        borderRadius: T.radius, cursor: disabled ? "not-allowed" : "pointer",
        boxShadow: v.shadow, letterSpacing: 0.1,
        transform: pressed && !disabled ? "translateY(1px)" : "none",
        transition: "transform 80ms, background-color 120ms",
        opacity: disabled ? 0.8 : 1, ...style,
      }}
    >{icon && <Icon name={icon} size={18} color={disabled ? T.muted : v.fg} w={1.6}/>}{children}</button>
  );
}

/* Round icon button (40x40) */
function RoundBtn({ T, icon, onClick, dark = false, style }) {
  return (
    <button onClick={onClick} style={{
      width: 40, height: 40, borderRadius: 12, flexShrink: 0,
      background: dark ? "rgba(255,255,255,0.12)" : T.surface,
      border: dark ? "1px solid rgba(255,255,255,0.18)" : T.border,
      display: "flex", alignItems: "center", justifyContent: "center",
      boxShadow: dark ? "none" : T.shadowSm, cursor: "pointer", padding: 0,
      transition: "transform 80ms", ...style,
    }}>
      <Icon name={icon} size={18} color={dark ? "#fff" : T.ink} w={1.5}/>
    </button>
  );
}

/* Eyebrow uppercase label */
function Eyebrow({ T, children, color }) {
  return <div style={{
    fontSize: 11.5, fontWeight: 700, letterSpacing: 1.8,
    textTransform: "uppercase", color: color || T.accent,
  }}>{children}</div>;
}

/* StepRail (3 dots) */
function StepRail({ T, step }) {
  return (
    <div style={{ display: "flex", gap: 5, alignItems: "center" }}>
      {[1, 2, 3].map(i => (
        <div key={i} style={{
          height: 4, borderRadius: 2, transition: "all 200ms",
          width: i === step ? 24 : 9,
          background: i <= step ? T.accent : T.lineStrong,
        }}/>
      ))}
    </div>
  );
}

/* Card (white surface, hairline) */
function Card({ T, children, padding = 16, style, onClick, dark = false }) {
  return (
    <div onClick={onClick} style={{
      background: dark ? T.surfaceInk : T.surface,
      color: dark ? "#FFFFFF" : T.ink,
      border: dark ? "none" : T.border,
      borderRadius: T.radiusLg, boxShadow: dark ? T.shadow : T.shadowSm,
      padding, cursor: onClick ? "pointer" : "default", ...style,
    }}>{children}</div>
  );
}

/* TopBar — back button + optional title + optional right */
function TopBar({ T, onBack, title, step, right, dark = false }) {
  return (
    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", paddingTop: 6 }}>
      {onBack ? <RoundBtn T={T} icon="chevR" onClick={onBack} dark={dark}/> : <div style={{ width: 40 }}/>}
      {title && (
        <div style={{ fontSize: 16, fontWeight: 700, color: dark ? "#fff" : T.ink, letterSpacing: -0.2 }}>{title}</div>
      )}
      {step ? <StepRail T={T} step={step}/> : (right || <div style={{ width: 40 }}/>)}
    </div>
  );
}

/* ──────────────────────────────────────────────────────────────
   ONBOARDING — Welcome / Username / EventPicker / NameEvent
   ────────────────────────────────────────────────────────────── */
const VALID_CODE = "123456";

function ScreenWelcome({ T, onNext }) {
  const [code, setCode] = React.useState(["", "", "", "", "", ""]);
  const inputsRef = React.useRef([]);
  React.useEffect(() => { inputsRef.current[0]?.focus(); }, []);

  const setDigit = (i, v) => {
    const clean = (v || "").replace(/[^0-9]/g, "");
    if (!clean) { const next = [...code]; next[i] = ""; setCode(next); return; }
    if (clean.length > 1) {
      const next = [...code];
      for (let k = 0; k < clean.length && i + k < 6; k++) next[i + k] = clean[k];
      setCode(next);
      inputsRef.current[Math.min(i + clean.length, 5)]?.focus(); return;
    }
    const next = [...code]; next[i] = clean; setCode(next);
    if (i < 5) inputsRef.current[i + 1]?.focus();
  };
  const onKey = (i, e) => {
    if (e.key === "Backspace") {
      if (code[i]) { const next = [...code]; next[i] = ""; setCode(next); }
      else if (i > 0) { inputsRef.current[i - 1]?.focus(); const n = [...code]; n[i-1]=""; setCode(n); }
      e.preventDefault();
    } else if (e.key === "ArrowLeft" && i < 5) inputsRef.current[i + 1]?.focus();
    else if (e.key === "ArrowRight" && i > 0) inputsRef.current[i - 1]?.focus();
  };
  const filled = code.every(c => c.length === 1);
  const isValid = code.join("") === VALID_CODE;
  const isWrong = filled && !isValid;

  return (
    <>
      <StatusBar T={T}/>
      <div style={{ position: "absolute", inset: 0, padding: "48px 22px 28px", display: "flex", flexDirection: "column" }}>
        {/* Wordmark */}
        <div style={{ display: "flex", alignItems: "center", gap: 10, paddingTop: 4 }}>
          <div style={{ width: 32, height: 32, borderRadius: 9, background: T.accent,
            display: "flex", alignItems: "center", justifyContent: "center" }}>
            <Icon name="sparkle" size={18} color={T.onAccent} w={1.6}/>
          </div>
          <div style={{ fontSize: 20, fontWeight: 800, letterSpacing: -0.3 }}>חוגגות</div>
        </div>

        {/* Hero */}
        <div style={{ flex: 1, display: "flex", flexDirection: "column", justifyContent: "center" }}>
          <Eyebrow T={T}>ברוכים הבאים!</Eyebrow>
          <h1 style={{ fontSize: 32, fontWeight: 800, lineHeight: 1.15, margin: "12px 0 0", letterSpacing: -0.6 }}>
            איזה כיף<br/>שהצטרפתם.ן
          </h1>
          <p style={{ fontSize: 15, lineHeight: 1.65, color: T.inkSoft, margin: "16px 0 0", maxWidth: 300, fontWeight: 500 }}>
            לפני כל הכיף, הזינו את הקוד שנשלח לכם.ן למייל ממש כאן למטה.
          </p>
        </div>

        {/* Code */}
        <div style={{ marginBottom: 14 }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
            <span style={{ fontSize: 13, fontWeight: 700, color: T.ink }}>הקוד הסודי שלי</span>
            <span style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 12.5, color: T.muted, fontWeight: 600 }}>
              <Icon name="lock" size={14} color={T.muted} w={1.5}/> 6 ספרות
            </span>
          </div>
          <div style={{ display: "flex", gap: 8, direction: "ltr" }}>
            {code.map((ch, i) => {
              const active = !isWrong && (ch || (i === code.findIndex(c => !c)));
              return (
                <input key={i}
                  ref={el => { inputsRef.current[i] = el; }}
                  value={ch}
                  onChange={e => setDigit(i, e.target.value)}
                  onKeyDown={e => onKey(i, e)}
                  onFocus={e => e.target.select()}
                  inputMode="numeric" autoComplete="one-time-code" pattern="[0-9]*"
                  style={{
                    flex: 1, width: 0, height: 56, borderRadius: 13,
                    background: isWrong ? "#FDEDE9" : T.surfaceAlt,
                    boxShadow: isWrong ? `inset 0 0 0 1.5px ${T.accent}` :
                              active ? `inset 0 0 0 1.5px ${T.accent}` :
                              `inset 0 0 0 1px ${T.line}`,
                    border: "none", textAlign: "center",
                    fontSize: 24, fontWeight: 700, color: T.ink,
                    outline: "none", padding: 0, direction: "ltr",
                    fontVariantNumeric: "tabular-nums",
                  }}/>
              );
            })}
          </div>
          <div style={{ marginTop: 12, fontSize: 12.5, color: isWrong ? T.accent : T.inkSoft, fontWeight: 500 }}>
            {isWrong ? "אופס, הקוד לא נכון. נסי שוב." : (
              <>רמז (לדמו): <span style={{ color: T.accent, fontWeight: 700 }}>123456</span></>
            )}
          </div>
        </div>

        <Btn T={T} onClick={onNext} disabled={!isValid}>
          {isValid ? "יאללה, נכנסות" : isWrong ? "קוד שגוי" : "ממלאות קוד..."}
        </Btn>
        <div style={{ textAlign: "center", marginTop: 14, fontSize: 13, color: T.inkSoft, fontWeight: 500 }}>
          עוד לא רכשת? <span style={{ color: T.accent, fontWeight: 700, borderBottom: `1.5px solid ${T.accentSoft}` }}>בואי נסדר את זה</span>
        </div>
      </div>
      <HomeBar/>

/* ──────────────────────────────────────────────────────────────
   SMS PHONE VERIFICATION (after email code)
   ────────────────────────────────────────────────────────────── */
const VALID_SMS_CODE = "654321";

function ScreenSmsVerify({ T, onNext, onBack }) {
  const [code, setCode] = React.useState(["", "", "", "", "", ""]);
  const [seconds, setSeconds] = React.useState(45);
  const inputsRef = React.useRef([]);
  React.useEffect(() => { inputsRef.current[0]?.focus(); }, []);
  React.useEffect(() => {
    if (seconds <= 0) return;
    const t = setTimeout(() => setSeconds(s => s - 1), 1000);
    return () => clearTimeout(t);
  }, [seconds]);

  const setDigit = (i, v) => {
    const clean = (v || "").replace(/[^0-9]/g, "");
    if (!clean) { const next = [...code]; next[i] = ""; setCode(next); return; }
    if (clean.length > 1) {
      const next = [...code];
      for (let k = 0; k < clean.length && i + k < 6; k++) next[i + k] = clean[k];
      setCode(next);
      inputsRef.current[Math.min(i + clean.length, 5)]?.focus(); return;
    }
    const next = [...code]; next[i] = clean; setCode(next);
    if (i < 5) inputsRef.current[i + 1]?.focus();
  };
  const onKey = (i, e) => {
    if (e.key === "Backspace") {
      if (code[i]) { const next = [...code]; next[i] = ""; setCode(next); }
      else if (i > 0) { inputsRef.current[i - 1]?.focus(); const n = [...code]; n[i-1]=""; setCode(n); }
      e.preventDefault();
    } else if (e.key === "ArrowLeft" && i < 5) inputsRef.current[i + 1]?.focus();
    else if (e.key === "ArrowRight" && i > 0) inputsRef.current[i - 1]?.focus();
  };
  const filled = code.every(c => c.length === 1);
  const isValid = code.join("") === VALID_SMS_CODE;
  const isWrong = filled && !isValid;

  return (
    <>
      <StatusBar T={T}/>
      <div style={{ position: "absolute", inset: 0, padding: "48px 24px 28px", display: "flex", flexDirection: "column" }}>
        <TopBar T={T} onBack={onBack}/>

        <div style={{ flex: 1, display: "flex", flexDirection: "column", justifyContent: "center" }}>
          <Eyebrow T={T}>אימות בטחוני</Eyebrow>
          <h1 style={{ fontSize: 30, fontWeight: 800, lineHeight: 1.15, margin: "12px 0 0", letterSpacing: -0.5 }}>
            אימות מספר<br/>הנייד שלכם.ן
          </h1>
          <p style={{ fontSize: 15, lineHeight: 1.65, color: T.inkSoft, margin: "16px 0 0", maxWidth: 300, fontWeight: 500 }}>
            שלחנו קוד בן 6 ספרות למספר שמסרת ברכישה. הזיני אותו כדי להמשיך.<br/>
            <span style={{ fontSize: 12, color: T.muted }}>(הקוד מבטיח שהאפליקציה לא מועברת למישהי אחרת.)</span>
          </p>
        </div>

        <div style={{ marginBottom: 14 }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
            <span style={{ fontSize: 13, fontWeight: 700, color: T.ink }}>קוד מ-SMS</span>
            <span style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 12.5, color: T.muted, fontWeight: 600 }}>
              <Icon name="lock" size={14} color={T.muted} w={1.5}/> ***1234
            </span>
          </div>
          <div style={{ display: "flex", gap: 8, direction: "ltr" }}>
            {code.map((ch, i) => {
              const active = !isWrong && (ch || (i === code.findIndex(c => !c)));
              return (
                <input key={i}
                  ref={el => { inputsRef.current[i] = el; }}
                  value={ch}
                  onChange={e => setDigit(i, e.target.value)}
                  onKeyDown={e => onKey(i, e)}
                  onFocus={e => e.target.select()}
                  inputMode="numeric" autoComplete="one-time-code" pattern="[0-9]*"
                  style={{
                    flex: 1, width: 0, height: 56, borderRadius: 13,
                    background: isWrong ? "#FDEDE9" : T.surfaceAlt,
                    boxShadow: isWrong ? `inset 0 0 0 1.5px ${T.accent}` :
                              active ? `inset 0 0 0 1.5px ${T.accent}` :
                              `inset 0 0 0 1px ${T.line}`,
                    border: "none", textAlign: "center",
                    fontSize: 24, fontWeight: 700, color: T.ink,
                    outline: "none", padding: 0, direction: "ltr",
                    fontVariantNumeric: "tabular-nums",
                  }}/>
              );
            })}
          </div>
          <div style={{ marginTop: 12, fontSize: 12.5, color: isWrong ? T.accent : T.inkSoft, fontWeight: 500 }}>
            {isWrong ? "אופס, הקוד לא נכון. נסי שוב." : (
              <>רמז (לדמו): <span style={{ color: T.accent, fontWeight: 700 }}>654321</span></>
            )}
          </div>
        </div>

        <Btn T={T} onClick={onNext} disabled={!isValid}>
          {isValid ? "אישור והמשך" : isWrong ? "קוד שגוי" : "ממתינות לקוד..."}
        </Btn>
        <div style={{ textAlign: "center", marginTop: 14, fontSize: 13, color: T.inkSoft, fontWeight: 500 }}>
          {seconds > 0 ? (
            <>לא קיבלת? אפשר לשלוח שוב בעוד <b className="num" style={{ color: T.ink }}>{seconds}</b> שניות</>
          ) : (
            <span onClick={() => setSeconds(45)} style={{ color: T.accent, fontWeight: 700, cursor: "pointer", borderBottom: `1.5px solid ${T.accentSoft}` }}>שלחי לי קוד חדש</span>
          )}
        </div>
      </div>
      <HomeBar/>
    </>
  );
}

/* ──────────────────────────────────────────────────────────────
   MINI QR (refined modules)
   ────────────────────────────────────────────────────────────── */
function MiniQR({ size = 70, color = "#161616", bg = "#fff", radius = 10 }) {
  const N = 11;
  const seed = (x, y) => ((x * 37 + y * 19 + x * y * 7) % 13) > 6;
  const finder = (x, y) => (x < 3 && y < 3) || (x >= N - 3 && y < 3) || (x < 3 && y >= N - 3);
  const u = size / N, cells = [];
  for (let y = 0; y < N; y++) for (let x = 0; x < N; x++) {
    if (finder(x, y)) continue;
    if (seed(x, y)) cells.push({ x, y });
  }
  const F = ({ ox, oy }) => (
    <><rect x={ox * u} y={oy * u} width={3 * u} height={3 * u} rx={u * 0.7} fill={color}/>
      <rect x={(ox + 0.7) * u} y={(oy + 0.7) * u} width={1.6 * u} height={1.6 * u} rx={u * 0.4} fill={bg}/></>
  );
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ display: "block", borderRadius: radius }}>
      <rect width={size} height={size} fill={bg} rx={radius}/>
      {cells.map((c, i) => <rect key={i} x={c.x*u+u*0.12} y={c.y*u+u*0.12} width={u*0.76} height={u*0.76} rx={u*0.25} fill={color}/>)}
      <F ox={0} oy={0}/><F ox={N-3} oy={0}/><F ox={0} oy={N-3}/>
    </svg>
  );
}

function ScreenSlideshow({ T, slides, onDone, eventName }) {
  const scrollRef = React.useRef(null);
  const [idx, setIdx] = React.useState(0);
  const isLast = idx === slides.length - 1;

  const goTo = (newIdx) => {
    const clamped = Math.max(0, Math.min(slides.length - 1, newIdx));
    const w = scrollRef.current?.clientWidth || 0;
    scrollRef.current?.scrollTo({ left: clamped * w, behavior: "smooth" });
  };
  const onScroll = () => {
    const el = scrollRef.current; if (!el) return;
    const w = el.clientWidth; if (!w) return;
    const newIdx = Math.round(el.scrollLeft / w);
    if (newIdx !== idx) setIdx(newIdx);
  };

  return (
    <>
      <StatusBar T={T}/>
      <div style={{ position: "absolute", inset: 0, paddingTop: 48, paddingBottom: 28, display: "flex", flexDirection: "column" }}>
        {/* Header — skip on left, brand on right */}
        <div style={{ padding: "0 22px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <div style={{ width: 26, height: 26, borderRadius: 8, background: T.accent,
              display: "flex", alignItems: "center", justifyContent: "center" }}>
              <Icon name="sparkle" size={15} color={T.onAccent} w={1.6}/>
            </div>
            <div style={{ fontSize: 14, fontWeight: 800, letterSpacing: -0.2 }}>חוגגות</div>
          </div>
          <button onClick={onDone} style={{
            background: "transparent", border: "none",
            fontSize: 13, fontWeight: 600, color: T.inkSoft,
            cursor: "pointer", fontFamily: T.font, padding: "8px 4px",
          }}>דלגי</button>
        </div>

        {/* Slides scroller (LTR for predictable scroll math) */}
        <div ref={scrollRef} onScroll={onScroll} style={{
          flex: 1, overflowX: "auto", overflowY: "hidden",
          display: "flex", scrollSnapType: "x mandatory",
          scrollbarWidth: "none", direction: "ltr", WebkitOverflowScrolling: "touch",
        }}>
          {slides.map((s, i) => {
            const p = PB[s.pop || "pink"];
            const Mockup = s.Mockup;
            return (
              <div key={i} dir="rtl" style={{
                minWidth: "100%", scrollSnapAlign: "start",
                padding: "10px 20px 4px",
                display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "flex-start",
                textAlign: "center",
              }}>
                <div style={{ fontSize: 10.5, fontWeight: 700, letterSpacing: 1.8, textTransform: "uppercase", color: p.deep }}>
                  שלב {i + 1} / {slides.length}
                </div>
                <h1 style={{ fontSize: 22, fontWeight: 800, margin: "6px 0 14px", letterSpacing: -0.4, lineHeight: 1.15 }}>{s.title}</h1>
                {Mockup ? <Mockup T={T}/> : null}
                <p style={{ fontSize: 13.5, color: T.inkSoft, lineHeight: 1.55, fontWeight: 500, marginTop: 14, maxWidth: 280 }}>
                  {s.desc}
                </p>
              </div>
            );
          })}
        </div>

        {/* Dots */}
        <div style={{ display: "flex", justifyContent: "center", gap: 7, padding: "14px 0 12px" }}>
          {slides.map((_, i) => (
            <button key={i} onClick={() => goTo(i)} aria-label={`לשקופית ${i+1}`} style={{
              width: i === idx ? 28 : 8, height: 8,
              borderRadius: 4,
              background: i === idx ? T.accent : T.lineStrong,
              border: "none", padding: 0, cursor: "pointer",
              transition: "all 250ms",
            }}/>
          ))}
        </div>

        {/* CTA */}
        <div style={{ padding: "0 22px" }}>
          <Btn T={T} onClick={isLast ? onDone : () => goTo(idx + 1)}>
            {isLast ? `כניסה ל${eventName || "הרווקות של מאיה"}` : "הבא"}
          </Btn>
        </div>
      </div>
      <HomeBar/>
    </>
  );
}

const buildSeedItems = () => {
  const out = [];
  CHECKLIST_SECTIONS.forEach(sec => sec.items.forEach((t, idx) =>
    out.push({ id: `${sec.id}-${idx}`, section: sec.id, t, done: false, custom: false })));
  return out;
};

function ScreenChecklist({ T, onBack }) {
  const [items, setItems] = React.useState(buildSeedItems);
  const [adding, setAdding] = React.useState("");
  const [addingTo, setAddingTo] = React.useState(CHECKLIST_SECTIONS[0].id);

  const done = items.filter(i => i.done).length;
  const pct = Math.round((done / items.length) * 100);
  const toggle = id => setItems(items.map(i => i.id === id ? { ...i, done: !i.done } : i));
  const removeItem = id => setItems(items.filter(i => i.id !== id));
  const add = () => {
    if (!adding.trim()) return;
    setItems([...items, { id: `c-${Date.now()}`, section: addingTo, t: adding.trim(), done: false, custom: true }]);
    setAdding("");
  };

  return (
    <>
      <StatusBar T={T}/>
      <div style={{ position: "absolute", inset: 0, padding: "48px 22px 24px", display: "flex", flexDirection: "column" }}>
        <TopBar T={T} onBack={onBack} title="צ'קליסט המארגנת"/>

        {/* Hero — mirrors budget */}
        <div style={{ background: T.surfaceInk, color: "#fff", borderRadius: T.radiusLg,
          padding: "18px 18px 16px", boxShadow: T.shadow, marginTop: 12, flexShrink: 0 }}>
          <div style={{ fontSize: 12.5, color: "rgba(255,255,255,0.6)", fontWeight: 600, letterSpacing: 0.3 }}>סך משימות לארגון</div>
          <div className="num" style={{ fontSize: 38, fontWeight: 800, marginTop: 2, letterSpacing: -0.5 }}>{items.length}</div>
          <div style={{ display: "flex", gap: 8, marginTop: 14 }}>
            <div style={{ flex: 1, borderRadius: T.radiusSm, padding: "9px 11px",
              background: PB.orange.main, color: "#fff" }}>
              <div style={{ fontSize: 10.5, fontWeight: 600, opacity: 0.9 }}>בוצעו</div>
              <div className="num" style={{ fontSize: 17, fontWeight: 800, marginTop: 1 }}>{done}</div>
            </div>
            <div style={{ flex: 1, borderRadius: T.radiusSm, padding: "9px 11px",
              background: PB.pink.main, color: PB.pink.on }}>
              <div style={{ fontSize: 10.5, fontWeight: 600, opacity: 0.82 }}>נשארו</div>
              <div className="num" style={{ fontSize: 17, fontWeight: 800, marginTop: 1 }}>{items.length - done}</div>
            </div>
            <div style={{ flex: 1, borderRadius: T.radiusSm, padding: "9px 11px",
              background: "rgba(255,255,255,0.10)", border: "1px solid rgba(255,255,255,0.16)" }}>
              <div style={{ fontSize: 10.5, fontWeight: 600, opacity: 0.82 }}>התקדמות</div>
              <div className="num" style={{ fontSize: 17, fontWeight: 800, marginTop: 1 }}>{pct}%</div>
            </div>
          </div>
          <div style={{ marginTop: 12, height: 6, background: "rgba(255,255,255,0.10)", borderRadius: 999, overflow: "hidden" }}>
            <div style={{ height: "100%", width: `${pct}%`, background: PB.orange.main, borderRadius: 999, transition: "width 300ms" }}/>
          </div>
        </div>

        {/* Sections */}
        <div style={{ flex: 1, overflow: "auto", marginTop: 14, display: "flex", flexDirection: "column", gap: 18 }}>
          {CHECKLIST_SECTIONS.map(sec => {
            const sectionItems = items.filter(i => i.section === sec.id);
            const secDone = sectionItems.filter(i => i.done).length;
            const secPct = sectionItems.length ? Math.round((secDone / sectionItems.length) * 100) : 0;
            return (
              <div key={sec.id}>
                <div style={{
                  display: "flex", alignItems: "center", justifyContent: "space-between",
                  marginBottom: 10, padding: "0 4px",
                }}>
                  <div>
                    <div style={{ fontSize: 14.5, fontWeight: 700, color: T.ink, letterSpacing: -0.2 }}>{sec.t}</div>
                    <div style={{ fontSize: 11.5, color: T.muted, fontWeight: 600, marginTop: 1, letterSpacing: 0.3 }}>{sec.sub}</div>
                  </div>
                  <div className="num" style={{ fontSize: 12, fontWeight: 700, color: secPct === 100 ? T.accent : T.inkSoft }}>
                    {secDone}/{sectionItems.length}
                  </div>
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                  {sectionItems.map(it => (
                    <div key={it.id} style={{
                      display: "flex", alignItems: "center", gap: 11,
                      background: it.done ? T.surfaceAlt : T.surface,
                      border: T.border, borderRadius: 12,
                      boxShadow: it.done ? "none" : T.shadowSm,
                      padding: "11px 13px",
                    }}>
                      <button onClick={() => toggle(it.id)} style={{
                        width: 22, height: 22, borderRadius: 7, flexShrink: 0,
                        background: it.done ? T.accent : "transparent",
                        border: it.done ? "none" : `1.5px solid ${T.lineStrong}`,
                        padding: 0, cursor: "pointer",
                        display: "flex", alignItems: "center", justifyContent: "center",
                      }}>{it.done && <Icon name="check" size={13} color={T.onAccent} w={2}/>}</button>
                      <div onClick={() => toggle(it.id)} style={{
                        flex: 1, fontSize: 13.5, fontWeight: 500,
                        color: it.done ? T.muted : T.ink,
                        textDecoration: it.done ? "line-through" : "none",
                        cursor: "pointer", lineHeight: 1.4,
                      }}>{it.t}</div>
                      <button onClick={() => removeItem(it.id)} title="הסרת משימה" style={{
                        width: 26, height: 26, borderRadius: 7, background: "transparent",
                        border: "none", cursor: "pointer", padding: 0,
                        display: "flex", alignItems: "center", justifyContent: "center",
                      }}><Icon name="close" size={13} color={T.muted} w={1.6}/></button>
                    </div>
                  ))}
                </div>
              </div>
            );
          })}
          <div style={{ height: 4 }}/>
        </div>

        {/* Add row */}
        <div style={{ display: "flex", gap: 6, marginTop: 10, flexShrink: 0 }}>
          <select value={addingTo} onChange={e => setAddingTo(e.target.value)} style={{
            padding: "0 10px", borderRadius: 12,
            border: T.border, background: T.surface, color: T.ink,
            fontSize: 11.5, fontWeight: 700, fontFamily: T.font,
            outline: "none", maxWidth: 110, boxShadow: T.shadowSm,
          }}>
            {CHECKLIST_SECTIONS.map(s => <option key={s.id} value={s.id}>{s.t}</option>)}
          </select>
          <input
            value={adding} onChange={e => setAdding(e.target.value)}
            onKeyDown={e => e.key === "Enter" && add()}
            placeholder="להוסיף משימה..."
            style={{
              flex: 1, padding: "12px 14px", borderRadius: 12,
              border: T.border, background: T.surface,
              fontSize: 13.5, fontWeight: 500, fontFamily: T.font,
              color: T.ink, outline: "none", boxShadow: T.shadowSm, minWidth: 0,
            }}/>
          <button onClick={add} style={{
            width: 44, flexShrink: 0, borderRadius: 12, background: T.accent, color: T.onAccent,
            border: "none", cursor: "pointer",
            display: "flex", alignItems: "center", justifyContent: "center",
          }}><Icon name="plus" size={18} color={T.onAccent} w={2}/></button>
        </div>
      </div>
      <HomeBar/>
    </>
  );
}

const EXPENSE_CATS = ["לוקיישן", "אוכל", "אלכוהול", "עיצוב", "אטרקציה", "תוספות", "אחר"];

const SEED_EXPENSES = [
  { id: "e1", cat: "לוקיישן",  item: "וילה",        type: "fixed",    amount: 2500 },
  { id: "e2", cat: "אוכל",     item: "שולחן שוק",  type: "variable", amount: 1500 },
  { id: "e3", cat: "אלכוהול",  type: "variable", item: "יין ובירות", amount: 400 },
  { id: "e4", cat: "עיצוב",    item: "פיצ'יפקס",    type: "fixed",    amount: 300 },
  { id: "e5", cat: "אטרקציה",  item: "מפעילה",      type: "fixed",    amount: 1800 },
  { id: "e6", cat: "אחר",      item: 'בלת"מים',     type: "variable", amount: 150 },
];
const SEED_PARTICIPANTS = Array.from({ length: 12 }, (_, i) => ({
  id: `p${i+1}`, name: `חברה ${i+1}`, coming: true, paid: i < 5,
}));

function ScreenBudget({ T, onBack }) {
  const [tab, setTab] = React.useState("summary");
  const [expenses, setExpenses] = React.useState(SEED_EXPENSES);
  const [participants, setParticipants] = React.useState(SEED_PARTICIPANTS);
  const [newExp, setNewExp] = React.useState({ cat: EXPENSE_CATS[0], item: "", type: "fixed", amount: "" });
  const [newName, setNewName] = React.useState("");

  const total     = expenses.reduce((s, e) => s + (Number(e.amount) || 0), 0);
  const comingArr = participants.filter(p => p.coming);
  const comingN   = comingArr.length;
  const perPerson = comingN > 0 ? Math.round(total / comingN) : 0;
  const collected = comingArr.filter(p => p.paid).length * perPerson;
  const remaining = Math.max(total - collected, 0);

  const addExpense = () => {
    const amt = Number(newExp.amount); if (!newExp.item.trim() || !amt) return;
    setExpenses([...expenses, { id: `e-${Date.now()}`, cat: newExp.cat, item: newExp.item.trim(), type: newExp.type, amount: amt }]);
    setNewExp({ cat: EXPENSE_CATS[0], item: "", type: "fixed", amount: "" });
  };
  const removeExpense = id => setExpenses(expenses.filter(e => e.id !== id));
  const addParticipant = () => {
    if (!newName.trim()) return;
    setParticipants([...participants, { id: `p-${Date.now()}`, name: newName.trim(), coming: true, paid: false }]);
    setNewName("");
  };
  const togglePaid   = id => setParticipants(participants.map(p => p.id === id ? { ...p, paid: !p.paid } : p));
  const toggleComing = id => setParticipants(participants.map(p => p.id === id ? { ...p, coming: !p.coming, paid: p.coming ? false : p.paid } : p));
  const removeParticipant = id => setParticipants(participants.filter(p => p.id !== id));

  const TabBtn = ({ id, label }) => (
    <button onClick={() => setTab(id)} style={{
      flex: 1, textAlign: "center", padding: "9px 4px", borderRadius: 10,
      background: tab === id ? T.surface : "transparent",
      color: tab === id ? T.ink : T.inkSoft,
      fontSize: 13, fontWeight: 700, cursor: "pointer", fontFamily: T.font,
      boxShadow: tab === id ? T.shadowSm : "none",
      border: "none", transition: "all 150ms",
    }}>{label}</button>
  );

  return (
    <>
      <StatusBar T={T}/>
      <div style={{ position: "absolute", inset: 0, padding: "48px 20px 24px", display: "flex", flexDirection: "column" }}>
        <TopBar T={T} onBack={onBack} title="תקציב"/>

        {/* Hero summary */}
        <div style={{ background: T.surfaceInk, color: "#fff", borderRadius: T.radiusLg,
          padding: "18px 18px 16px", boxShadow: T.shadow, marginTop: 12, flexShrink: 0 }}>
          <div style={{ fontSize: 12.5, color: "rgba(255,255,255,0.6)", fontWeight: 600, letterSpacing: 0.3 }}>סך הוצאות</div>
          <div className="num" style={{ fontSize: 38, fontWeight: 800, marginTop: 2, letterSpacing: -0.5 }}>₪{total.toLocaleString()}</div>
          <div style={{ display: "flex", gap: 8, marginTop: 14 }}>
            <div style={{ flex: 1, borderRadius: T.radiusSm, padding: "9px 11px",
              background: "rgba(255,255,255,0.10)", border: "1px solid rgba(255,255,255,0.16)" }}>
              <div style={{ fontSize: 10.5, fontWeight: 600, opacity: 0.82 }}>חלוקה ל-{comingN}</div>
              <div className="num" style={{ fontSize: 17, fontWeight: 800, marginTop: 1 }}>₪{perPerson.toLocaleString()}</div>
            </div>
            <div style={{ flex: 1, borderRadius: T.radiusSm, padding: "9px 11px",
              background: PB.pink.main, color: "#1A1A1A" }}>
              <div style={{ fontSize: 10.5, fontWeight: 600, opacity: 0.82 }}>נאספו</div>
              <div className="num" style={{ fontSize: 17, fontWeight: 800, marginTop: 1 }}>₪{collected.toLocaleString()}</div>
            </div>
            <div style={{ flex: 1, borderRadius: T.radiusSm, padding: "9px 11px",
              background: PB.orange.main, color: "#fff" }}>
              <div style={{ fontSize: 10.5, fontWeight: 600, opacity: 0.82 }}>חסר</div>
              <div className="num" style={{ fontSize: 17, fontWeight: 800, marginTop: 1 }}>₪{remaining.toLocaleString()}</div>
            </div>
          </div>
        </div>

        {/* Tabs */}
        <div style={{ display: "flex", gap: 4, marginTop: 14, padding: 4,
          background: T.surfaceAlt, borderRadius: T.radius, flexShrink: 0 }}>
          <TabBtn id="summary" label="סיכום"/>
          <TabBtn id="expenses" label={`הוצאות (${expenses.length})`}/>
          <TabBtn id="people" label={`בנות (${comingN})`}/>
        </div>

        {/* Body */}
        <div style={{ flex: 1, overflow: "auto", marginTop: 14, display: "flex", flexDirection: "column", gap: 9 }}>
          {tab === "summary" && (
            <>
              <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between", marginBottom: 4 }}>
                <h3 style={{ fontSize: 14.5, fontWeight: 700, margin: 0, letterSpacing: -0.2 }}>פירוט לפי קטגוריה</h3>
                <span style={{ fontSize: 12, color: T.muted, fontWeight: 600 }}>
                  {EXPENSE_CATS.filter(c => expenses.some(e => e.cat === c)).length} קטגוריות
                </span>
              </div>
              {EXPENSE_CATS.map(c => {
                const sum = expenses.filter(e => e.cat === c).reduce((s, e) => s + e.amount, 0);
                if (!sum) return null;
                const pct = total ? Math.round((sum / total) * 100) : 0;
                return (
                  <div key={c}>
                    <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between", marginBottom: 6 }}>
                      <span style={{ fontSize: 13.5, fontWeight: 600, color: T.ink }}>{c}</span>
                      <span className="num" style={{ fontSize: 13, fontWeight: 700, color: T.ink }}>
                        ₪{sum.toLocaleString()} <span style={{ color: T.muted, fontWeight: 500, fontSize: 12 }}>· {pct}%</span>
                      </span>
                    </div>
                    <div style={{ height: 6, borderRadius: 999, background: T.surfaceAlt, overflow: "hidden" }}>
                      <div style={{ height: "100%", width: `${pct}%`, background: T.accent, borderRadius: 999, transition: "width 300ms" }}/>
                    </div>
                  </div>
                );
              })}
              <div style={{
                marginTop: 10, padding: "11px 14px", background: T.surfaceAlt, borderRadius: T.radius,
                fontSize: 12, lineHeight: 1.55, color: T.inkSoft, fontWeight: 500,
              }}>
                <div><b style={{ color: T.ink }}>הוצאה קבועה</b> — לא משתנה לפי כמות הבנות (וילה, אטרקציה).</div>
                <div style={{ marginTop: 3 }}><b style={{ color: T.ink }}>הוצאה משתנה</b> — עולה או יורדת לפי כמות הבנות (אוכל, אלכוהול).</div>
              </div>
              <div style={{ flex: 1, minHeight: 8 }}/>
              <Btn T={T} icon="send" onClick={() => alert("בקשת תשלום מהבנות (דמו)")}>בקשי השלמת תשלום</Btn>
            </>
          )}

          {tab === "expenses" && (
            <>
              {expenses.map((e, i) => (
                <div key={e.id} style={{
                  display: "flex", alignItems: "center", gap: 11,
                  background: T.surface, border: T.border, borderRadius: 13,
                  padding: "11px 12px", boxShadow: T.shadowSm,
                }}>
                  <div style={{
                    width: 36, height: 36, borderRadius: 10,
                    background: T.surfaceAlt, color: T.ink,
                    display: "flex", alignItems: "center", justifyContent: "center",
                    fontSize: 12.5, fontWeight: 700, flexShrink: 0,
                  }} className="num">{i + 1}</div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 13.5, fontWeight: 700, color: T.ink }}>{e.item}</div>
                    <div style={{ display: "flex", gap: 6, marginTop: 3, alignItems: "center" }}>
                      <span style={{ fontSize: 10.5, fontWeight: 600, padding: "2px 7px", borderRadius: 999, background: T.surfaceAlt, color: T.inkSoft }}>{e.cat}</span>
                      <span style={{ fontSize: 10.5, fontWeight: 600, padding: "2px 7px", borderRadius: 999,
                        background: e.type === "fixed" ? PB.pink.soft : PB.orange.soft,
                        color: e.type === "fixed" ? PB.pink.deep : PB.orange.deep,
                      }}>{e.type === "fixed" ? "קבועה" : "משתנה"}</span>
                    </div>
                  </div>
                  <div className="num" style={{ fontSize: 14.5, fontWeight: 800, color: T.ink }}>₪{e.amount.toLocaleString()}</div>
                  <button onClick={() => removeExpense(e.id)} style={{
                    width: 24, height: 24, borderRadius: 7, background: "transparent",
                    border: "none", cursor: "pointer", padding: 0, color: T.muted,
                    display: "flex", alignItems: "center", justifyContent: "center",
                  }}><Icon name="close" size={13} color={T.muted} w={1.6}/></button>
                </div>
              ))}

              {/* Add form */}
              <div style={{ marginTop: 8, padding: 12, background: T.surfaceAlt,
                border: `1px dashed ${T.lineStrong}`, borderRadius: T.radius,
                display: "flex", flexDirection: "column", gap: 7 }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: T.inkSoft, letterSpacing: 0.5, textTransform: "uppercase" }}>הוצאה חדשה</div>
                <div style={{ display: "flex", gap: 6 }}>
                  <select value={newExp.cat} onChange={e => setNewExp({ ...newExp, cat: e.target.value })} style={{
                    flex: 1, padding: "10px 10px", borderRadius: 10,
                    border: T.border, background: T.surface, color: T.ink,
                    fontSize: 12.5, fontWeight: 600, fontFamily: T.font, outline: "none",
                  }}>
                    {EXPENSE_CATS.map(c => <option key={c} value={c}>{c}</option>)}
                  </select>
                  <select value={newExp.type} onChange={e => setNewExp({ ...newExp, type: e.target.value })} style={{
                    width: 90, padding: "10px 10px", borderRadius: 10,
                    border: T.border, background: T.surface, color: T.ink,
                    fontSize: 12.5, fontWeight: 600, fontFamily: T.font, outline: "none",
                  }}>
                    <option value="fixed">קבועה</option>
                    <option value="variable">משתנה</option>
                  </select>
                </div>
                <div style={{ display: "flex", gap: 6 }}>
                  <input value={newExp.item} onChange={e => setNewExp({ ...newExp, item: e.target.value })}
                    placeholder="פריט / תיאור..."
                    style={{
                      flex: 1, padding: "11px 12px", borderRadius: 10,
                      border: T.border, background: T.surface,
                      fontSize: 13, fontWeight: 600, fontFamily: T.font,
                      color: T.ink, outline: "none", minWidth: 0,
                    }}/>
                  <input value={newExp.amount} onChange={e => setNewExp({ ...newExp, amount: e.target.value.replace(/[^0-9]/g, "") })}
                    placeholder="₪0" inputMode="numeric"
                    style={{
                      width: 80, padding: "11px 12px", borderRadius: 10,
                      border: T.border, background: T.surface,
                      fontSize: 13, fontWeight: 700, fontFamily: T.font,
                      color: T.ink, outline: "none", direction: "ltr", textAlign: "center",
                    }}/>
                  <button onClick={addExpense} style={{
                    width: 44, flexShrink: 0, borderRadius: 10, background: T.accent, color: T.onAccent,
                    border: "none", cursor: "pointer",
                    display: "flex", alignItems: "center", justifyContent: "center",
                  }}><Icon name="plus" size={17} color={T.onAccent} w={2}/></button>
                </div>
              </div>
            </>
          )}

          {tab === "people" && (
            <>
              <div style={{ fontSize: 11.5, color: T.muted, fontWeight: 600, marginBottom: 4, padding: "0 4px", letterSpacing: 0.2 }}>
                לחיצה על שם — הופכת ל"לא מגיעה". ✓ — שילמה.
              </div>
              {participants.map(p => (
                <div key={p.id} style={{
                  display: "flex", alignItems: "center", gap: 11,
                  background: p.coming ? T.surface : T.surfaceAlt,
                  border: T.border, borderRadius: 13,
                  padding: "11px 12px", boxShadow: p.coming ? T.shadowSm : "none",
                  opacity: p.coming ? 1 : 0.65, transition: "opacity 150ms",
                }}>
                  <button onClick={() => togglePaid(p.id)} disabled={!p.coming} style={{
                    width: 24, height: 24, borderRadius: 7, flexShrink: 0,
                    background: p.paid && p.coming ? T.accent : "transparent",
                    border: p.paid && p.coming ? "none" : `1.5px solid ${T.lineStrong}`,
                    padding: 0, cursor: p.coming ? "pointer" : "not-allowed",
                    display: "flex", alignItems: "center", justifyContent: "center",
                  }}>{p.paid && p.coming && <Icon name="check" size={13} color={T.onAccent} w={2}/>}</button>
                  <button onClick={() => toggleComing(p.id)} style={{
                    flex: 1, fontSize: 13.5, fontWeight: 600, color: T.ink,
                    background: "transparent", border: "none", cursor: "pointer",
                    textAlign: "right", fontFamily: T.font,
                    textDecoration: p.coming ? "none" : "line-through",
                    padding: 0, minWidth: 0,
                  }}>{p.name}</button>
                  <div className="num" style={{ fontSize: 12, fontWeight: 700,
                    color: p.coming ? (p.paid ? T.accent : T.inkSoft) : T.muted }}>
                    {!p.coming ? "לא מגיעה" : p.paid ? `שילמה · ₪${perPerson}` : `חייבת ₪${perPerson}`}
                  </div>
                  <button onClick={() => removeParticipant(p.id)} style={{
                    width: 24, height: 24, borderRadius: 7, background: "transparent",
                    border: "none", cursor: "pointer", padding: 0,
                    display: "flex", alignItems: "center", justifyContent: "center",
                  }}><Icon name="close" size={13} color={T.muted} w={1.6}/></button>
                </div>
              ))}

              <div style={{ marginTop: 8, padding: 10, background: T.surfaceAlt,
                border: `1px dashed ${T.lineStrong}`, borderRadius: T.radius,
                display: "flex", gap: 6 }}>
                <input value={newName} onChange={e => setNewName(e.target.value)}
                  onKeyDown={e => e.key === "Enter" && addParticipant()}
                  placeholder="שם חברה חדשה..."
                  style={{
                    flex: 1, padding: "11px 12px", borderRadius: 10,
                    border: T.border, background: T.surface,
                    fontSize: 13, fontWeight: 600, fontFamily: T.font,
                    color: T.ink, outline: "none", minWidth: 0,
                  }}/>
                <button onClick={addParticipant} style={{
                  width: 44, flexShrink: 0, borderRadius: 10, background: T.accent, color: T.onAccent,
                  border: "none", cursor: "pointer",
                  display: "flex", alignItems: "center", justifyContent: "center",
                }}><Icon name="plus" size={17} color={T.onAccent} w={2}/></button>
              </div>
            </>
          )}
        </div>
      </div>
      <HomeBar/>
    </>
  );
}

function TimerGame({ T: parentT, game, onBack }) {
  const T = { ...parentT, accent: PB[game.pop].main, onAccent: PB[game.pop].on, accentSoft: PB[game.pop].soft, accentDeep: PB[game.pop].deep };
  const deck = TIMER_DECKS[game.id];
  const [phase, setPhase] = React.useState("intro");
  const [timeLeft, setTimeLeft] = React.useState(120);
  const [idx, setIdx] = React.useState(0);
  const [got, setGot] = React.useState(0);
  const [skipped, setSkipped] = React.useState(0);
  const [projecting, setProjecting] = React.useState(false);
  const order = React.useRef([]);

  const startPlay = () => {
    order.current = [...deck.prompts].sort(() => Math.random() - 0.5);
    setTimeLeft(120); setIdx(0); setGot(0); setSkipped(0);
    setPhase("play");
  };

  React.useEffect(() => {
    if (phase !== "play") return;
    if (timeLeft <= 0) { setPhase("done"); return; }
    const t = setTimeout(() => setTimeLeft(s => s - 1), 1000);
    return () => clearTimeout(t);
  }, [phase, timeLeft]);

  const prompt = order.current[idx % (order.current.length || 1)];
  const mins = Math.floor(timeLeft / 60);
  const secs = String(timeLeft % 60).padStart(2, "0");
  const danger = timeLeft <= 15;
  const correct = () => { setGot(g => g + 1); setIdx(i => i + 1); };
  const skip = () => { setSkipped(s => s + 1); setIdx(i => i + 1); };

  if (phase === "intro")
    return <GameIntro T={T} game={game} rules={deck.rules} onBack={onBack} onStart={startPlay} startLabel="התחילו טיימר"/>;

  if (phase === "done") {
    return (
      <>
        <StatusBar T={T}/>
        <div style={{ position: "absolute", inset: 0, padding: "48px 22px 24px", display: "flex", flexDirection: "column" }}>
          <TopBar T={T} onBack={onBack} title={game.t}/>
          <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", textAlign: "center" }}>
            <h1 style={{ fontSize: 30, fontWeight: 800, margin: "0 0 6px", letterSpacing: -0.5 }}>נגמר הזמן</h1>
            <p style={{ fontSize: 14, color: T.inkSoft, fontWeight: 500, margin: "0 0 22px" }}>כל הכבוד, זוג אלופות.</p>
            <Card T={T} padding={22} style={{ width: "100%", textAlign: "center" }}>
              <div style={{ fontSize: 12.5, fontWeight: 600, color: T.inkSoft, letterSpacing: 0.3, textTransform: "uppercase" }}>צברתן</div>
              <div className="num" style={{ fontSize: 64, fontWeight: 800, color: T.accent, lineHeight: 1, letterSpacing: -1, marginTop: 8 }}>{got}</div>
              <div style={{ fontSize: 14, fontWeight: 700, color: T.ink, marginTop: 6 }}>ניחושים נכונים</div>
              <div style={{ fontSize: 12, fontWeight: 500, color: T.muted, marginTop: 6 }}>דילגתן על {skipped}</div>
            </Card>
          </div>
          <Btn T={T} onClick={startPlay}>סיבוב נוסף</Btn>
          <button onClick={onBack} style={{ marginTop: 10, background: "transparent", border: "none", fontSize: 13, fontWeight: 600, color: T.inkSoft, cursor: "pointer" }}>לרשימת המשחקים</button>
        </div>
        <HomeBar/>
      </>
    );
  }

  const playBody = (big) => (
    <>
      <div style={{
        margin: "0 auto",
        background: danger ? T.accent : T.surfaceInk,
        color: "#fff", border: `1px solid ${danger ? T.accent : T.surfaceInk}`,
        borderRadius: 999, padding: big ? "10px 36px" : "10px 26px",
        fontSize: big ? "clamp(36px,6vw,72px)" : 32, fontWeight: 800,
        letterSpacing: 1.5,
        animation: danger ? "pulse 0.7s ease-in-out infinite" : "none",
        display: "inline-block",
      }} className="num">{mins}:{secs}</div>

      <div style={{ display: "flex", justifyContent: "center", gap: 8, marginTop: big ? 18 : 12 }}>
        <span style={{
          fontSize: big ? "clamp(12px,1.6vw,18px)" : 12, fontWeight: 700,
          background: big ? "rgba(255,255,255,0.12)" : T.surfaceAlt, color: big ? "#fff" : T.inkSoft,
          border: big ? "1px solid rgba(255,255,255,0.18)" : T.border,
          borderRadius: 999, padding: big ? "6px 16px" : "5px 12px", letterSpacing: 0.3,
        }}>{deck.label} · נחושו {got}</span>
      </div>

      <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: big ? "clamp(16px,4vh,40px) 0" : "16px 0", minHeight: 0 }}>
        <div key={idx} style={{
          width: big ? "min(90%,860px)" : "100%",
          background: big ? T.accent : T.surface,
          border: big ? "none" : T.border,
          borderRadius: big ? 32 : 22,
          boxShadow: big ? "0 24px 60px -10px rgba(0,0,0,0.5)" : T.shadow,
          padding: big ? "clamp(28px,5vw,64px)" : "40px 24px",
          textAlign: "center",
          animation: "cardIn 280ms cubic-bezier(.18,.89,.43,1.19)",
          display: "flex", alignItems: "center", justifyContent: "center",
          minHeight: big ? "auto" : 200,
        }}>
          <div style={{
            fontSize: big ? "clamp(40px,7vw,96px)" : 32,
            fontWeight: 800, lineHeight: 1.15,
            color: big ? T.onAccent : T.ink, textWrap: "balance", letterSpacing: -0.6,
          }}>{prompt}</div>
        </div>
      </div>

      <div style={{ display: "flex", gap: big ? 16 : 10, justifyContent: "center" }}>
        <button onClick={skip} style={{
          flex: big ? "none" : 1,
          padding: big ? "clamp(14px,1.8vw,20px) clamp(28px,3vw,44px)" : "15px",
          background: big ? "rgba(255,255,255,0.10)" : T.surface,
          color: big ? "#fff" : T.ink,
          border: big ? "1px solid rgba(255,255,255,0.18)" : T.border,
          borderRadius: T.radius, fontSize: big ? "clamp(16px,2vw,24px)" : 15, fontWeight: 700,
          boxShadow: big ? "none" : T.shadowSm, cursor: "pointer", fontFamily: T.font,
        }}>דלג</button>
        <button onClick={correct} style={{
          flex: big ? "none" : 2,
          padding: big ? "clamp(14px,1.8vw,20px) clamp(36px,4vw,60px)" : "15px",
          background: T.ok, color: "#fff",
          border: "none", borderRadius: T.radius,
          fontSize: big ? "clamp(16px,2vw,24px)" : 15, fontWeight: 700,
          boxShadow: big ? "none" : T.shadowSm, cursor: "pointer", fontFamily: T.font,
        }}>ניחשו ✓</button>
      </div>
    </>
  );

  return (
    <>
      <StatusBar T={T}/>
      <div style={{ position: "absolute", inset: 0, padding: "48px 22px 24px", display: "flex", flexDirection: "column" }}>
        <GameTopBar T={T} onBack={onBack} onProject={() => setProjecting(true)} title={game.t}/>
        {playBody(false)}
      </div>
      <HomeBar/>
      {projecting && (
        <ProjectionShell T={T} headline={deck.headline} onClose={() => setProjecting(false)}>
          {playBody(true)}
        </ProjectionShell>
      )}
    </>
  );
}

function QuizGame({ T: parentT, game, onBack }) {
  const T = { ...parentT, accent: PB[game.pop].main, onAccent: PB[game.pop].on, accentSoft: PB[game.pop].soft, accentDeep: PB[game.pop].deep };
  const deck = QUIZ_DECKS[game.id];
  const [phase, setPhase] = React.useState("intro");
  const [qi, setQi] = React.useState(0);
  const [picked, setPicked] = React.useState(null);
  const [score, setScore] = React.useState(0);
  const [projecting, setProjecting] = React.useState(false);

  const q = deck.questions[qi];
  // brand palette only: pink · black · orange · deep rose
  const tileColors = ["#EAA0BA", "#1A1A1A", "#E8512A", "#C75E82"];
  const tileFg     = ["#1A1A1A", "#fff", "#fff", "#fff"];
  const tileShapes = ["▲", "◆", "●", "■"];

  const pick = i => { if (picked !== null) return; setPicked(i); if (i === q.correct) setScore(s => s + 1); };
  const next = () => { if (qi + 1 >= deck.questions.length) { setPhase("done"); return; } setQi(qi + 1); setPicked(null); };
  const restart = () => { setQi(0); setPicked(null); setScore(0); setPhase("intro"); };

  if (phase === "intro")
    return <GameIntro T={T} game={game} rules={deck.rules} onBack={onBack} onStart={() => setPhase("play")} startLabel="מתחילות חידון"/>;

  if (phase === "done") {
    const pct = Math.round((score / deck.questions.length) * 100);
    return (
      <>
        <StatusBar T={T}/>
        <div style={{ position: "absolute", inset: 0, padding: "48px 22px 24px", display: "flex", flexDirection: "column" }}>
          <TopBar T={T} onBack={onBack} title={game.t}/>
          <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", textAlign: "center" }}>
            <h1 style={{ fontSize: 28, fontWeight: 800, margin: "0 0 6px", letterSpacing: -0.4 }}>
              {pct >= 70 ? "מכירה אותה מצוין" : pct >= 40 ? "לא רע בכלל" : "צריך להכיר יותר"}
            </h1>
            <Card T={T} padding={22} style={{ width: "100%", marginTop: 14, textAlign: "center" }}>
              <div className="num" style={{ fontSize: 60, fontWeight: 800, color: T.accent, lineHeight: 1, letterSpacing: -1 }}>{score}/{deck.questions.length}</div>
              <div style={{ fontSize: 14, fontWeight: 700, color: T.ink, marginTop: 6 }}>תשובות נכונות</div>
            </Card>
          </div>
          <Btn T={T} onClick={restart}>עוד פעם</Btn>
          <button onClick={onBack} style={{ marginTop: 10, background: "transparent", border: "none", fontSize: 13, fontWeight: 600, color: T.inkSoft, cursor: "pointer" }}>לרשימת המשחקים</button>
        </div>
        <HomeBar/>
      </>
    );
  }

  const quizBody = (big) => (
    <>
      <div style={{ textAlign: "center", flexShrink: 0 }}>
        <span className="num" style={{
          display: "inline-block", padding: big ? "6px 20px" : "5px 14px",
          background: big ? "rgba(255,255,255,0.12)" : T.surfaceAlt,
          color: big ? "#fff" : T.inkSoft,
          border: big ? "1px solid rgba(255,255,255,0.18)" : T.border,
          borderRadius: 999, fontSize: big ? "clamp(14px,1.8vw,22px)" : 12, fontWeight: 700, letterSpacing: 0.4,
        }}>שאלה {qi + 1} / {deck.questions.length}</span>
      </div>

      <div style={{ display: "flex", alignItems: "center", justifyContent: "center", padding: big ? "clamp(16px,4vh,40px) 0" : "18px 0", flexShrink: 0 }}>
        <div style={{
          width: big ? "min(92%,1000px)" : "100%",
          background: big ? "rgba(255,255,255,0.97)" : T.surface,
          border: big ? "none" : T.border,
          borderRadius: big ? 28 : 22, boxShadow: big ? "0 20px 50px -10px rgba(0,0,0,0.4)" : T.shadow,
          padding: big ? "clamp(24px,4vw,52px)" : "28px 20px", textAlign: "center",
        }}>
          <div style={{ fontSize: big ? "clamp(30px,5vw,64px)" : 22, fontWeight: 800, lineHeight: 1.2, color: T.ink, textWrap: "balance", letterSpacing: -0.4 }}>{q.q}</div>
        </div>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: big ? 14 : 9, flexShrink: 0 }}>
        {q.a.map((ans, i) => {
          const isCorrect = picked !== null && i === q.correct;
          const isWrong = picked === i && i !== q.correct;
          const dim = picked !== null && i !== q.correct && picked !== i;
          return (
            <button key={i} onClick={() => pick(i)} disabled={picked !== null} style={{
              background: tileColors[i], color: tileFg[i],
              border: "none",
              borderRadius: big ? 18 : 14,
              boxShadow: big ? "0 6px 0 rgba(0,0,0,0.18)" : T.shadowSm,
              padding: big ? "clamp(18px,2.5vw,32px)" : "16px 13px",
              fontSize: big ? "clamp(18px,2.4vw,34px)" : 14.5, fontWeight: 700,
              fontFamily: T.font, cursor: picked !== null ? "default" : "pointer",
              display: "flex", alignItems: "center", gap: big ? 14 : 8,
              opacity: dim ? 0.35 : 1,
              transform: isCorrect ? "scale(1.03)" : "none",
              transition: "opacity 200ms, transform 200ms",
              position: "relative", textAlign: "right",
            }}>
              <span style={{ fontSize: big ? "clamp(20px,2.4vw,34px)" : 17, flexShrink: 0, opacity: 0.7 }}>{tileShapes[i]}</span>
              <span style={{ flex: 1 }}>{ans}</span>
              {isCorrect && <span style={{ fontSize: big ? 30 : 18 }}>✓</span>}
              {isWrong && <span style={{ fontSize: big ? 30 : 18 }}>✗</span>}
            </button>
          );
        })}
      </div>

      {picked !== null && (
        <button onClick={next} style={{
          marginTop: big ? 20 : 12,
          alignSelf: big ? "center" : "stretch",
          padding: big ? "clamp(14px,1.8vw,20px) clamp(40px,5vw,72px)" : "14px",
          background: T.accent, color: T.onAccent,
          border: "none", borderRadius: T.radius,
          fontSize: big ? "clamp(16px,2vw,26px)" : 15, fontWeight: 700,
          boxShadow: big ? "none" : T.shadowSm, cursor: "pointer", fontFamily: T.font,
        }}>{qi + 1 >= deck.questions.length ? "לתוצאות" : "השאלה הבאה"}</button>
      )}
    </>
  );

  return (
    <>
      <StatusBar T={T}/>
      <div style={{ position: "absolute", inset: 0, padding: "48px 22px 20px", display: "flex", flexDirection: "column" }}>
        <GameTopBar T={T} onBack={onBack} onProject={() => setProjecting(true)} title={game.t}/>
        <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "auto" }}>{quizBody(false)}</div>
      </div>
      <HomeBar/>
      {projecting && (
        <ProjectionShell T={T} headline={deck.headline} onClose={() => setProjecting(false)}>
          {quizBody(true)}
        </ProjectionShell>
      )}
    </>
  );
}

function CardGame({ T: parentT, game, onBack }) {
  const T = { ...parentT, accent: PB[game.pop].main, onAccent: PB[game.pop].on, accentSoft: PB[game.pop].soft, accentDeep: PB[game.pop].deep };
  const deck = CARD_DECKS[game.id];
  const [phase, setPhase] = React.useState("intro");
  const [i, setI] = React.useState(0);
  const [projecting, setProjecting] = React.useState(false);

  const total = deck.prompts.length;
  const prompt = deck.prompts[i];
  const next = () => setI(x => Math.min(x + 1, total - 1));
  const prev = () => setI(x => Math.max(x - 1, 0));
  const atStart = i === 0, atEnd = i === total - 1;
  const isNhie = game.id === "nhie";

  if (phase === "intro")
    return <GameIntro T={T} game={game} rules={deck.rules} onBack={onBack} onStart={() => setPhase("play")}
      startLabel={isNhie ? "מוזגות ומתחילות" : "מתחילות שאלון"}/>;

  const body = (big) => (
    <>
      <div style={{ display: "flex", gap: 4, justifyContent: "center", flexWrap: "wrap", flexShrink: 0, marginBottom: big ? 0 : 6 }}>
        {deck.prompts.map((_, idx) => (
          <div key={idx} style={{
            width: idx === i ? (big ? 36 : 22) : (big ? 12 : 6), height: big ? 12 : 6, borderRadius: 6,
            background: idx === i
              ? (big ? "#fff" : T.accent)
              : (idx < i
                ? (big ? "rgba(255,255,255,0.5)" : T.lineStrong)
                : (big ? "rgba(255,255,255,0.2)" : T.surfaceAlt)),
            transition: "all 200ms",
          }}/>
        ))}
      </div>

      <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: big ? "clamp(16px,4vh,40px) 0" : "20px 0", minHeight: 0 }}>
        <div key={i} style={{
          width: big ? "min(90%,920px)" : "100%",
          background: big ? T.accent : T.surface,
          border: big ? "none" : T.border,
          borderRadius: big ? 32 : 22,
          boxShadow: big ? "0 24px 60px -10px rgba(0,0,0,0.5)" : T.shadow,
          padding: big ? "clamp(32px,6vw,72px)" : "36px 24px",
          position: "relative",
          animation: "cardIn 280ms cubic-bezier(.18,.89,.43,1.19)",
          minHeight: big ? "auto" : 240,
          display: "flex", flexDirection: "column", justifyContent: "center", alignItems: "center", gap: big ? 24 : 14,
        }}>
          <div style={{
            position: "absolute", top: big ? -16 : -10, right: big ? 32 : 18,
            padding: big ? "6px 18px" : "4px 11px", background: T.surfaceInk, color: "#fff",
            borderRadius: 999,
            fontSize: big ? "clamp(13px,1.6vw,20px)" : 11, fontWeight: 700, letterSpacing: 0.3,
          }}>{deck.label}</div>
          <div style={{
            fontSize: big ? (prompt.length > 40 ? "clamp(32px,5vw,68px)" : "clamp(40px,6vw,84px)") : (prompt.length > 40 ? 22 : 25),
            fontWeight: 800, lineHeight: 1.25,
            color: big ? T.onAccent : T.ink, textAlign: "center", textWrap: "balance", letterSpacing: -0.5,
          }}>{prompt}</div>
          {isNhie && (
            <div style={{
              fontSize: big ? "clamp(13px,1.5vw,20px)" : 12, fontWeight: 600,
              color: big ? "rgba(255,255,255,0.85)" : T.inkSoft, letterSpacing: 0.4,
            }}>מי שכן — לוגמת</div>
          )}
        </div>
      </div>

      <div style={{ display: "flex", gap: big ? 16 : 9, justifyContent: "center", flexShrink: 0 }}>
        <button onClick={prev} disabled={atStart} style={{
          padding: big ? "clamp(12px,1.6vw,18px) clamp(20px,2.4vw,32px)" : "14px",
          minWidth: big ? "auto" : 54, flex: big ? "none" : "0 0 auto",
          background: atStart ? (big ? "rgba(255,255,255,0.10)" : T.surfaceAlt) : (big ? "rgba(255,255,255,0.12)" : T.surface),
          color: big ? "#fff" : T.ink,
          border: big ? "1px solid rgba(255,255,255,0.18)" : T.border,
          borderRadius: T.radius, fontSize: big ? "clamp(16px,2vw,24px)" : 15, fontWeight: 700,
          boxShadow: big || atStart ? "none" : T.shadowSm,
          cursor: atStart ? "not-allowed" : "pointer", opacity: atStart ? 0.45 : 1, fontFamily: T.font,
          display: "flex", alignItems: "center", justifyContent: "center",
        }}>{big ? "הקודם" : <Icon name="chevR" size={16} color={T.ink} w={1.6}/>}</button>
        <button onClick={next} disabled={atEnd} style={{
          flex: big ? "none" : 1,
          padding: big ? "clamp(12px,1.6vw,18px) clamp(36px,4vw,60px)" : "14px",
          background: atEnd ? (big ? "rgba(255,255,255,0.10)" : T.surfaceAlt) : T.surfaceInk,
          color: atEnd ? (big ? "rgba(255,255,255,0.6)" : T.inkSoft) : "#fff",
          border: big ? (atEnd ? "1px solid rgba(255,255,255,0.18)" : "none") : (atEnd ? T.border : "none"),
          borderRadius: T.radius, fontSize: big ? "clamp(16px,2vw,24px)" : 15, fontWeight: 700,
          boxShadow: big || atEnd ? "none" : T.shadowSm,
          cursor: atEnd ? "not-allowed" : "pointer", opacity: atEnd ? 0.7 : 1, fontFamily: T.font,
        }}>{atEnd ? "סיימנו" : "הבא"}</button>
      </div>
    </>
  );

  return (
    <>
      <StatusBar T={T}/>
      <div style={{ position: "absolute", inset: 0, padding: "48px 22px 24px", display: "flex", flexDirection: "column" }}>
        <GameTopBar T={T} onBack={onBack} onProject={() => setProjecting(true)} title={game.t}/>
        {body(false)}
      </div>
      <HomeBar/>
      {projecting && (
        <ProjectionShell T={T} headline={deck.headline} onClose={() => setProjecting(false)}>
          {body(true)}
        </ProjectionShell>
      )}
    </>
  );
}

/* ──────────────────────────────────────────────────────────────
   APP SHELL — routing + per-screen skin
   ────────────────────────────────────────────────────────────── */
function App() {
  const [screen, setScreen] = React.useState("welcome");
  const [name, setName] = React.useState("");
  const [event, setEvent] = React.useState(null);
  const [eventName, setEventName] = React.useState("");
  const [gameId, setGameId] = React.useState("lipread");

  React.useEffect(() => {
    try {
      const raw = localStorage.getItem("chogegot_state");
      if (raw) {
        const s = JSON.parse(raw);
        if (s.screen) setScreen(s.screen);
        if (s.name) setName(s.name);
        if (s.event) setEvent(s.event);
        if (s.eventName) setEventName(s.eventName);
        if (s.gameId) setGameId(s.gameId);
      }
    } catch (e) {}
  }, []);
  React.useEffect(() => {
    try { localStorage.setItem("chogegot_state", JSON.stringify({ screen, name, event, eventName, gameId })); } catch (e) {}
  }, [screen, name, event, eventName, gameId]);

  const nav = (to, params = {}) => {
    if (params.gameId) setGameId(params.gameId);
    setScreen(to);
  };
  const reset = () => {
    setScreen("welcome"); setName(""); setEvent(null); setEventName("");
    localStorage.removeItem("chogegot_state");
  };

  // pick skin
  const skinName = SCREEN_SKIN[screen] || "orange";
  const T = skin(skinName);

  let content;
  if (screen === "welcome") content = <ScreenWelcome T={T} onNext={() => setScreen("smsVerify")}/>;
  else if (screen === "smsVerify") content = <ScreenSmsVerify T={T} onNext={() => setScreen("username")} onBack={() => setScreen("welcome")}/>;
  else if (screen === "username") content = <ScreenUsername T={T} onNext={() => setScreen("event")} onBack={() => setScreen("smsVerify")} name={name} setName={setName}/>;
  else if (screen === "event") content = <ScreenEventPicker T={T} onNext={() => setScreen("nameEvent")} onBack={() => setScreen("username")} selected={event} setSelected={setEvent}/>;
  else if (screen === "nameEvent") content = <ScreenNameEvent T={T} eventId={event} eventName={eventName} setEventName={setEventName}
    onNext={() => setScreen(event === "bach" ? "slideshow" : "comingSoon")} onBack={() => setScreen("event")}/>;
  else if (screen === "slideshow") content = <ScreenSlideshow T={T} slides={BACH_SLIDES} eventName={eventName} onDone={() => setScreen("bachHome")}/>;
  else if (screen === "bachHome") content = <ScreenBachHome T={T} onNav={nav} user={{ name }} eventName={eventName}/>;
  else if (screen === "qrjoin") content = <ScreenQRJoin T={T} onBack={() => setScreen("bachHome")}/>;
  else if (screen === "checklist") content = <ScreenChecklist T={T} onBack={() => setScreen("bachHome")}/>;
  else if (screen === "playlist") content = <ScreenPlaylist T={T} onBack={() => setScreen("bachHome")}/>;
  else if (screen === "budget") content = <ScreenBudget T={T} onBack={() => setScreen("bachHome")}/>;
  else if (screen === "games") content = <ScreenGamesHub T={T} onNav={nav} onBack={() => setScreen("bachHome")}/>;
  else if (screen === "game") {
    const g = GAMES.find(x => x.id === gameId) || GAMES[0];
    const back = () => setScreen("games");
    if (g.type === "timer") content = <TimerGame T={T} game={g} onBack={back}/>;
    else if (g.type === "quiz") content = <QuizGame T={T} game={g} onBack={back}/>;
    else content = <CardGame T={T} game={g} onBack={back}/>;
  }
  else if (screen === "comingSoon") content = <ScreenComingSoon T={T} eventId={event} onBack={() => setScreen("event")}/>;

  return (
    <>
      <PhoneShell T={T}>
        <div key={screen} style={{ position: "absolute", inset: 0, animation: "screenIn 280ms ease-out" }}>
          {content}
        </div>
      </PhoneShell>
      <button onClick={reset} title="התחל מההתחלה" style={{
        position: "fixed", top: 16, left: 16, zIndex: 1000,
        padding: "8px 12px", background: "rgba(20,18,16,0.85)", color: "#fff",
        border: "none", borderRadius: 999, fontSize: 11.5, fontWeight: 700,
        cursor: "pointer", fontFamily: '"Assistant", system-ui, sans-serif',
        backdropFilter: "blur(10px)", WebkitBackdropFilter: "blur(10px)", letterSpacing: 0.3,
      }}>אפס</button>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
