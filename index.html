/* ──────────────────────────────────────────────────────────────
   BUDGET — interactive
   ────────────────────────────────────────────────────────────── */
const EXPENSE_CATS = ["לוקיישן", "אוכל", "אלכוהול", "עיצוב", "אטרקציה", "תוספות", "אחר"];

const SEED_EXPENSES = [
  { id: "e1", cat: "לוקיישן",  item: "וילה",        type: "fixed",    amount: 2500 },
  { id: "e2", cat: "אוכל",     item: "שולחן שוק",  type: "variable", amount: 1500 },
  { id: "e3", cat: "אלכוהול",  type: "variable", item: "יין ובירות", amount: 400 },
  { id: "e4", cat: "עיצוב",    item: "פיצ'יפקס",    type: "fixed",    amount: 300 },
  { id: "e5", cat: "אטרקציה",  item: "מפעילה",      type: "fixed",    amount: 1800 },
  { id: "e6", cat: "אחר",      item: 'בלת"מים',     type: "variable", amount: 150 },
];
const SEED_PARTICIPANTS = Array.from({ length: 12 }, (_, i) => ({
  id: `p${i+1}`, name: `משתתפת ${i+1}`, coming: true, paid: i < 5,
}));

function ScreenBudget({ T, onBack }) {
  const [tab, setTab] = React.useState("summary");
  const [expenses, setExpenses] = usePersistedState("chogegot_budget_expenses", SEED_EXPENSES);
  const [participants, setParticipants] = usePersistedState("chogegot_budget_participants", SEED_PARTICIPANTS);
  const [newExp, setNewExp] = React.useState({ cat: "", item: "", type: "fixed", amount: "" });
  const [newName, setNewName] = React.useState("");
  const [editingExpId, setEditingExpId] = React.useState(null);
  const [editingExp, setEditingExp] = React.useState({ cat: "", item: "", type: "fixed", amount: "" });
  const [editingPartId, setEditingPartId] = React.useState(null);
  const [editingPart, setEditingPart] = React.useState("");

  // Guard: heal any null left by the pre-fix cloud-sync bug so .map/.filter don't crash
  const safeExpenses     = Array.isArray(expenses)     ? expenses     : SEED_EXPENSES;
  const safeParticipants = Array.isArray(participants) ? participants : SEED_PARTICIPANTS;

  const startEditExpense = (e) => {
    setEditingExpId(e.id);
    setEditingExp({ cat: e.cat, item: e.item, type: e.type, amount: String(e.amount) });
  };
  const saveEditExpense = () => {
    const amt = Number(editingExp.amount);
    if (!editingExp.item.trim() || !amt) { setEditingExpId(null); return; }
    setExpenses(safeExpenses.map(e => e.id === editingExpId
      ? { ...e, cat: editingExp.cat.trim() || "אחר", item: editingExp.item.trim(), type: editingExp.type, amount: amt }
      : e));
    setEditingExpId(null);
  };
  const cancelEditExpense = () => setEditingExpId(null);

  const startEditParticipant = (p) => { setEditingPartId(p.id); setEditingPart(p.name); };
  const saveEditParticipant = () => {
    if (!editingPart.trim()) { setEditingPartId(null); return; }
    setParticipants(safeParticipants.map(p => p.id === editingPartId ? { ...p, name: editingPart.trim() } : p));
    setEditingPartId(null);
  };
  const cancelEditParticipant = () => setEditingPartId(null);

  const total     = safeExpenses.reduce((s, e) => s + (Number(e.amount) || 0), 0);
  const comingArr = safeParticipants.filter(p => p.coming);
  const comingN   = comingArr.length;
  const perPerson = comingN > 0 ? Math.round(total / comingN) : 0;
  const collected = comingArr.filter(p => p.paid).length * perPerson;
  const remaining = Math.max(total - collected, 0);

  const addExpense = () => {
    const amt = Number(newExp.amount); if (!newExp.item.trim() || !amt) return;
    setExpenses([...safeExpenses, { id: `e-${Date.now()}`, cat: newExp.cat.trim() || "אחר", item: newExp.item.trim(), type: newExp.type, amount: amt }]);
    setNewExp({ cat: "", item: "", type: "fixed", amount: "" });
  };
  const removeExpense = id => setExpenses(safeExpenses.filter(e => e.id !== id));
  const addParticipant = () => {
    if (!newName.trim()) return;
    setParticipants([...safeParticipants, { id: `p-${Date.now()}`, name: newName.trim(), coming: true, paid: false }]);
    setNewName("");
  };
  const togglePaid   = id => setParticipants(safeParticipants.map(p => p.id === id ? { ...p, paid: !p.paid } : p));
  const toggleComing = id => setParticipants(safeParticipants.map(p => p.id === id ? { ...p, coming: !p.coming, paid: p.coming ? false : p.paid } : p));
  const removeParticipant = id => setParticipants(safeParticipants.filter(p => p.id !== id));

  const TabBtn = ({ id, label }) => (
    <button onClick={() => setTab(id)} style={{
      flex: 1, textAlign: "center", padding: "9px 4px", borderRadius: 10,
      background: tab === id ? T.surface : "transparent",
      color: tab === id ? T.ink : T.inkSoft,
      fontSize: 13, fontWeight: 700, cursor: "pointer", fontFamily: T.font,
      boxShadow: tab === id ? T.shadowSm : "none",
      border: "none", transition: "all 150ms",
    }}>{label}</button>
  );

  return (
    <>
      <StatusBar T={T}/>
      <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column" }}>
        {/* Orange header with totals — slim */}
        <div style={{
          background: `linear-gradient(160deg, ${PB.orange.main} 0%, #F0683E 70%, #E8512A 100%)`,
          padding: "36px 20px 14px",
          borderRadius: "0 0 22px 22px",
          color: "#fff",
          boxShadow: "0 6px 18px -10px rgba(232,81,42,0.45)",
          position: "relative", overflow: "hidden", flexShrink: 0,
        }}>
          <div style={{
            position: "absolute", top: -30, right: -30,
            width: 110, height: 110, borderRadius: "50%",
            background: "rgba(255,255,255,0.10)", pointerEvents: "none",
          }}/>

          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", position: "relative" }}>
            <RoundBtn T={T} icon="chevR" onClick={onBack} dark/>
            <div style={{ fontSize: 13, fontWeight: 800, letterSpacing: 0.3, color: "#fff" }}>תקציב</div>
            <div style={{ width: 40 }}/>
          </div>

          <div style={{ marginTop: 12, position: "relative", display: "flex", alignItems: "flex-end", justifyContent: "space-between", gap: 12 }}>
            <div>
              <div style={{ fontSize: 11.5, color: "rgba(255,255,255,0.85)", fontWeight: 700, letterSpacing: 0.4 }}>סך הוצאות</div>
              <div className="num" style={{ fontSize: 30, fontWeight: 800, marginTop: 2, letterSpacing: -0.5, color: "#fff", lineHeight: 1 }}>₪{total.toLocaleString()}</div>
            </div>
            <div style={{ textAlign: "left" }}>
              <div style={{ fontSize: 10.5, fontWeight: 700, opacity: 0.85, letterSpacing: 0.3 }}>חסר לאסוף</div>
              <div className="num" style={{ fontSize: 18, fontWeight: 800, marginTop: 2, lineHeight: 1,
                background: "rgba(0,0,0,0.25)", color: "#fff", padding: "4px 10px", borderRadius: 999, display: "inline-block" }}>₪{remaining.toLocaleString()}</div>
            </div>
          </div>

          <div style={{ display: "flex", gap: 6, marginTop: 10, position: "relative" }}>
            <div style={{ flex: 1, padding: "6px 9px", borderRadius: 8,
              background: "rgba(255,255,255,0.22)", border: "1px solid rgba(255,255,255,0.3)",
              backdropFilter: "blur(4px)", color: "#fff" }}>
              <div style={{ fontSize: 10, fontWeight: 700, opacity: 0.92, letterSpacing: 0.3 }}>חלוקה ל-{comingN}</div>
              <div className="num" style={{ fontSize: 14, fontWeight: 800, lineHeight: 1 }}>₪{perPerson.toLocaleString()}</div>
            </div>
            <div style={{ flex: 1, padding: "6px 9px", borderRadius: 8,
              background: PB.pink.main, color: PB.pink.on }}>
              <div style={{ fontSize: 10, fontWeight: 700, opacity: 0.82, letterSpacing: 0.3 }}>נאספו</div>
              <div className="num" style={{ fontSize: 14, fontWeight: 800, lineHeight: 1 }}>₪{collected.toLocaleString()}</div>
            </div>
          </div>
        </div>

        {/* Tabs */}
        <div style={{ display: "flex", gap: 4, margin: "16px 20px 0", padding: 4,
          background: T.surfaceAlt, borderRadius: T.radius, flexShrink: 0 }}>
          <TabBtn id="summary" label="סיכום"/>
          <TabBtn id="expenses" label={`הוצאות (${safeExpenses.length})`}/>
          <TabBtn id="people" label={`משתתפות (${comingN})`}/>
        </div>

        {/* Body */}
        <div style={{ flex: 1, overflow: "auto", padding: "14px 20px 14px", display: "flex", flexDirection: "column", gap: 9 }}>
          {tab === "summary" && (
            <>
              <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between", marginBottom: 4 }}>
                <h3 style={{ fontSize: 14.5, fontWeight: 700, margin: 0, letterSpacing: -0.2 }}>פירוט לפי קטגוריה</h3>
                <span style={{ fontSize: 12, color: T.muted, fontWeight: 600 }}>
                  {EXPENSE_CATS.filter(c => safeExpenses.some(e => e.cat === c)).length} קטגוריות
                </span>
              </div>
              {EXPENSE_CATS.map(c => {
                const sum = safeExpenses.filter(e => e.cat === c).reduce((s, e) => s + e.amount, 0);
                if (!sum) return null;
                const pct = total ? Math.round((sum / total) * 100) : 0;
                return (
                  <div key={c}>
                    <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between", marginBottom: 6 }}>
                      <span style={{ fontSize: 13.5, fontWeight: 600, color: T.ink }}>{c}</span>
                      <span className="num" style={{ fontSize: 13, fontWeight: 700, color: T.ink }}>
                        ₪{sum.toLocaleString()} <span style={{ color: T.muted, fontWeight: 500, fontSize: 12 }}>· {pct}%</span>
                      </span>
                    </div>
                    <div style={{ height: 6, borderRadius: 999, background: T.surfaceAlt, overflow: "hidden" }}>
                      <div style={{ height: "100%", width: `${pct}%`, background: T.accent, borderRadius: 999, transition: "width 300ms" }}/>
                    </div>
                  </div>
                );
              })}
              <div style={{
                marginTop: 10, padding: "11px 14px", background: T.surfaceAlt, borderRadius: T.radius,
                fontSize: 12, lineHeight: 1.55, color: T.inkSoft, fontWeight: 500,
              }}>
                <div><b style={{ color: T.ink }}>הוצאה קבועה</b> — לא משתנה לפי כמות המשתתפות (וילה, אטרקציה).</div>
                <div style={{ marginTop: 3 }}><b style={{ color: T.ink }}>הוצאה משתנה</b> — עולה או יורדת לפי כמות המשתתפות (אוכל, אלכוהול).</div>
              </div>
              <div style={{ flex: 1, minHeight: 8 }}/>
              <Btn T={T} icon="send" onClick={() => {
                const msg = `היוש!!! האירוע של השנה קרב ובא! 🎉 כדי שנוכל להמשיך בסגירות אחרונות מזכירות להעביר תשלום של ₪${perPerson} 💛`;
                openWhatsApp(msg);
              }}>בקשי השלמת תשלום</Btn>
            </>
          )}

          {tab === "expenses" && (
            <>
              {safeExpenses.map((e, i) => editingExpId === e.id ? (
                /* INLINE EDIT MODE */
                <div key={e.id} style={{
                  background: PB.orange.soft, border: `1px solid ${PB.orange.main}55`, borderRadius: 13,
                  padding: "10px 12px", display: "flex", flexDirection: "column", gap: 6,
                }}>
                  <div style={{ display: "flex", gap: 6 }}>
                    <input value={editingExp.cat} onChange={ev => setEditingExp({ ...editingExp, cat: ev.target.value })}
                      placeholder="קטגוריה..." style={{
                        flex: 1, padding: "8px 10px", borderRadius: 8,
                        border: T.border, background: "#fff",
                        fontSize: 12.5, fontWeight: 600, fontFamily: T.font, color: T.ink, outline: "none",
                      }}/>
                    <select value={editingExp.type} onChange={ev => setEditingExp({ ...editingExp, type: ev.target.value })} style={{
                      width: 90, padding: "8px 10px", borderRadius: 8,
                      border: T.border, background: "#fff", color: T.ink,
                      fontSize: 12.5, fontWeight: 600, fontFamily: T.font, outline: "none",
                    }}>
                      <option value="fixed">קבועה</option>
                      <option value="variable">משתנה</option>
                    </select>
                  </div>
                  <div style={{ display: "flex", gap: 6 }}>
                    <input value={editingExp.item} onChange={ev => setEditingExp({ ...editingExp, item: ev.target.value })}
                      placeholder="פריט / תיאור..." style={{
                        flex: 1, padding: "9px 10px", borderRadius: 8,
                        border: T.border, background: "#fff",
                        fontSize: 13, fontWeight: 600, fontFamily: T.font, color: T.ink, outline: "none", minWidth: 0,
                      }}/>
                    <input value={editingExp.amount} onChange={ev => setEditingExp({ ...editingExp, amount: ev.target.value.replace(/[^0-9]/g, "") })}
                      placeholder="₪0" inputMode="numeric" style={{
                        width: 70, padding: "9px 10px", borderRadius: 8,
                        border: T.border, background: "#fff",
                        fontSize: 13, fontWeight: 700, fontFamily: T.font, color: T.ink, outline: "none",
                        direction: "ltr", textAlign: "center",
                      }}/>
                  </div>
                  <div style={{ display: "flex", gap: 6, marginTop: 2 }}>
                    <button onClick={saveEditExpense} style={{
                      flex: 1, padding: "8px 10px", borderRadius: 8,
                      background: PB.orange.main, color: PB.orange.on,
                      border: "none", fontSize: 12.5, fontWeight: 800, cursor: "pointer", fontFamily: T.font,
                    }}>שמירה</button>
                    <button onClick={cancelEditExpense} style={{
                      flex: 1, padding: "8px 10px", borderRadius: 8,
                      background: "transparent", color: T.inkSoft,
                      border: T.border, fontSize: 12.5, fontWeight: 700, cursor: "pointer", fontFamily: T.font,
                    }}>ביטול</button>
                  </div>
                </div>
              ) : (
                /* VIEW MODE */
                <div key={e.id} style={{
                  display: "flex", alignItems: "center", gap: 11,
                  background: T.surface, border: T.border, borderRadius: 13,
                  padding: "11px 12px", boxShadow: T.shadowSm,
                }}>
                  <div style={{
                    width: 36, height: 36, borderRadius: 10,
                    background: T.surfaceAlt, color: T.ink,
                    display: "flex", alignItems: "center", justifyContent: "center",
                    fontSize: 12.5, fontWeight: 700, flexShrink: 0,
                  }} className="num">{i + 1}</div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 13.5, fontWeight: 700, color: T.ink }}>{e.item}</div>
                    <div style={{ display: "flex", gap: 6, marginTop: 3, alignItems: "center", flexWrap: "wrap" }}>
                      <span style={{ fontSize: 10.5, fontWeight: 600, padding: "2px 7px", borderRadius: 999, background: T.surfaceAlt, color: T.inkSoft }}>{e.cat}</span>
                      <span style={{ fontSize: 10.5, fontWeight: 600, padding: "2px 7px", borderRadius: 999,
                        background: e.type === "fixed" ? PB.pink.soft : PB.orange.soft,
                        color: e.type === "fixed" ? PB.pink.deep : PB.orange.deep,
                      }}>{e.type === "fixed" ? "קבועה" : "משתנה"}</span>
                    </div>
                  </div>
                  <div className="num" style={{ fontSize: 14.5, fontWeight: 800, color: T.ink }}>₪{e.amount.toLocaleString()}</div>
                  <div style={{ display: "flex", gap: 3 }}>
                    <button onClick={() => startEditExpense(e)} title="עריכה" style={{
                      width: 24, height: 24, borderRadius: 7, background: "transparent",
                      border: "none", cursor: "pointer", padding: 0, color: PB.orange.deep,
                      display: "flex", alignItems: "center", justifyContent: "center",
                    }}><Icon name="edit" size={13} color={PB.orange.deep} w={1.6}/></button>
                    <button onClick={() => removeExpense(e.id)} title="מחיקה" style={{
                      width: 24, height: 24, borderRadius: 7, background: "transparent",
                      border: "none", cursor: "pointer", padding: 0, color: T.muted,
                      display: "flex", alignItems: "center", justifyContent: "center",
                    }}><Icon name="close" size={13} color={T.muted} w={1.6}/></button>
                  </div>
                </div>
              ))}

              {/* Add form */}
              <div style={{ marginTop: 8, padding: 12, background: T.surfaceAlt,
                border: `1px dashed ${T.lineStrong}`, borderRadius: T.radius,
                display: "flex", flexDirection: "column", gap: 7 }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: T.inkSoft, letterSpacing: 0.5, textTransform: "uppercase" }}>הוצאה חדשה</div>
                <div style={{ display: "flex", gap: 6 }}>
                  <input value={newExp.cat} onChange={e => setNewExp({ ...newExp, cat: e.target.value })}
                    placeholder="קטגוריה (לוקיישן, אוכל...)"
                    style={{
                      flex: 1, padding: "10px 10px", borderRadius: 10,
                      border: T.border, background: T.surface, color: T.ink,
                      fontSize: 12.5, fontWeight: 600, fontFamily: T.font, outline: "none", minWidth: 0,
                    }}/>
                  <select value={newExp.type} onChange={e => setNewExp({ ...newExp, type: e.target.value })} style={{
                    width: 90, padding: "10px 10px", borderRadius: 10,
                    border: T.border, background: T.surface, color: T.ink,
                    fontSize: 12.5, fontWeight: 600, fontFamily: T.font, outline: "none",
                  }}>
                    <option value="fixed">קבועה</option>
                    <option value="variable">משתנה</option>
                  </select>
                </div>
                <div style={{ display: "flex", gap: 6 }}>
                  <input value={newExp.item} onChange={e => setNewExp({ ...newExp, item: e.target.value })}
                    placeholder="פריט / תיאור..."
                    onKeyDown={e => e.key === "Enter" && addExpense()}
                    style={{
                      flex: 1, padding: "11px 12px", borderRadius: 10,
                      border: T.border, background: T.surface,
                      fontSize: 13, fontWeight: 600, fontFamily: T.font,
                      color: T.ink, outline: "none", minWidth: 0,
                    }}/>
                  <input value={newExp.amount} onChange={e => setNewExp({ ...newExp, amount: e.target.value.replace(/[^0-9]/g, "") })}
                    placeholder="₪0" inputMode="numeric"
                    onKeyDown={e => e.key === "Enter" && addExpense()}
                    style={{
                      width: 80, padding: "11px 12px", borderRadius: 10,
                      border: T.border, background: T.surface,
                      fontSize: 13, fontWeight: 700, fontFamily: T.font,
                      color: T.ink, outline: "none", direction: "ltr", textAlign: "center",
                    }}/>
                </div>
                <button onClick={addExpense} disabled={!newExp.item.trim() || !newExp.amount} style={{
                  width: "100%", padding: "11px 14px", borderRadius: 10,
                  background: newExp.item.trim() && newExp.amount ? T.accent : T.surfaceAlt,
                  color: newExp.item.trim() && newExp.amount ? T.onAccent : T.muted,
                  border: "none", cursor: newExp.item.trim() && newExp.amount ? "pointer" : "default",
                  fontFamily: T.font, fontSize: 14, fontWeight: 800,
                  display: "flex", alignItems: "center", justifyContent: "center", gap: 7,

                  <button onClick={cancelEditParticipant} style={{
                    padding: "8px 12px", borderRadius: 8,
                    background: "transparent", color: T.inkSoft, border: T.border,
                    fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: T.font,

                    width: 24, height: 24, borderRadius: 7, flexShrink: 0,
                    background: p.paid && p.coming ? T.accent : "transparent",
                    border: p.paid && p.coming ? "none" : `1.5px solid ${T.lineStrong}`,
                    padding: 0, cursor: p.coming ? "pointer" : "not-allowed",
                    display: "flex", alignItems: "center", justifyContent: "center",
                  }}>{p.paid && p.coming && <Icon name="check" size={13} color={T.onAccent} w={2}/>}</button>
                  <button onClick={() => toggleComing(p.id)} style={{
                    flex: 1, fontSize: 13.5, fontWeight: 600, color: T.ink,
                    background: "transparent", border: "none", cursor: "pointer",
                    textAlign: "right", fontFamily: T.font,
                    textDecoration: p.coming ? "none" : "line-through",
                    padding: 0, minWidth: 0,
                  }}>{p.name}</button>
                  <div className="num" style={{ fontSize: 12, fontWeight: 700,
                    color: p.coming ? (p.paid ? T.accent : T.inkSoft) : T.muted }}>
                    {!p.coming ? "לא מגיעה" : p.paid ? `שילמה · ₪${perPerson}` : `חייבת ₪${perPerson}`}

                  <div style={{ display: "flex", gap: 3 }}>
                    <button onClick={() => startEditParticipant(p)} title="עריכה" style={{

                      width: 24, height: 24, borderRadius: 7, background: "transparent",
                      border: "none", cursor: "pointer", padding: 0,
                      display: "flex", alignItems: "center", justifyContent: "center",
                    }}><Icon name="close" size={13} color={T.muted} w={1.6}/></button>
                  </div>
                </div>
              ))}

              <div style={{ marginTop: 8, padding: 10, background: T.surfaceAlt,
                border: `1px dashed ${T.lineStrong}`, borderRadius: T.radius,
                display: "flex", gap: 6 }}>
                <input value={newName} onChange={e => setNewName(e.target.value)}

                    flex: 1, padding: "11px 12px", borderRadius: 10,

                    fontSize: 13, fontWeight: 600, fontFamily: T.font,
                    color: T.ink, outline: "none", minWidth: 0,
                  }}/>
                <button onClick={addParticipant} style={{
                  width: 44, flexShrink: 0, borderRadius: 10, background: T.accent, color: T.onAccent,
                  border: "none", cursor: "pointer",
                  display: "flex", alignItems: "center", justifyContent: "center",
                }}><Icon name="plus" size={17} color={T.onAccent} w={2}/></button>
              </div>
            </>
          )}
        </div>
      </div>
      <HomeBar/>
    </>
  );
}

function TimerGame({ T: parentT, game, onBack }) {
  const T = { ...parentT, accent: PB[game.pop].main, onAccent: PB[game.pop].on, accentSoft: PB[game.pop].soft, accentDeep: PB[game.pop].deep };
  const deck = TIMER_DECKS[game.id];
  const totalRounds = deck.rounds || 2;
  const secsPerRound = deck.secondsPerRound || 120;
  const isImages = !!deck.images;

  const [phase, setPhase] = React.useState("intro");
  const [round, setRound] = React.useState(1);
  const [timeLeft, setTimeLeft] = React.useState(secsPerRound);
  const [idx, setIdx] = React.useState(0);
  const [got, setGot] = React.useState(0);
  const [skipped, setSkipped] = React.useState(0);
  const [roundScores, setRoundScores] = React.useState([]);
  const [usedIdx, setUsedIdx] = React.useState([]);
  const [projecting, setProjecting] = React.useState(false);
  const order = React.useRef([]);

  const startRound = (roundNum, fresh = false) => {
    const used = fresh ? [] : usedIdx;
    const all = deck.prompts.map((_, i) => i);
    let available = all.filter(i => !used.includes(i));
    if (available.length === 0) available = all;
    order.current = available.sort(() => Math.random() - 0.5);
    setRound(roundNum); setTimeLeft(secsPerRound);
    setIdx(0); setGot(0); setSkipped(0);
    if (fresh) { setUsedIdx([]); setRoundScores([]); }
    setPhase("play");
  };

  React.useEffect(() => {
    if (phase !== "play") return;
    if (timeLeft <= 0) {
      const usedThisRound = order.current.slice(0, idx);
      setUsedIdx(prev => [...prev, ...usedThisRound]);
      setRoundScores(prev => [...prev, { got, skipped }]);
      setPhase("roundEnd"); // always — user decides whether to continue or finish
      return;
    }
    const t = setTimeout(() => setTimeLeft(s => s - 1), 1000);
    return () => clearTimeout(t);
  }, [phase, timeLeft]);

  const currentI = order.current[idx % (order.current.length || 1)];
  const prompt = deck.prompts[currentI];
  const isImagePrompt = isImages && prompt && typeof prompt === "object";
  const mins = Math.floor(timeLeft / 60);
  const secs = String(timeLeft % 60).padStart(2, "0");
  // Last 10 seconds — force a hot-red pill so the countdown reads as urgent
  // regardless of the per-game accent color.
  const danger = timeLeft <= 10;
  const DANGER_RED = "#E54848";
  const correct = () => { setGot(g => g + 1); setIdx(i => i + 1); };
  const skip = () => { setSkipped(s => s + 1); setIdx(i => i + 1); };

  if (phase === "intro")
    return <GameIntro T={T} game={game} rules={deck.rules} onBack={onBack}
      onStart={() => startRound(1, true)} startLabel="התחילו סבב 1"/>;

  if (phase === "roundEnd") {
    return (
      <>
        <StatusBar T={T}/>
        <div style={{ position: "absolute", inset: 0, padding: "48px 22px 24px", display: "flex", flexDirection: "column" }}>
          <TopBar T={T} onBack={onBack} title={game.t}/>
          <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", textAlign: "center" }}>
            <Eyebrow T={T}>סבב {round}</Eyebrow>
            <h1 style={{ fontSize: 28, fontWeight: 800, margin: "10px 0 6px", letterSpacing: -0.5 }}>נגמר הסבב</h1>
            <p style={{ fontSize: 14, color: T.inkSoft, fontWeight: 500, margin: "0 0 20px" }}>זמן להחליף זוג ולהמשיך, או לעצור פה.</p>
            <Card T={T} padding={22} style={{ width: "100%", textAlign: "center" }}>
              <div style={{ fontSize: 12.5, fontWeight: 700, color: T.inkSoft, letterSpacing: 0.3, textTransform: "uppercase" }}>צברתן</div>
              <div className="num" style={{ fontSize: 60, fontWeight: 800, color: T.accent, lineHeight: 1, letterSpacing: -1, marginTop: 8 }}>{got}</div>
              <div style={{ fontSize: 14, fontWeight: 700, color: T.ink, marginTop: 6 }}>ניחושים נכונים בסבב הזה</div>
              <div style={{ fontSize: 12, color: T.muted, marginTop: 4 }}>דילוגים: {skipped}</div>
            </Card>
            <p style={{ fontSize: 13, color: T.inkSoft, fontWeight: 500, marginTop: 18, lineHeight: 1.5, maxWidth: 280 }}>
              בנק המילים מתחדש — לא חוזרות על מה שהיה.
            </p>
          </div>
          <Btn T={T} onClick={() => startRound(round + 1)}>התחילו סבב {round + 1}</Btn>
          <Btn T={T} variant="quiet" onClick={() => setPhase("done")} style={{ marginTop: 10 }}>סיימו משחק</Btn>
        </div>
        <HomeBar/>
      </>
    );
  }

  if (phase === "done") {
    const max = roundScores.length ? Math.max(...roundScores.map(r => r.got)) : 0;
    const winningRounds = roundScores.map((r, i) => r.got === max ? i + 1 : null).filter(Boolean);
    return (
      <>
        <StatusBar T={T}/>
        <div style={{ position: "absolute", inset: 0, padding: "48px 22px 24px", display: "flex", flexDirection: "column" }}>
          <TopBar T={T} onBack={onBack} title={game.t}/>
          <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "flex-start", textAlign: "center", overflow: "auto", paddingTop: 12 }}>
            <h1 style={{ fontSize: 28, fontWeight: 800, margin: "0 0 6px", letterSpacing: -0.5 }}>סיכום המשחק</h1>
            <p style={{ fontSize: 14, color: T.inkSoft, fontWeight: 500, margin: "0 0 18px" }}>{roundScores.length} סבבים שיחקתן</p>
            <div style={{ display: "flex", flexDirection: "column", gap: 8, width: "100%" }}>
              {roundScores.map((r, i) => {
                const isWin = r.got === max && max > 0;
                return (
                  <Card key={i} T={T} padding={14} style={{ display: "flex", alignItems: "center", gap: 12,
                    background: isWin ? T.accentSoft : T.surface,
                    border: isWin ? `1.5px solid ${T.accent}` : T.border, textAlign: "right" }}>
                    <div style={{ width: 40, height: 40, borderRadius: 10, flexShrink: 0,
                      background: isWin ? T.accent : T.surfaceAlt,
                      color: isWin ? T.onAccent : T.inkSoft,
                      display: "flex", alignItems: "center", justifyContent: "center",
                      fontSize: 13, fontWeight: 800 }} className="num">{i + 1}</div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 13.5, fontWeight: 800, color: T.ink }}>סבב {i + 1}</div>
                      <div style={{ fontSize: 11.5, color: T.inkSoft, fontWeight: 600 }}>דילוגים: {r.skipped}</div>
                    </div>
                    <div className="num" style={{ fontSize: 28, fontWeight: 800, color: isWin ? T.accent : T.ink, letterSpacing: -0.5 }}>{r.got}</div>
                    {isWin && <div style={{ padding: "3px 10px",
                      background: T.accent, color: T.onAccent, borderRadius: 999, fontSize: 10, fontWeight: 800 }}>הכי</div>}
                  </Card>
                );
              })}
            </div>
            <div style={{ marginTop: 18, padding: "10px 18px", background: T.surfaceAlt, borderRadius: T.radius,
              fontSize: 14, fontWeight: 800, color: T.ink }}>
              {winningRounds.length > 1 ? `תיקו בסבבים ${winningRounds.join(", ")} 🤝` :
               winningRounds.length === 1 ? `הזוג של סבב ${winningRounds[0]} ניצח 🎉` : "אין מנצח עדיין"}
            </div>
          </div>
          <Btn T={T} onClick={() => startRound(1, true)} style={{ marginTop: 12 }}>שחקו עוד</Btn>
          <button onClick={onBack} style={{ marginTop: 10, background: "transparent", border: "none", fontSize: 13, fontWeight: 600, color: T.inkSoft, cursor: "pointer" }}>לרשימת המשחקים</button>
        </div>
        <HomeBar/>
      </>
    );
  }

  // Card color rotation — orange / pink / deep rose / ink
  const cardCycle = [
    { bg: "#E8512A", fg: "#fff" },     // orange
    { bg: "#EAA0BA", fg: "#1A1A1A" },  // soft pink
    { bg: "#C75E82", fg: "#fff" },     // deep rose
    { bg: "#1A1A1A", fg: "#fff" },     // ink
  ];
  const cc = cardCycle[idx % cardCycle.length];

  const playBody = () => (
    <>
      {/* Top row: timer + round + score */}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8, flexWrap: "wrap" }}>
        <div style={{
          background: danger ? DANGER_RED : T.surfaceInk,
          color: "#fff", border: `1px solid ${danger ? DANGER_RED : T.surfaceInk}`,
          borderRadius: 999, padding: "10px 22px",
          fontSize: 30, fontWeight: 800, letterSpacing: 1.5,
          animation: danger ? "pulse 0.7s ease-in-out infinite" : "none",
        }} className="num">{mins}:{secs}</div>
        <div style={{
          background: T.surfaceAlt, color: T.ink, border: T.border,
          borderRadius: 999, padding: "7px 12px",
          fontSize: 12, fontWeight: 800, letterSpacing: 0.4,
        }}>סבב {round}</div>
      </div>

      <div style={{ display: "flex", justifyContent: "center", gap: 8, marginTop: 10 }}>
        <span style={{ fontSize: 12, fontWeight: 700, background: T.ok, color: "#fff",
          borderRadius: 999, padding: "5px 12px",
          display: "inline-flex", alignItems: "center", gap: 6 }}>✓ {got} נכון</span>
        <span style={{ fontSize: 12, fontWeight: 700, background: T.surfaceAlt, color: T.inkSoft, border: T.border,
          borderRadius: 999, padding: "5px 11px" }}>{deck.label}</span>
      </div>

      <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "12px 0", minHeight: 0 }}>
        <div key={idx} style={{
          width: "100%",
          background: cc.bg,
          color: cc.fg,
          border: "none",
          borderRadius: 22,
          boxShadow: "0 12px 28px -10px rgba(20,18,16,0.35)",
          padding: isImagePrompt ? 0 : "32px 22px",
          overflow: "hidden",
          textAlign: "center",
          animation: "cardIn 280ms cubic-bezier(.18,.89,.43,1.19)",
          display: "flex", flexDirection: "column", alignItems: "stretch", justifyContent: "center",
          minHeight: 240,
        }}>
          {isImagePrompt ? (
            <>
              <div style={{ position: "relative", width: "100%", height: 240,
                background: "rgba(0,0,0,0.15)", overflow: "hidden",
                display: "flex", alignItems: "center", justifyContent: "center" }}>
                <img
                  src={`https://loremflickr.com/600/600/${encodeURIComponent(prompt.en)}?lock=${currentI + 1}`}
                  alt={prompt.he}
                  style={{ width: "100%", height: "100%", objectFit: "cover", display: "block" }}
                  onError={(e) => {
                    e.target.style.display = "none";
                    const fallback = e.target.parentElement.querySelector("[data-fallback]");
                    if (fallback) fallback.style.display = "flex";
                  }}
                />
                <div data-fallback style={{
                  display: "none", position: "absolute", inset: 0,
                  alignItems: "center", justifyContent: "center",
                  fontSize: 24, fontWeight: 800, color: cc.fg, padding: 24, textAlign: "center",
                }}>{prompt.he}</div>
              </div>
              <div style={{
                padding: "14px 16px",
                fontSize: 22, fontWeight: 800, color: cc.fg,
                background: "rgba(0,0,0,0.18)",
                textAlign: "center", letterSpacing: -0.3,
              }}>{prompt.he}</div>
            </>
          ) : (
            <div style={{
              fontSize: 32,
              fontWeight: 800, lineHeight: 1.15,
              color: cc.fg, textWrap: "balance", letterSpacing: -0.6,
            }}>{prompt}</div>
          )}
        </div>
      </div>

      <div style={{ display: "flex", gap: 10, justifyContent: "center" }}>
        <button onClick={skip} style={{
          flex: 1, padding: "15px",
          background: T.surface, color: T.ink, border: T.border,
          borderRadius: T.radius, fontSize: 15, fontWeight: 700,
          boxShadow: T.shadowSm, cursor: "pointer", fontFamily: T.font,
        }}>עבור</button>
        <button onClick={correct} style={{
          flex: 2, padding: "15px",
          background: T.ok, color: "#fff",
          border: "none", borderRadius: T.radius,
          fontSize: 15, fontWeight: 700,
          boxShadow: T.shadowSm, cursor: "pointer", fontFamily: T.font,
        }}>נכון!</button>
      </div>
    </>
  );

  return (
    <>
      <StatusBar T={T}/>
      <div style={{ position: "absolute", inset: 0, padding: "48px 22px 24px", display: "flex", flexDirection: "column" }}>
        <GameTopBar T={T} onBack={onBack} title={game.t}/>
        {playBody()}
      </div>
      <HomeBar/>
    </>
  );
}

function QuizGame({ T: parentT, game, onBack }) {
  const T = { ...parentT, accent: PB[game.pop].main, onAccent: PB[game.pop].on, accentSoft: PB[game.pop].soft, accentDeep: PB[game.pop].deep };
  const deck = QUIZ_DECKS[game.id];
  const questions = deck.questions || [];
  const total = questions.length;
  const timerSec = deck.secondsPerQ || 10;

  // Session state — null when running solo with mock participants. Once the host clicks
  // 'פתחי לוביי' we create a Firestore doc and from then on the screen is driven by it.
  const [sessionCode, setSessionCode] = React.useState(null);
  const [sessionDoc, setSessionDoc] = React.useState(null);
  const [liveParticipants, setLiveParticipants] = React.useState([]);
  const [creatingSession, setCreatingSession] = React.useState(false);

  // App-state context for the host's identifying details (used to seed the session)
  const persistedState = React.useMemo(() => {
    try { return JSON.parse(localStorage.getItem("chogegot_state") || "{}"); } catch (e) { return {}; }
  }, []);
  const authSession = React.useMemo(loadAuthSession, []);
  const hostUsername = authSession?.username || null;
  const brideName = persistedState?.name || authSession?.fullName?.split(" ")[0] || "הכלה";
  const eventName = persistedState?.eventName || "";

  // Real participants pool (live) → falls back to the simulated names for the solo flow
  const mockNames = React.useMemo(() => {
    const list = (deck.mockAnswers?.[0] || []).map(a => a.n);
    return list.length ? list : ["ליהי", "שירה", "תמר"];
  }, [deck]);
  const participants = sessionCode ? liveParticipants.map(p => p.name) : mockNames;

  const [phase, setPhase] = React.useState("intro"); // intro | lobby | play | timeUp | revealed | done
  const [qi, setQi] = React.useState(0);
  const [timeLeft, setTimeLeft] = React.useState(timerSec);
  const [answered, setAnswered] = React.useState([]); // names of participants who answered

  // Live subscriptions when a session is open
  React.useEffect(() => {
    if (!sessionCode) return;
    const off1 = fbSubscribeSession(sessionCode, setSessionDoc);
    const off2 = fbSubscribeParticipants(sessionCode, setLiveParticipants);
    return () => { try { off1(); } catch (e) {} try { off2(); } catch (e) {} };
  }, [sessionCode]);

  // Reflect real submissions into the `answered` list during play
  React.useEffect(() => {
    if (!sessionCode || phase !== "play") return;
    const submittedNames = liveParticipants
      .filter(p => p.answers && p.answers[qi] != null && String(p.answers[qi]).trim())
      .map(p => p.name);
    setAnswered(submittedNames);
  }, [sessionCode, phase, liveParticipants, qi]);

  // Effect 1: timer countdown
  React.useEffect(() => {
    if (phase !== "play") return;
    if (timeLeft <= 0) { setPhase("timeUp"); return; }
    const t = setTimeout(() => setTimeLeft(s => s - 1), 1000);
    return () => clearTimeout(t);
  }, [phase, timeLeft]);

  // Effect 2: simulated participants (solo mode only)
  React.useEffect(() => {
    if (sessionCode || phase !== "play") return;
    if (answered.length >= participants.length) {
      const t = setTimeout(() => setPhase("timeUp"), 700);
      return () => clearTimeout(t);
    }
    const delay = 2000 + Math.random() * 5000;
    const t = setTimeout(() => {
      const remaining = participants.filter(p => !answered.includes(p));
      if (remaining.length > 0) {
        const next = remaining[Math.floor(Math.random() * remaining.length)];
        setAnswered(a => a.includes(next) ? a : [...a, next]);
      }
    }, delay);
    return () => clearTimeout(t);
  }, [phase, answered.length, participants.length, sessionCode]);

  // Push host-side phase changes into the session doc so participants stay in sync
  React.useEffect(() => {
    if (!sessionCode) return;
    const map = { play: "playing", timeUp: "reveal", revealed: "reveal", done: "done", lobby: "lobby" };
    const wireState = map[phase];
    if (wireState) fbUpdateSession(sessionCode, { state: wireState, currentQi: qi });
  }, [sessionCode, phase, qi]);

  const openLobby = async () => {
    if (creatingSession) return;
    setCreatingSession(true);
    try {
      const code = await fbCreateSession({
        hostUsername, gameId: game.id, questions, brideName, eventName,
      });
      if (code) { setSessionCode(code); setPhase("lobby"); }
      else alert("לא הצלחנו לפתוח לוביי. בדקי חיבור ונסי שוב.");
    } finally { setCreatingSession(false); }
  };

  const startQ = (idx) => { setQi(idx); setTimeLeft(timerSec); setAnswered([]); setPhase("play"); };
  const nextQ = () => { if (qi + 1 >= total) { setPhase("done"); return; } startQ(qi + 1); };
  const restart = () => { setQi(0); setAnswered([]); setPhase(sessionCode ? "lobby" : "intro"); };

  const question = questions[qi];
  const mockAnswers = deck.mockAnswers?.[qi] || [];
  // Real submitted answers from session participants for this question
  const liveAnswers = sessionCode
    ? liveParticipants
        .filter(p => p.answers && p.answers[qi] != null && String(p.answers[qi]).trim())
        .map(p => ({ n: p.name, a: String(p.answers[qi]).trim() }))
    : [];
  const answersToShow = sessionCode ? liveAnswers : mockAnswers;
  // Match the timer game's danger threshold so the bride-quiz hot-state reads as 'last 10
  // seconds = red' too, regardless of the per-game accent color.
  const danger = timeLeft <= 10 && phase === "play";
  const DANGER_RED = "#E54848";

  if (phase === "intro") {
    const introExtras = (
      <Card T={T} padding={"14px 16px"} style={{ marginTop: 14, background: PB.pink.soft, border: `1px solid ${PB.pink.main}33` }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <div style={{ width: 42, height: 42, borderRadius: 12, background: PB.pink.main, color: PB.pink.on,
            display: "flex", alignItems: "center", justifyContent: "center" }}>
            <Icon name="qr" size={22} color={PB.pink.on} w={1.6}/>
          </div>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 13.5, fontWeight: 800, color: PB.pink.deep }}>הצטרפות הבנות בזמן אמת</div>
            <div style={{ fontSize: 11.5, color: T.inkSoft, fontWeight: 600, marginTop: 2 }}>
              סורקות QR או מקלידות קוד — רואות שאלות ועונות מהטלפון שלהן.
            </div>
          </div>
        </div>
        <button onClick={openLobby} disabled={creatingSession} style={{
          marginTop: 12, width: "100%", padding: "10px 14px",
          background: PB.pink.main, color: PB.pink.on, border: "none", borderRadius: T.radius,
          fontSize: 13.5, fontWeight: 800, cursor: creatingSession ? "wait" : "pointer", fontFamily: T.font,
          display: "flex", alignItems: "center", justifyContent: "center", gap: 6,
          opacity: creatingSession ? 0.7 : 1,
        }}>
          <Icon name="qr" size={15} color={PB.pink.on} w={1.7}/>
          {creatingSession ? "פותחת..." : "פתחי לוביי לחברות"}
        </button>
        <button onClick={() => startQ(0)} style={{
          marginTop: 7, width: "100%", padding: "8px 14px",
          background: "transparent", color: T.inkSoft, border: "none",
          fontSize: 11.5, fontWeight: 700, cursor: "pointer", fontFamily: T.font,
        }}>או לדלג לתצוגה ללא חברות (דמו)</button>
      </Card>
    );
    return <GameIntro T={T} game={game} rules={deck.rules} onBack={onBack}
      onStart={openLobby} startLabel="פתחי לוביי לחברות" extras={introExtras}/>;
  }

  // ─── Lobby phase — show QR + code, wait for participants ────────
  if (phase === "lobby") {
    const joinUrl = `${window.location.origin}${window.location.pathname}?join=${sessionCode}`;
    const qrSrc = `https://api.qrserver.com/v1/create-qr-code/?size=220x220&margin=8&data=${encodeURIComponent(joinUrl)}`;
    return (
      <>
        <StatusBar T={T}/>
        <div style={{ position: "absolute", inset: 0, padding: "48px 22px 24px", display: "flex", flexDirection: "column", overflow: "auto" }}>
          <TopBar T={T} onBack={onBack} title={game.t}/>
          <div style={{ marginTop: 4, textAlign: "center" }}>
            <Eyebrow T={T}>לוביי פתוח</Eyebrow>
            <h1 style={{ fontSize: 24, fontWeight: 800, margin: "8px 0 4px", letterSpacing: -0.4 }}>
              הבנות מצטרפות
            </h1>
            <p style={{ fontSize: 13, color: T.inkSoft, fontWeight: 500, margin: 0, lineHeight: 1.45 }}>
              סרקי את ה-QR או הקלידי את הקוד באפליקציה.
            </p>
          </div>

          <div style={{ marginTop: 14, padding: 16, background: T.surface, borderRadius: T.radiusLg,
            border: T.border, boxShadow: T.shadow, display: "flex", flexDirection: "column", alignItems: "center" }}>
            <img src={qrSrc} alt={`QR code for ${joinUrl}`}
              style={{ width: 180, height: 180, borderRadius: 12, display: "block" }}/>
            <div style={{ marginTop: 12, fontSize: 10.5, fontWeight: 800, color: T.muted, letterSpacing: 1.6, textTransform: "uppercase" }}>קוד הצטרפות</div>
            <div className="num" style={{ fontSize: 30, fontWeight: 800, color: T.ink, letterSpacing: 4, marginTop: 4 }}>{sessionCode}</div>
          </div>

          {/* Live participants list */}
          <div style={{ marginTop: 16 }}>
            <div style={{ fontSize: 12, fontWeight: 800, color: T.muted, letterSpacing: 0.6, textTransform: "uppercase", marginBottom: 8 }}>
              הצטרפו {liveParticipants.length}
            </div>
            {liveParticipants.length === 0 ? (
              <div style={{ padding: "14px 16px", background: T.surfaceAlt, borderRadius: T.radius,
                border: `1px dashed ${T.lineStrong}`, fontSize: 12.5, color: T.inkSoft, fontWeight: 600, textAlign: "center" }}>
                מחכות לחברה הראשונה...
              </div>
            ) : (
              <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                {liveParticipants.map(p => (
                  <span key={p.id} style={{
                    padding: "5px 11px", borderRadius: 999, background: PB.pink.soft, color: PB.pink.deep,
                    fontSize: 12.5, fontWeight: 800,
                  }}>{p.name}</span>
                ))}
              </div>
            )}
          </div>

          <div style={{ flex: 1, minHeight: 14 }}/>

          <Btn T={T} onClick={() => startQ(0)} disabled={liveParticipants.length === 0}>
            {liveParticipants.length === 0 ? "מחכות שיצטרפו" : `מתחילות חידון (${liveParticipants.length})`}
          </Btn>
          <button onClick={() => startQ(0)} style={{
            marginTop: 8, background: "transparent", border: "none",
            fontSize: 11.5, fontWeight: 700, color: T.inkSoft, cursor: "pointer", fontFamily: T.font,
          }}>או להתחיל בכל זאת לדמו</button>
        </div>
        <HomeBar/>
      </>
    );
  }

  if (phase === "done") {
    return (
      <>
        <StatusBar T={T}/>
        <div style={{ position: "absolute", inset: 0, padding: "48px 22px 24px", display: "flex", flexDirection: "column" }}>
          <TopBar T={T} onBack={onBack} title={game.t}/>
          <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", textAlign: "center" }}>
            <h1 style={{ fontSize: 28, fontWeight: 800, margin: "0 0 10px", letterSpacing: -0.4 }}>סיימנו את החידון!</h1>
            <p style={{ fontSize: 14, color: T.inkSoft, fontWeight: 500, margin: "0 0 22px", maxWidth: 280, lineHeight: 1.55 }}>
              מקווות שגיליתן עליה משהו חדש 😉
            </p>
            <Card T={T} padding={22} style={{ width: "100%", textAlign: "center" }}>
              <div className="num" style={{ fontSize: 56, fontWeight: 800, color: T.accent, lineHeight: 1, letterSpacing: -1 }}>{total}</div>
              <div style={{ fontSize: 14, fontWeight: 700, color: T.ink, marginTop: 6 }}>שאלות הושלמו</div>
            </Card>
          </div>
          <Btn T={T} onClick={restart}>עוד פעם</Btn>
          <button onClick={onBack} style={{ marginTop: 10, background: "transparent", border: "none", fontSize: 13, fontWeight: 600, color: T.inkSoft, cursor: "pointer" }}>לרשימת המשחקים</button>
        </div>
        <HomeBar/>
      </>
    );
  }

  const quizBody = (big) => (
    <>
      {/* Top: question number + timer */}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: big ? 12 : 9, flexShrink: 0 }}>
        <span className="num" style={{
          padding: big ? "5px 16px" : "4px 12px",
          background: big ? "rgba(255,255,255,0.12)" : T.surfaceAlt,
          color: big ? "#fff" : T.inkSoft,
          border: big ? "1px solid rgba(255,255,255,0.18)" : T.border,
          borderRadius: 999, fontSize: big ? "clamp(13px,1.5vw,18px)" : 11.5, fontWeight: 800,
        }}>שאלה {qi + 1} / {total}</span>
        <div className="num" style={{
          padding: big ? "8px 26px" : "7px 18px",
          background: danger ? DANGER_RED : T.surfaceInk, color: "#fff", border: "none",
          borderRadius: 999, fontSize: big ? "clamp(24px,3.5vw,46px)" : 22, fontWeight: 800,
          animation: danger ? "pulse 0.5s ease-in-out infinite" : "none", letterSpacing: 1,
        }}>00:{String(Math.max(timeLeft, 0)).padStart(2, "0")}</div>
      </div>

      {/* Question (no input — bride doesn't play) */}
      <div style={{
        flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
        padding: big ? "clamp(24px,4vh,60px) clamp(24px,4vw,80px)" : "26px 12px",
        minHeight: 0, gap: big ? 30 : 22,
      }}>
        <h1 style={{
          fontSize: big ? "clamp(40px,6vw,90px)" : 26,
          fontWeight: 800, lineHeight: 1.2,
          color: big ? "#fff" : T.ink,
          textAlign: "center", textWrap: "balance", letterSpacing: -0.4, margin: 0,
        }}>{question}</h1>

        {/* Participants status — who already answered */}
        <div style={{
          display: "flex", alignItems: "center", gap: big ? 14 : 11,
          padding: big ? "clamp(10px,1.4vw,18px) clamp(16px,2vw,28px)" : "10px 14px",
          background: big ? "rgba(255,255,255,0.10)" : T.surfaceAlt,
          border: big ? "1px solid rgba(255,255,255,0.18)" : T.border,
          borderRadius: 999,
        }}>
          <div style={{ display: "flex" }}>
            {participants.map((name, idx) => {
              const did = answered.includes(name);
              const cycle = [PB.orange, PB.pink, PB.ink];
              const p = cycle[idx % cycle.length];
              return (
                <div key={name} style={{
                  width: big ? 32 : 26, height: big ? 32 : 26, borderRadius: 999,
                  background: did ? p.main : (big ? "rgba(255,255,255,0.15)" : "#fff"),
                  color: did ? p.on : (big ? "rgba(255,255,255,0.4)" : T.muted),
                  border: did ? "none" : (big ? "1.5px solid rgba(255,255,255,0.3)" : `1.5px solid ${T.lineStrong}`),
                  display: "flex", alignItems: "center", justifyContent: "center",
                  fontSize: big ? 12 : 10.5, fontWeight: 800,
                  marginInlineStart: idx > 0 ? -5 : 0,
                  transition: "all 250ms",
                }}>{name.charAt(0)}</div>
              );
            })}
          </div>
          <div style={{ fontSize: big ? "clamp(13px,1.5vw,20px)" : 12.5, fontWeight: 700,
            color: big ? "#fff" : T.ink }}>
            <span className="num">{answered.length}/{participants.length}</span> ענו
          </div>
        </div>
      </div>

      {/* Time-up overlay — message adapts based on what ended the round */}
      {phase === "timeUp" && (
        <div style={{
          position: "absolute", inset: 0,
          background: "rgba(20,18,16,0.85)",
          backdropFilter: "blur(8px)", WebkitBackdropFilter: "blur(8px)",
          zIndex: 30, padding: big ? "clamp(40px,8vw,80px)" : "60px 30px",
          display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
          textAlign: "center", gap: big ? 28 : 20, animation: "screenIn 300ms ease-out",
        }}>
          <div style={{
            fontSize: big ? "clamp(13px,1.8vw,24px)" : 11.5, fontWeight: 800,
            color: "rgba(255,255,255,0.55)", letterSpacing: 2.5, textTransform: "uppercase",
          }}>{answered.length >= participants.length ? "כולן ענו!" : "תם הזמן"}</div>
          <div style={{
            fontSize: big ? "clamp(34px,5vw,72px)" : 24, fontWeight: 800,
            color: "#fff", lineHeight: 1.25, letterSpacing: -0.4, maxWidth: big ? "70%" : "100%",
          }}>כלתינו, זה הרגע שלך לענות!</div>
          <div style={{
            fontSize: big ? "clamp(14px,1.6vw,22px)" : 13, fontWeight: 500,
            color: "rgba(255,255,255,0.7)", maxWidth: big ? "60%" : "100%", lineHeight: 1.5,
          }}>תני את התשובה שלך בקול, ואז לחצי לחשוף את מה שהבנות כתבו.</div>
          <button onClick={() => setPhase("revealed")} style={{
            marginTop: big ? 4 : 4,
            padding: big ? "clamp(14px,1.8vw,22px) clamp(36px,4vw,60px)" : "14px 26px",
            background: T.accent, color: T.onAccent,
            border: "none", borderRadius: T.radius,
            fontSize: big ? "clamp(16px,2vw,26px)" : 15, fontWeight: 800, cursor: "pointer", fontFamily: T.font,
          }}>חשוף את התשובות</button>
        </div>
      )}

      {/* Revealed list overlay */}
      {phase === "revealed" && (
        <div style={{
          position: "absolute", inset: 0,
          background: big ? "rgba(20,18,16,0.95)" : T.bg,
          padding: big ? "clamp(24px,4vw,60px)" : "48px 22px 28px",
          display: "flex", flexDirection: "column",
          animation: "screenIn 300ms ease-out", zIndex: 30,
        }}>
          <div style={{ flexShrink: 0, marginBottom: big ? 18 : 14 }}>
            <div style={{ fontSize: big ? "clamp(11px,1.4vw,18px)" : 10.5, fontWeight: 800,
              color: big ? "rgba(255,255,255,0.65)" : T.inkSoft, letterSpacing: 1.6, textTransform: "uppercase" }}>
              שאלה {qi + 1} · התשובות נחשפו
            </div>
            <div style={{ fontSize: big ? "clamp(22px,2.8vw,40px)" : 18, fontWeight: 800,
              color: big ? "#fff" : T.ink, marginTop: 6, letterSpacing: -0.3, lineHeight: 1.2 }}>{question}</div>
          </div>

          <div style={{ flex: 1, overflow: "auto", display: "flex", flexDirection: "column", gap: big ? 10 : 8 }}>
            {answersToShow.length === 0 ? (
              <div style={{ padding: 20, color: big ? "rgba(255,255,255,0.7)" : T.inkSoft,
                textAlign: "center", fontSize: 13, fontWeight: 500 }}>
                {sessionCode ? "אף בת עוד לא ענתה — תתקדמי לשאלה הבאה כשתרצי." : "במצב אמיתי יופיעו פה כל הבנות שסרקו QR והתשובות שלהן."}
              </div>
            ) : (
              answersToShow.map((ans, idx) => {
                const cycle = [PB.pink, PB.ink, PB.pink];
                const p = cycle[idx % cycle.length];
                return (
                  <div key={idx} style={{
                    display: "flex", alignItems: "center", gap: big ? 14 : 11,
                    background: big ? "rgba(255,255,255,0.08)" : T.surface,
                    border: big ? "1px solid rgba(255,255,255,0.15)" : T.border,
                    borderRadius: big ? 14 : 12, padding: big ? "12px 16px" : "10px 12px",
                  }}>
                    <div style={{
                      width: big ? 38 : 32, height: big ? 38 : 32, borderRadius: 999, flexShrink: 0,
                      background: p.main, color: p.on,
                      display: "flex", alignItems: "center", justifyContent: "center",
                      fontSize: big ? 14 : 12, fontWeight: 800,
                    }}>{ans.n.charAt(0)}</div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontSize: big ? "clamp(12px,1.4vw,18px)" : 11.5, fontWeight: 800,
                        color: big ? "rgba(255,255,255,0.7)" : T.inkSoft }}>{ans.n}</div>
                      <div style={{ fontSize: big ? "clamp(15px,1.8vw,24px)" : 14, fontWeight: 700,
                        color: big ? "#fff" : T.ink, marginTop: 1, lineHeight: 1.3 }}>{ans.a}</div>
                    </div>
                  </div>
                );
              })
            )}
          </div>

          <button onClick={nextQ} style={{
            marginTop: big ? 18 : 14, flexShrink: 0,
            padding: big ? "clamp(14px,1.8vw,22px) clamp(36px,4vw,60px)" : "14px",
            background: T.accent, color: T.onAccent,
            border: "none", borderRadius: T.radius,
            fontSize: big ? "clamp(16px,2vw,26px)" : 15, fontWeight: 800, cursor: "pointer", fontFamily: T.font,
          }}>{qi + 1 >= total ? "סיימנו" : "השאלה הבאה"}</button>
        </div>
      )}
    </>
  );

  return (
    <>
      <StatusBar T={T}/>
      <div style={{ position: "absolute", inset: 0, padding: "48px 22px 20px", display: "flex", flexDirection: "column" }}>
        <GameTopBar T={T} onBack={onBack} title={game.t}/>
        <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden", position: "relative" }}>{quizBody(false)}</div>
      </div>
      <HomeBar/>
    </>
  );
}

function CardGame({ T: parentT, game, onBack }) {
  const T = { ...parentT, accent: PB[game.pop].main, onAccent: PB[game.pop].on, accentSoft: PB[game.pop].soft, accentDeep: PB[game.pop].deep };
  const deck = CARD_DECKS[game.id];
  const [phase, setPhase] = React.useState("intro");
  const [i, setI] = React.useState(0);
  const [projecting, setProjecting] = React.useState(false);
  const [revealed, setRevealed] = React.useState({});
  const [groomData, setGroomData] = React.useState(loadGroomAnswers);
  const [groomMarks, setGroomMarks] = React.useState({});
  const [groomSummary, setGroomSummary] = React.useState(false);
  const [fmkChoices, setFmkChoices] = React.useState({}); // { cardIdx: { 0: 'F', 1: 'M', 2: 'K' } }

  // ─── Multiplayer session state (only used for fmk right now) ───
  const [sessionCode, setSessionCode] = React.useState(null);
  const [sessionDoc, setSessionDoc] = React.useState(null);
  const [liveParticipants, setLiveParticipants] = React.useState([]);
  const [creatingSession, setCreatingSession] = React.useState(false);

  const persistedState = React.useMemo(() => {
    try { return JSON.parse(localStorage.getItem("chogegot_state") || "{}"); } catch (e) { return {}; }
  }, []);
  const authSession = React.useMemo(loadAuthSession, []);
  const hostUsername = authSession?.username || null;
  const brideName = persistedState?.name || authSession?.fullName?.split(" ")[0] || "הכלה";
  const eventName = persistedState?.eventName || "";

  React.useEffect(() => {
    if (!sessionCode) return;
    const off1 = fbSubscribeSession(sessionCode, setSessionDoc);
    const off2 = fbSubscribeParticipants(sessionCode, setLiveParticipants);
    return () => { try { off1(); } catch (e) {} try { off2(); } catch (e) {} };
  }, [sessionCode]);

  const currentFmk = fmkChoices[i] || {};
  const assignFmk = (nameIdx, letter) => {
    const next = { ...currentFmk };
    // Remove this letter from any other name (each letter used once)
    Object.keys(next).forEach(k => { if (next[k] === letter) delete next[k]; });
    // Toggle: clicking the same again clears
    if (currentFmk[nameIdx] === letter) delete next[nameIdx];
    else next[nameIdx] = letter;
    setFmkChoices({ ...fmkChoices, [i]: next });
  };
  const fmkAllAssigned = Object.keys(currentFmk).length === 3;

  const total = deck.prompts.length;
  const prompt = deck.prompts[i];
  const next = () => setI(x => Math.min(x + 1, total - 1));
  const prev = () => setI(x => Math.max(x - 1, 0));
  const atStart = i === 0, atEnd = i === total - 1;
  const isNhie = game.id === "nhie";
  const isGroomq = game.id === "groomq";
  const isFmk = game.id === "fmk";
  const isMultiOption = Array.isArray(prompt);

  // FMK 'other girls' picks: real participants when a session is active, otherwise a
  // deterministic simulation so the solo demo still shows a group vote.
  const FMK_GIRLS = ["שירה", "ליהי", "תמר", "נועה", "רוני"];
  const fmkGirlsChoices = React.useMemo(() => {
    if (!isFmk || !Array.isArray(prompt)) return [];
    if (sessionCode) {
      // Each participant doc has `votes: { [cardIdx]: { 0: 'F', 1: 'M', 2: 'K' } }`
      return liveParticipants
        .filter(p => p.votes && p.votes[i] && Object.keys(p.votes[i]).length === 3)
        .map(p => ({ name: p.name, picks: p.votes[i] }));
    }
    const seed = (n) => { const x = (n * 9301 + 49297) % 233280; return x / 233280; };
    return FMK_GIRLS.map((name, gi) => {
      const letters = ["F", "M", "K"];
      for (let k = letters.length - 1; k > 0; k--) {
        const r = Math.floor(seed(i * 17 + gi * 31 + k) * (k + 1));
        [letters[k], letters[r]] = [letters[r], letters[k]];
      }
      return { name, picks: { 0: letters[0], 1: letters[1], 2: letters[2] } };
    });
  }, [i, isFmk, sessionCode, liveParticipants]);

  // Aggregate vote tally per name: { nameIdx: { F:count, M:count, K:count } }
  const fmkTally = React.useMemo(() => {
    if (!isFmk || !Array.isArray(prompt)) return null;
    const t = { 0: { F: 0, M: 0, K: 0 }, 1: { F: 0, M: 0, K: 0 }, 2: { F: 0, M: 0, K: 0 } };
    fmkGirlsChoices.forEach(g => { [0,1,2].forEach(k => { t[k][g.picks[k]]++; }); });
    Object.entries(currentFmk).forEach(([k, l]) => { t[k][l] = (t[k][l] || 0) + 1; });
    return t;
  }, [fmkGirlsChoices, currentFmk, isFmk]);

  // Push card index + phase into the session doc so participants follow along.
  React.useEffect(() => {
    if (!sessionCode || !isFmk) return;
    const map = { play: "playing", lobby: "lobby", intro: "lobby" };
    fbUpdateSession(sessionCode, { state: map[phase] || "playing", currentQi: i });
  }, [sessionCode, isFmk, phase, i]);

  const openFmkLobby = async () => {
    if (creatingSession) return;
    setCreatingSession(true);
    try {
      // For FMK we ship the prompt array (3-item rows) as 'questions' so the participant
      // view can render each row's three options.
      const code = await fbCreateSession({
        hostUsername, gameId: "fmk", questions: deck.prompts, brideName, eventName,
      });
      if (code) { setSessionCode(code); setPhase("lobby"); }
      else alert("לא הצלחנו לפתוח לוביי. בדקי חיבור ונסי שוב.");
    } finally { setCreatingSession(false); }
  };

  // Groom answer lookup — only meaningful for groomq game
  const groomAnswerForPrompt = (() => {
    if (!isGroomq || !groomData?.a) return null;
    // match by question text (since order may differ if questions were edited)
    const qList = groomData.q || [];
    const idx = qList.indexOf(prompt);
    if (idx >= 0) return groomData.a[idx];
    // fallback to positional match
    return groomData.a[i] || null;
  })();

  const sendToGroom = () => {
    const link = buildGroomLink({
      q: deck.prompts,
      bn: window.localStorage.getItem("chogegot_state") ? (JSON.parse(localStorage.getItem("chogegot_state"))?.name || "הכלה") : "הכלה",
      en: window.localStorage.getItem("chogegot_state") ? (JSON.parse(localStorage.getItem("chogegot_state"))?.eventName || "") : "",
      gid: "groomq",
    });
    // Keep the message bride-agnostic — the organizer is the sender, not the bride herself.
    const msg = `היי! מצורף פה לינק לשאלון על הכלה שלך! בוא ניראה כמה אתה מכיר אותה 💍\n\n${link}`;
    openWhatsApp(msg);
  };

  const clearAndResend = () => {
    if (confirm("למחוק את התשובות הקיימות ולשלוח שאלון חדש?")) {
      clearGroomAnswers(); setGroomData(null); setRevealed({});
    }
  };

  const groomExtras = isGroomq ? (
    groomData?.a?.length ? (
      <Card T={T} padding={"12px 14px"} style={{ marginTop: 14, background: PB.orange.soft, border: `1px solid ${PB.orange.main}33` }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <div style={{ width: 32, height: 32, borderRadius: 999, background: PB.orange.main,
            color: "#fff", display: "flex", alignItems: "center", justifyContent: "center" }}>
            <Icon name="check" size={18} color="#fff" w={2.2}/>
          </div>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 13.5, fontWeight: 800, color: PB.orange.deep }}>תשובות החתן נטענו</div>
            <div style={{ fontSize: 11.5, color: T.inkSoft, fontWeight: 600, marginTop: 1 }}>
              {groomData.a.length} תשובות · במשחק תוכלי לחשוף כל אחת
            </div>
          </div>
          <button onClick={clearAndResend} style={{
            background: "transparent", border: "none", fontSize: 11.5, fontWeight: 700,
            color: PB.orange.deep, cursor: "pointer", padding: "4px 8px",
            textDecoration: "underline", fontFamily: T.font,
          }}>שלחי שאלון חדש</button>
        </div>
      </Card>
    ) : (
      <Card T={T} padding={"14px 16px"} style={{ marginTop: 14, background: T.surfaceAlt, border: `1px dashed ${T.lineStrong}` }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <div style={{ width: 38, height: 38, borderRadius: 11, background: PB.pink.soft, color: PB.pink.deep,
            display: "flex", alignItems: "center", justifyContent: "center" }}>
            <Icon name="send" size={20} color={PB.pink.deep} w={1.6}/>
          </div>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 13.5, fontWeight: 800, color: T.ink }}>שלחי שאלון לחתן בווטסאפ</div>
            <div style={{ fontSize: 11.5, color: T.inkSoft, fontWeight: 600, marginTop: 1 }}>
              הוא ימלא והתשובות יחזרו אלייך אוטומטית.
            </div>
          </div>
        </div>
        <button onClick={sendToGroom} style={{
          marginTop: 11, width: "100%", padding: "11px 14px",
          background: PB.pink.main, color: PB.pink.on, border: "none", borderRadius: T.radius,
          fontSize: 14, fontWeight: 800, cursor: "pointer", fontFamily: T.font,
          display: "flex", alignItems: "center", justifyContent: "center", gap: 8,
        }}>
          <Icon name="share" size={16} color={PB.pink.on} w={1.6}/>
          שלחי שאלון לחתן
        </button>
      </Card>
    )
  ) : null;

  const fmkExtras = isFmk ? (
    <Card T={T} padding={"14px 16px"} style={{ marginTop: 14, background: PB.pink.soft, border: `1px solid ${PB.pink.main}33` }}>
      <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
        <div style={{ width: 42, height: 42, borderRadius: 12, background: PB.pink.main, color: PB.pink.on,
          display: "flex", alignItems: "center", justifyContent: "center" }}>
          <Icon name="qr" size={22} color={PB.pink.on} w={1.6}/>
        </div>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 13.5, fontWeight: 800, color: PB.pink.deep }}>הצטרפות הבנות בזמן אמת</div>
          <div style={{ fontSize: 11.5, color: T.inkSoft, fontWeight: 600, marginTop: 2 }}>
            סורקות QR או מקלידות קוד — ומצביעות F/M/K מהטלפון.
          </div>
        </div>
      </div>
      <button onClick={openFmkLobby} disabled={creatingSession} style={{
        marginTop: 12, width: "100%", padding: "10px 14px",
        background: PB.pink.main, color: PB.pink.on, border: "none", borderRadius: T.radius,
        fontSize: 13.5, fontWeight: 800, cursor: creatingSession ? "wait" : "pointer", fontFamily: T.font,
        display: "flex", alignItems: "center", justifyContent: "center", gap: 6,
        opacity: creatingSession ? 0.7 : 1,
      }}>
        <Icon name="qr" size={15} color={PB.pink.on} w={1.7}/>
        {creatingSession ? "פותחת..." : "פתחי לוביי לחברות"}
      </button>
      <button onClick={() => setPhase("play")} style={{
        marginTop: 7, width: "100%", padding: "8px 14px",
        background: "transparent", color: T.inkSoft, border: "none",
        fontSize: 11.5, fontWeight: 700, cursor: "pointer", fontFamily: T.font,
      }}>או לדלג לתצוגה ללא חברות (דמו)</button>
    </Card>
  ) : null;

  if (phase === "intro")
    return <GameIntro T={T} game={game} rules={deck.rules} onBack={onBack}
      onStart={isFmk ? openFmkLobby : () => setPhase("play")}
      startLabel={
        isFmk ? "פתחי לוביי לחברות" :
        isNhie ? "מוזגות ומתחילות" :
        (isGroomq && !groomData?.a?.length ? "מתחילות גם בלי תשובות" : "מתחילות שאלון")
      }
      extras={isFmk ? fmkExtras : groomExtras}/>;

  // ─── FMK lobby phase ────────────────────────────────────────────
  if (phase === "lobby" && isFmk) {
    const joinUrl = `${window.location.origin}${window.location.pathname}?join=${sessionCode}`;
    const qrSrc = `https://api.qrserver.com/v1/create-qr-code/?size=220x220&margin=8&data=${encodeURIComponent(joinUrl)}`;
    return (
      <>
        <StatusBar T={T}/>
        <div style={{ position: "absolute", inset: 0, padding: "48px 22px 24px", display: "flex", flexDirection: "column", overflow: "auto" }}>
          <TopBar T={T} onBack={onBack} title={game.t}/>
          <div style={{ marginTop: 4, textAlign: "center" }}>
            <Eyebrow T={T}>לוביי פתוח</Eyebrow>
            <h1 style={{ fontSize: 24, fontWeight: 800, margin: "8px 0 4px", letterSpacing: -0.4 }}>
              הבנות מצטרפות
            </h1>
            <p style={{ fontSize: 13, color: T.inkSoft, fontWeight: 500, margin: 0, lineHeight: 1.45 }}>
              סרקי את ה-QR או הקלידי את הקוד באפליקציה.
            </p>
          </div>

          <div style={{ marginTop: 14, padding: 16, background: T.surface, borderRadius: T.radiusLg,
            border: T.border, boxShadow: T.shadow, display: "flex", flexDirection: "column", alignItems: "center" }}>
            <img src={qrSrc} alt={`QR code for ${joinUrl}`}
              style={{ width: 180, height: 180, borderRadius: 12, display: "block" }}/>
            <div style={{ marginTop: 12, fontSize: 10.5, fontWeight: 800, color: T.muted, letterSpacing: 1.6, textTransform: "uppercase" }}>קוד הצטרפות</div>
            <div className="num" style={{ fontSize: 30, fontWeight: 800, color: T.ink, letterSpacing: 4, marginTop: 4 }}>{sessionCode}</div>
          </div>

          <div style={{ marginTop: 16 }}>
            <div style={{ fontSize: 12, fontWeight: 800, color: T.muted, letterSpacing: 0.6, textTransform: "uppercase", marginBottom: 8 }}>
              הצטרפו {liveParticipants.length}
            </div>
            {liveParticipants.length === 0 ? (
              <div style={{ padding: "14px 16px", background: T.surfaceAlt, borderRadius: T.radius,
                border: `1px dashed ${T.lineStrong}`, fontSize: 12.5, color: T.inkSoft, fontWeight: 600, textAlign: "center" }}>
                מחכות לחברה הראשונה...
              </div>
            ) : (
              <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                {liveParticipants.map(p => (
                  <span key={p.id} style={{
                    padding: "5px 11px", borderRadius: 999, background: PB.pink.soft, color: PB.pink.deep,
                    fontSize: 12.5, fontWeight: 800,
                  }}>{p.name}</span>
                ))}
              </div>
            )}
          </div>

          <div style={{ flex: 1, minHeight: 14 }}/>

          <Btn T={T} onClick={() => setPhase("play")} disabled={liveParticipants.length === 0}>

          </Btn>
          <button onClick={() => setPhase("play")} style={{
            marginTop: 8, background: "transparent", border: "none",
            fontSize: 11.5, fontWeight: 700, color: T.inkSoft, cursor: "pointer", fontFamily: T.font,
          }}>או להתחיל בכל זאת לדמו</button>
        </div>
        <HomeBar/>
      </>
    );
  }

  if (isGroomq && groomSummary) {
    const right = Object.values(groomMarks).filter(m => m === "right").length;
    const wrong = Object.values(groomMarks).filter(m => m === "wrong").length;
    const pct = total ? Math.round((right / total) * 100) : 0;
    const msg = pct >= 70 ? "אתם מכירים אחד את השני!" : pct >= 40 ? "לא רע, יש על מה לעבוד 😉" : "צריך לדבר יותר…";
    return (
      <>
        <StatusBar T={T}/>
        <div style={{ position: "absolute", inset: 0, padding: "48px 22px 24px", display: "flex", flexDirection: "column" }}>
          <TopBar T={T} onBack={onBack} title={game.t}/>
          <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", textAlign: "center" }}>
            <Eyebrow T={T}>סיכום השאלון</Eyebrow>
            <h1 style={{ fontSize: 26, fontWeight: 800, margin: "10px 0 18px", letterSpacing: -0.4, lineHeight: 1.15 }}>{msg}</h1>
            <Card T={T} padding={22} style={{ width: "100%", textAlign: "center" }}>
              <div className="num" style={{ fontSize: 56, fontWeight: 800, color: T.accent, lineHeight: 1, letterSpacing: -1 }}>{right}/{total}</div>
              <div style={{ fontSize: 14, fontWeight: 700, color: T.ink, marginTop: 6 }}>צדקה ({pct}%)</div>
            </Card>
            <div style={{ display: "flex", gap: 10, marginTop: 14, width: "100%" }}>
              <div style={{ flex: 1, padding: "10px 12px", background: T.ok, color: "#fff", borderRadius: T.radius, textAlign: "center" }}>
                <div style={{ fontSize: 10.5, fontWeight: 700, opacity: 0.9 }}>צדקה</div>
                <div className="num" style={{ fontSize: 22, fontWeight: 800 }}>{right}</div>
              </div>
              <div style={{ flex: 1, padding: "10px 12px", background: PB.pink.main, color: PB.pink.on, borderRadius: T.radius, textAlign: "center" }}>
                <div style={{ fontSize: 10.5, fontWeight: 700, opacity: 0.85 }}>פספסה</div>

              </div>
            </div>
          </div>
          <Btn T={T} onClick={onBack}>לרשימת המשחקים</Btn>
        </div>
        <HomeBar/>
      </>
    );

  const body = (big) => (
    <>
      <div style={{ display: "flex", gap: 4, justifyContent: "center", flexWrap: "wrap", flexShrink: 0, marginBottom: big ? 0 : 6 }}>

          <div key={idx} style={{
            width: idx === i ? (big ? 36 : 22) : (big ? 12 : 6), height: big ? 12 : 6, borderRadius: 6,
            background: idx === i
              ? (big ? "#fff" : T.accent)
              : (idx < i
                ? (big ? "rgba(255,255,255,0.5)" : T.lineStrong)
                : (big ? "rgba(255,255,255,0.2)" : T.surfaceAlt)),
            transition: "all 200ms",

      <div style={{ flex: 1, display: "flex", alignItems: big ? "center" : "flex-start", justifyContent: "center", padding: big ? "clamp(16px,4vh,40px) 0" : "16px 0", minHeight: 0, overflowY: "auto" }}>
        <div key={i} style={{
          width: big ? "min(90%,920px)" : "100%",
          background: big ? T.accent : T.surface,
          border: big ? "none" : T.border,
          borderRadius: big ? 32 : 22,
          boxShadow: big ? "0 24px 60px -10px rgba(0,0,0,0.5)" : T.shadow,
          padding: big ? "clamp(32px,6vw,72px)" : "28px 22px",
          position: "relative",
          animation: "cardIn 280ms cubic-bezier(.18,.89,.43,1.19)",
          minHeight: big ? "auto" : 240,
          display: "flex", flexDirection: "column", justifyContent: "center", alignItems: "center", gap: big ? 24 : 14,
        }}>
          <div style={{
            position: "absolute", top: big ? -16 : -10, right: big ? 32 : 18,
            padding: big ? "6px 18px" : "4px 11px", background: T.surfaceInk, color: "#fff",

          {isMultiOption ? (
            <div style={{ width: "100%", display: "flex", flexDirection: "column",

                              `1.5px solid ${assigned ? (assigned === "M" ? "rgba(0,0,0,0.25)" : "rgba(255,255,255,0.45)") : it.c}`),

                            cursor: isUsedByOther ? "not-allowed" : "pointer", fontFamily: T.font,

                          }}>{it.l}</button>
                        );
                      })}
                    </div>
                    <span style={{
                      flex: 1, textAlign: "right",
                      fontSize: big ? "clamp(20px,2.6vw,38px)" : 18,
                      fontWeight: 800, letterSpacing: -0.3, lineHeight: 1.2,
