<script type="text/babel">
/* ──────────────────────────────────────────────────────────────
   URL HASH ENCODER — stateless data sharing between bride ↔ groom
   - #groom=... → contains the questionnaire (bride sends this)
   - #answers=... → contains groom's answers (groom sends back)
   Encoded as URL-safe base64 of UTF-8 JSON (handles Hebrew).
   ────────────────────────────────────────────────────────────── */
const b64Encode = (obj) =>
  btoa(unescape(encodeURIComponent(JSON.stringify(obj))))
    .replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
const b64Decode = (str) => {
  try {
    let s = str.replace(/-/g, "+").replace(/_/g, "/");
    while (s.length % 4) s += "=";
    return JSON.parse(decodeURIComponent(escape(atob(s))));
  } catch (e) { return null; }
};
const baseUrl = () => window.location.href.split("#")[0].split("?")[0];
const buildGroomLink   = (data) => `${baseUrl()}#groom=${b64Encode(data)}`;
const buildAnswersLink = (data) => `${baseUrl()}#answers=${b64Encode(data)}`;
const openWhatsApp = (text) => {
  const url = `https://wa.me/?text=${encodeURIComponent(text)}`;
  window.open(url, "_blank", "noopener");
};

const GROOM_STORAGE_KEY = "chogegot_groom_answers";
const saveGroomAnswers = (payload) => {
  try { localStorage.setItem(GROOM_STORAGE_KEY, JSON.stringify({ ...payload, receivedAt: Date.now() })); } catch (e) {}
};
const loadGroomAnswers = () => {
  try { const raw = localStorage.getItem(GROOM_STORAGE_KEY); return raw ? JSON.parse(raw) : null; }
  catch (e) { return null; }
};
const clearGroomAnswers = () => { try { localStorage.removeItem(GROOM_STORAGE_KEY); } catch (e) {} };

/* ──────────────────────────────────────────────────────────────
   FIREBASE HELPERS — Auth (phone) + Firestore (user data)
   The `firebase` global is set up in <head> before React mounts.
   ────────────────────────────────────────────────────────────── */
const FB = window.FB; // { auth, db } — null if init failed

// reCAPTCHA verifier (invisible) — Firebase requires this for web phone auth.
let _recaptcha = null;
const ensureRecaptcha = () => {
  if (!FB || _recaptcha) return _recaptcha;
  try {
    _recaptcha = new firebase.auth.RecaptchaVerifier("recaptcha-container", {
      size: "invisible",
      callback: () => {},
      "expired-callback": () => { _recaptcha = null; },
    });
    return _recaptcha;
  } catch (e) {
    console.error("[Firebase] recaptcha error:", e);
    return null;
  }
};

const fbSendSMS = async (phoneE164) => {
  if (!FB) throw new Error("Firebase לא הותחל");
  const verifier = ensureRecaptcha();
  if (!verifier) throw new Error("reCAPTCHA לא הוטען");
  return FB.auth.signInWithPhoneNumber(phoneE164, verifier);
};

const fbCurrentUser = () => FB?.auth?.currentUser || null;
const fbOnAuthChange = (cb) => FB ? FB.auth.onAuthStateChanged(cb) : () => {};
const fbSignOut = () => FB ? FB.auth.signOut() : Promise.resolve();

// Firestore — store user data under /users/{uid}
const fbSaveUserData = async (uid, data) => {
  if (!FB || !uid) return;
  try {
    await FB.db.collection("users").doc(uid).set(data, { merge: true });
  } catch (e) { console.error("[FS] save failed:", e); }
};
const fbLoadUserData = async (uid) => {
  if (!FB || !uid) return null;
  try {
    const doc = await FB.db.collection("users").doc(uid).get();
    return doc.exists ? doc.data() : null;
  } catch (e) { console.error("[FS] load failed:", e); return null; }
};

function PhoneShell({ children, T }) {
  const [isMobile, setIsMobile] = React.useState(window.innerWidth <= 480);
  React.useEffect(() => {
    const h = () => setIsMobile(window.innerWidth <= 480);
    h(); window.addEventListener("resize", h);
    return () => window.removeEventListener("resize", h);
  }, []);

  if (isMobile) {
    return (
      <div style={{
        position: "fixed", inset: 0, background: T.bg, direction: "rtl",
        fontFamily: T.font, color: T.ink, overflow: "hidden",
      }}>{children}</div>
    );
  }
  return (
    <div style={{
      minHeight: "100vh", width: "100%",
      background: "radial-gradient(circle at 0% 0%, #FBE4DB22 0%, transparent 40%), radial-gradient(circle at 100% 100%, #F9E8EE22 0%, transparent 40%), #F2EFEB",
      display: "flex", alignItems: "center", justifyContent: "center",

}

/* Pill button */
function Btn({ T, children, onClick, variant = "primary", icon, disabled = false, style, size = "lg" }) {
  const [pressed, setPressed] = React.useState(false);
  const variants = {
    primary: { bg: T.accent, fg: T.onAccent, border: "none", shadow: T.shadowSm },
    ink:     { bg: T.surfaceInk, fg: "#FFFFFF", border: "none", shadow: T.shadowSm },
    quiet:   { bg: T.surface, fg: T.ink, border: T.border, shadow: T.shadowSm },
    ok:      { bg: T.ok, fg: "#FFFFFF", border: "none", shadow: T.shadowSm },
  };
  const v = variants[variant];
  const sz = size === "sm" ? { padding: "10px 16px", fs: 14 }
           : size === "md" ? { padding: "13px 18px", fs: 15 }
           : { padding: "15px 22px", fs: 16 };
  return (
    <button
      onMouseDown={() => setPressed(true)} onMouseUp={() => setPressed(false)} onMouseLeave={() => setPressed(false)}
      onTouchStart={() => setPressed(true)} onTouchEnd={() => setPressed(false)}
      onClick={disabled ? undefined : onClick} disabled={disabled}
      style={{
        width: "100%", display: "flex", alignItems: "center", justifyContent: "center", gap: 9,
        padding: sz.padding, fontSize: sz.fs, fontWeight: 700, fontFamily: T.font,
        background: disabled ? T.surfaceAlt : v.bg,
        color: disabled ? T.muted : v.fg,
        border: v.border === "none" ? "none" : v.border,
        borderRadius: T.radius, cursor: disabled ? "not-allowed" : "pointer",
        boxShadow: v.shadow, letterSpacing: 0.1,
        transform: pressed && !disabled ? "translateY(1px)" : "none",
        transition: "transform 80ms, background-color 120ms",
        opacity: disabled ? 0.8 : 1, ...style,
      }}
    >{icon && <Icon name={icon} size={18} color={disabled ? T.muted : v.fg} w={1.6}/>}{children}</button>
  );
}

/* Round icon button (40x40) */
function RoundBtn({ T, icon, onClick, dark = false, style }) {
  return (
    <button onClick={onClick} style={{
      width: 40, height: 40, borderRadius: 12, flexShrink: 0,
      background: dark ? "rgba(255,255,255,0.12)" : T.surface,
      border: dark ? "1px solid rgba(255,255,255,0.18)" : T.border,
      display: "flex", alignItems: "center", justifyContent: "center",
      boxShadow: dark ? "none" : T.shadowSm, cursor: "pointer", padding: 0,
      transition: "transform 80ms", ...style,
    }}>
      <Icon name={icon} size={18} color={dark ? "#fff" : T.ink} w={1.5}/>
    </button>
  );
}

/* Eyebrow uppercase label */
function Eyebrow({ T, children, color }) {
  return <div style={{
    fontSize: 11.5, fontWeight: 700, letterSpacing: 1.8,
    textTransform: "uppercase", color: color || T.accent,
  }}>{children}</div>;
}

/* StepRail (3 dots) */
function StepRail({ T, step }) {
  return (
    <div style={{ display: "flex", gap: 5, alignItems: "center" }}>
      {[1, 2, 3].map(i => (
        <div key={i} style={{
          height: 4, borderRadius: 2, transition: "all 200ms",
          width: i === step ? 24 : 9,
          background: i <= step ? T.accent : T.lineStrong,
        }}/>
      ))}
    </div>
  );
}

/* Card (white surface, hairline) */
function Card({ T, children, padding = 16, style, onClick, dark = false }) {
  return (
    <div onClick={onClick} style={{
      background: dark ? T.surfaceInk : T.surface,
      color: dark ? "#FFFFFF" : T.ink,
      border: dark ? "none" : T.border,
      borderRadius: T.radiusLg, boxShadow: dark ? T.shadow : T.shadowSm,
      padding, cursor: onClick ? "pointer" : "default", ...style,
    }}>{children}</div>
  );
}

/* TopBar — back button + optional title + optional right */
function TopBar({ T, onBack, title, step, right, dark = false }) {
  return (
    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", paddingTop: 6 }}>
      {onBack ? <RoundBtn T={T} icon="chevR" onClick={onBack} dark={dark}/> : <div style={{ width: 40 }}/>}
      {title && (
        <div style={{ fontSize: 16, fontWeight: 700, color: dark ? "#fff" : T.ink, letterSpacing: -0.2 }}>{title}</div>
      )}
      {step ? <StepRail T={T} step={step}/> : (right || <div style={{ width: 40 }}/>)}
    </div>
  );
}

   ────────────────────────────────────────────────────────────── */
const VALID_CODE = "123456";

function ScreenWelcome({ T, onNext }) {
  const [code, setCode] = React.useState(["", "", "", "", "", ""]);
  const inputsRef = React.useRef([]);
  React.useEffect(() => { inputsRef.current[0]?.focus(); }, []);

  const setDigit = (i, v) => {
    const clean = (v || "").replace(/[^0-9]/g, "");
    if (!clean) { const next = [...code]; next[i] = ""; setCode(next); return; }
    if (clean.length > 1) {
      const next = [...code];
      for (let k = 0; k < clean.length && i + k < 6; k++) next[i + k] = clean[k];
      setCode(next);
      inputsRef.current[Math.min(i + clean.length, 5)]?.focus(); return;
    }
    const next = [...code]; next[i] = clean; setCode(next);
    if (i < 5) inputsRef.current[i + 1]?.focus();
  };
  const onKey = (i, e) => {
    if (e.key === "Backspace") {
      if (code[i]) { const next = [...code]; next[i] = ""; setCode(next); }
      else if (i > 0) { inputsRef.current[i - 1]?.focus(); const n = [...code]; n[i-1]=""; setCode(n); }
      e.preventDefault();
    } else if (e.key === "ArrowLeft" && i < 5) inputsRef.current[i + 1]?.focus();
    else if (e.key === "ArrowRight" && i > 0) inputsRef.current[i - 1]?.focus();
  };
  const filled = code.every(c => c.length === 1);
  const isValid = code.join("") === VALID_CODE;
  const isWrong = filled && !isValid;

  return (
    <>
      <StatusBar T={T}/>
      <div style={{ position: "absolute", inset: 0, padding: "48px 22px 28px", display: "flex", flexDirection: "column" }}>

            </span>
          </div>
          <div style={{ display: "flex", gap: 8, direction: "ltr" }}>
            {code.map((ch, i) => {
              const active = !isWrong && (ch || (i === code.findIndex(c => !c)));
              return (
                <input key={i}
                  ref={el => { inputsRef.current[i] = el; }}
                  value={ch}
                  onChange={e => setDigit(i, e.target.value)}
                  onKeyDown={e => onKey(i, e)}

                  inputMode="numeric" autoComplete="one-time-code" pattern="[0-9]*"

                    flex: 1, width: 0, height: 56, borderRadius: 13,

          <div style={{ marginTop: 12, fontSize: 12.5, color: isWrong ? T.accent : T.inkSoft, fontWeight: 500 }}>

        <Btn T={T} onClick={onNext} disabled={!isValid}>

/* ──────────────────────────────────────────────────────────────
   SMS PHONE VERIFICATION (after email code)
   ────────────────────────────────────────────────────────────── */
// Normalize Israeli phone input to E.164 (+972...) — returns null if invalid
const normalizePhoneIL = (input) => {
  const d = (input || "").replace(/[^\d]/g, "");
  if (!d) return null;
  if (d.startsWith("972")) return "+" + d;
  if (d.startsWith("0")) return "+972" + d.substring(1);
  if (d.length === 9 && d.startsWith("5")) return "+972" + d;
  return null;
};

function ScreenSmsVerify({ T, onNext, onBack }) {
  const [phase, setPhase] = React.useState("phone"); // phone | code
  const [phone, setPhone] = React.useState("");
  const [code, setCode] = React.useState(["", "", "", "", "", ""]);
  const [confirmation, setConfirmation] = React.useState(null);
  const [sending, setSending] = React.useState(false);
  const [verifying, setVerifying] = React.useState(false);
  const [error, setError] = React.useState("");
  const [seconds, setSeconds] = React.useState(0);
  const inputsRef = React.useRef([]);

  const normalized = normalizePhoneIL(phone);
  const phoneValid = normalized !== null;

  React.useEffect(() => {
    if (phase === "code") inputsRef.current[0]?.focus();
  }, [phase]);
  React.useEffect(() => {
    if (seconds <= 0) return;
    const t = setTimeout(() => setSeconds(s => s - 1), 1000);
    return () => clearTimeout(t);
  }, [seconds]);

  const sendCode = async () => {
    if (!phoneValid || sending) return;
    setSending(true); setError("");
    try {
      if (!window.FB) throw new Error("חיבור Firebase לא הצליח. נסי לרענן.");
      const result = await fbSendSMS(normalized);
      setConfirmation(result);
      setPhase("code"); setSeconds(45);
      setCode(["", "", "", "", "", ""]);
    } catch (e) {
      console.error("[SMS send]", e);
      const msg = e?.code === "auth/invalid-phone-number" ? "מספר לא תקין" :
        e?.code === "auth/too-many-requests" ? "יותר מדי ניסיונות, נסי בעוד כמה דקות" :
        e?.code === "auth/captcha-check-failed" ? "אימות נכשל, רענני ונסי שוב" :
        e?.message || "שליחת SMS נכשלה";
      setError(msg);
      try { window._recaptcha?.clear(); } catch (_) {}
      _recaptcha = null;
    } finally { setSending(false); }
  };

  const verifyCode = async () => {
    const codeStr = code.join("");
    if (codeStr.length !== 6 || verifying || !confirmation) return;
    setVerifying(true); setError("");
    try {
      await confirmation.confirm(codeStr);
      onNext();
    } catch (e) {
      console.error("[SMS verify]", e);
      const msg = e?.code === "auth/invalid-verification-code" ? "הקוד לא נכון, נסי שוב" :
        e?.code === "auth/code-expired" ? "הקוד פג תוקף, בקשי קוד חדש" :
        e?.message || "אימות נכשל";
      setError(msg);
    } finally { setVerifying(false); }
  };

  const setDigit = (i, v) => {
    const clean = (v || "").replace(/[^0-9]/g, "");
    if (!clean) { const next = [...code]; next[i] = ""; setCode(next); return; }
    if (clean.length > 1) {
      const next = [...code];
      for (let k = 0; k < clean.length && i + k < 6; k++) next[i + k] = clean[k];
      setCode(next);
      inputsRef.current[Math.min(i + clean.length, 5)]?.focus(); return;
    }
    const next = [...code]; next[i] = clean; setCode(next);
    if (i < 5) inputsRef.current[i + 1]?.focus();
  };
  const onKey = (i, e) => {
    if (e.key === "Backspace") {
      if (code[i]) { const next = [...code]; next[i] = ""; setCode(next); }
      else if (i > 0) { inputsRef.current[i - 1]?.focus(); const n = [...code]; n[i-1]=""; setCode(n); }
      e.preventDefault();
    } else if (e.key === "ArrowLeft" && i < 5) inputsRef.current[i + 1]?.focus();
    else if (e.key === "ArrowRight" && i > 0) inputsRef.current[i - 1]?.focus();
  };
  const filled = code.every(c => c.length === 1);

  return (
    <>
      <StatusBar T={T}/>
      <div style={{ position: "absolute", inset: 0, padding: "48px 24px 28px", display: "flex", flexDirection: "column" }}>
        <TopBar T={T} onBack={phase === "code" ? () => setPhase("phone") : onBack}/>

        <div style={{ flex: 1, display: "flex", flexDirection: "column", justifyContent: "center" }}>
          <Eyebrow T={T}>אימות בטחוני</Eyebrow>
          <h1 style={{ fontSize: 30, fontWeight: 800, lineHeight: 1.15, margin: "12px 0 0", letterSpacing: -0.5 }}>
            {phase === "phone" ? <>אימות מספר<br/>הנייד שלכם.ן</> : <>הזיני את הקוד<br/>שקיבלת ב-SMS</>}
          </h1>
          <p style={{ fontSize: 15, lineHeight: 1.65, color: T.inkSoft, margin: "16px 0 0", maxWidth: 300, fontWeight: 500 }}>
            {phase === "phone" ? (
              <>הזיני את מספר הנייד שלך, נשלח אלייך קוד אימות ב-SMS.<br/>
                <span style={{ fontSize: 12, color: T.muted }}>(הקוד מבטיח שהאפליקציה לא מועברת למישהי אחרת.)</span>
              </>
            ) : (
              <>שלחנו קוד 6 ספרות ל-<b style={{ color: T.ink, direction: "ltr", display: "inline-block" }}>{normalized}</b>.<br/>
                <span style={{ fontSize: 12, color: T.muted }}>הקוד יגיע תוך מספר שניות.</span>
              </>
            )}
          </p>
        </div>

        {phase === "phone" ? (
          <div style={{ marginBottom: 14 }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: T.ink, marginBottom: 10 }}>מספר הנייד שלי</div>
            <input
              autoFocus
              value={phone}
              onChange={e => { setPhone(e.target.value); setError(""); }}
              placeholder="050-1234567"
              inputMode="tel"
              autoComplete="tel"
              style={{
                width: "100%", height: 56, borderRadius: 13,
                background: T.surfaceAlt,
                boxShadow: `inset 0 0 0 ${phoneValid ? 1.5 : 1}px ${phoneValid ? T.accent : T.line}`,
                border: "none", textAlign: "center",
                fontSize: 22, fontWeight: 700, color: T.ink,
                outline: "none", padding: 0, direction: "ltr",
                fontVariantNumeric: "tabular-nums",
              }}/>
            <div style={{ marginTop: 12, fontSize: 12.5, color: error ? T.accent : T.inkSoft, fontWeight: 500, minHeight: 18 }}>
              {error ? error : phoneValid ? `יישלח ל: ${normalized}` : "פורמט: 0501234567 או 050-123-4567"}
            </div>
          </div>
        ) : (
          <div style={{ marginBottom: 14 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
              <span style={{ fontSize: 13, fontWeight: 700, color: T.ink }}>קוד מ-SMS</span>
              <span style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 12.5, color: T.muted, fontWeight: 600 }}>
                <Icon name="lock" size={14} color={T.muted} w={1.5}/> 6 ספרות
              </span>
            </div>
            <div style={{ display: "flex", gap: 8, direction: "ltr" }}>
              {code.map((ch, i) => {
                const active = !error && (ch || (i === code.findIndex(c => !c)));
                return (
                  <input key={i}
                    ref={el => { inputsRef.current[i] = el; }}
                    value={ch}
                    onChange={e => setDigit(i, e.target.value)}
                    onKeyDown={e => onKey(i, e)}
                    onFocus={e => e.target.select()}
                    inputMode="numeric" autoComplete="one-time-code" pattern="[0-9]*"
                    style={{
                      flex: 1, width: 0, height: 56, borderRadius: 13,
                      background: error ? "#FDEDE9" : T.surfaceAlt,
                      boxShadow: error ? `inset 0 0 0 1.5px ${T.accent}` :
                                active ? `inset 0 0 0 1.5px ${T.accent}` :
                                `inset 0 0 0 1px ${T.line}`,
                      border: "none", textAlign: "center",
                      fontSize: 24, fontWeight: 700, color: T.ink,
                      outline: "none", padding: 0, direction: "ltr",
                      fontVariantNumeric: "tabular-nums",
                    }}/>
                );
              })}
            </div>
            <div style={{ marginTop: 12, fontSize: 12.5, color: error ? T.accent : T.inkSoft, fontWeight: 500, minHeight: 18 }}>
              {error || "מקבלות את הקוד? הזיני אותו פה."}
            </div>
          </div>
        )}

        {phase === "phone" ? (
          <Btn T={T} onClick={sendCode} disabled={!phoneValid || sending}>
            {sending ? "שולחת SMS..." : "שלחי לי קוד SMS"}
          </Btn>
        ) : (
          <Btn T={T} onClick={verifyCode} disabled={!filled || verifying}>
            {verifying ? "מאמתת..." : filled ? "אישור והמשך" : "ממתינות לקוד..."}
          </Btn>
        )}

        {phase === "code" && (
          <div style={{ textAlign: "center", marginTop: 14, fontSize: 13, color: T.inkSoft, fontWeight: 500 }}>
            {seconds > 0 ? (
              <>לא קיבלת? אפשר לשלוח שוב בעוד <b className="num" style={{ color: T.ink }}>{seconds}</b> שניות</>
            ) : (
              <span onClick={sendCode} style={{ color: T.accent, fontWeight: 700, cursor: "pointer", borderBottom: `1.5px solid ${T.accentSoft}` }}>שלחי לי קוד חדש</span>
            )}
          </div>
        )}
      </div>
      <HomeBar/>
    </>
  );
}

/* ──────────────────────────────────────────────────────────────
   MINI QR (refined modules)
   ────────────────────────────────────────────────────────────── */
function MiniQR({ size = 70, color = "#161616", bg = "#fff", radius = 10 }) {
  const N = 11;
  const seed = (x, y) => ((x * 37 + y * 19 + x * y * 7) % 13) > 6;
  const finder = (x, y) => (x < 3 && y < 3) || (x >= N - 3 && y < 3) || (x < 3 && y >= N - 3);
  const u = size / N, cells = [];
  for (let y = 0; y < N; y++) for (let x = 0; x < N; x++) {
    if (finder(x, y)) continue;
    if (seed(x, y)) cells.push({ x, y });
  }
  const F = ({ ox, oy }) => (
    <><rect x={ox * u} y={oy * u} width={3 * u} height={3 * u} rx={u * 0.7} fill={color}/>
      <rect x={(ox + 0.7) * u} y={(oy + 0.7) * u} width={1.6 * u} height={1.6 * u} rx={u * 0.4} fill={bg}/></>
  );
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ display: "block", borderRadius: radius }}>
      <rect width={size} height={size} fill={bg} rx={radius}/>
      {cells.map((c, i) => <rect key={i} x={c.x*u+u*0.12} y={c.y*u+u*0.12} width={u*0.76} height={u*0.76} rx={u*0.25} fill={color}/>)}
      <F ox={0} oy={0}/><F ox={N-3} oy={0}/><F ox={0} oy={N-3}/>
    </svg>
  );
}

/* ──────────────────────────────────────────────────────────────
   GROOM MODE — side entrance for the groom to answer the questionnaire
   ────────────────────────────────────────────────────────────── */
function ScreenGroomMode({ T, data, onSent }) {
  const questions = data?.q || [];
  const [answers, setAnswers] = React.useState(questions.map(() => ""));
  const [sent, setSent] = React.useState(false);

  const filledCount = answers.filter(a => a.trim()).length;
  const allFilled = filledCount === questions.length && questions.length > 0;
  const pct = questions.length ? Math.round((filledCount / questions.length) * 100) : 0;

  const update = (i, v) => setAnswers(answers.map((a, idx) => idx === i ? v : a));

  const submit = () => {
    if (!allFilled) return;
    const link = buildAnswersLink({
      a: answers.map(s => s.trim()),
      q: questions,
      bn: data.bn || "הכלה",
      en: data.en || "",
      gid: data.gid || "groomq",
    });
    const msg = `היי ${data.bn || ""}, ענייתי על הכל. הנה התשובות שלי 💍\n${link}`;
    setSent(true);
    openWhatsApp(msg);
  };

  if (!questions.length) {
    return (
      <>

        </div>
        <HomeBar/>
      </>
    );
  }

  return (
    <>
      <StatusBar T={T}/>
      <div style={{ position: "absolute", inset: 0, padding: "48px 22px 24px", display: "flex", flexDirection: "column" }}>
        {/* Brand mini-header */}
        <div style={{ display: "flex", alignItems: "center", gap: 10, paddingTop: 4 }}>
          <div style={{ width: 28, height: 28, borderRadius: 8, background: T.accent,
            display: "flex", alignItems: "center", justifyContent: "center" }}>
            <Icon name="sparkle" size={16} color={T.onAccent} w={1.6}/>
          </div>
          <div style={{ fontSize: 14, fontWeight: 800, letterSpacing: -0.2 }}>חוגגות · שאלון לחתן</div>
        </div>

        {/* Hero */}
        <div style={{ marginTop: 18 }}>
          <Eyebrow T={T}>{data.en || "מסיבת רווקות"}</Eyebrow>
          <h1 style={{ fontSize: 26, fontWeight: 800, margin: "10px 0 0", letterSpacing: -0.4, lineHeight: 1.15 }}>
            {data.bn ? `${data.bn} רוצה לדעת...` : "הכלה רוצה לדעת..."}
          </h1>
          <p style={{ fontSize: 14, lineHeight: 1.6, color: T.inkSoft, marginTop: 10, fontWeight: 500 }}>
            ענה על כל השאלות בקצרה (משפט-שניים) ולחץ "שלחי לכלה". התשובות יחזרו אליה אוטומטית.
          </p>
        </div>

        {/* Progress */}
        <div style={{ marginTop: 14, padding: "10px 14px", background: T.surfaceAlt, borderRadius: T.radius,
          display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <div className="num" style={{ fontSize: 13, fontWeight: 800, color: T.ink }}>
            {filledCount} / {questions.length} שאלות
          </div>
          <div className="num" style={{ fontSize: 13, fontWeight: 800, color: T.accent }}>{pct}%</div>
        </div>

        {/* Questions */}
        <div style={{ flex: 1, overflow: "auto", marginTop: 14, display: "flex", flexDirection: "column", gap: 14, paddingBottom: 8 }}>
          {questions.map((q, i) => (

function ScreenSlideshow({ T, slides, onDone, eventName }) {
  const scrollRef = React.useRef(null);
  const [idx, setIdx] = React.useState(0);
  const isLast = idx === slides.length - 1;

  const goTo = (newIdx) => {
    const clamped = Math.max(0, Math.min(slides.length - 1, newIdx));
    const w = scrollRef.current?.clientWidth || 0;
    scrollRef.current?.scrollTo({ left: clamped * w, behavior: "smooth" });
  };
  const onScroll = () => {
    const el = scrollRef.current; if (!el) return;
    const w = el.clientWidth; if (!w) return;
    const newIdx = Math.round(el.scrollLeft / w);
    if (newIdx !== idx) setIdx(newIdx);
  };

  return (
    <>
      <StatusBar T={T}/>
      <div style={{ position: "absolute", inset: 0, paddingTop: 48, paddingBottom: 28, display: "flex", flexDirection: "column" }}>
        {/* Header — skip on left, brand on right */}
        <div style={{ padding: "0 22px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <div style={{ width: 26, height: 26, borderRadius: 8, background: T.accent,
              display: "flex", alignItems: "center", justifyContent: "center" }}>
              <Icon name="sparkle" size={15} color={T.onAccent} w={1.6}/>
            </div>
            <div style={{ fontSize: 14, fontWeight: 800, letterSpacing: -0.2 }}>חוגגות</div>
          </div>
          <button onClick={onDone} style={{
            background: "transparent", border: "none",
            fontSize: 13, fontWeight: 600, color: T.inkSoft,
            cursor: "pointer", fontFamily: T.font, padding: "8px 4px",
          }}>דלגי</button>
        </div>

        {/* Slides scroller (LTR for predictable scroll math) */}
        <div ref={scrollRef} onScroll={onScroll} style={{
          flex: 1, overflowX: "auto", overflowY: "hidden",
          display: "flex", scrollSnapType: "x mandatory",
          scrollbarWidth: "none", direction: "ltr", WebkitOverflowScrolling: "touch",
        }}>
          {slides.map((s, i) => {
            const p = PB[s.pop || "pink"];
            const Mockup = s.Mockup;
            return (
              <div key={i} dir="rtl" style={{
                minWidth: "100%", scrollSnapAlign: "start",
                padding: "10px 20px 4px",
                display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "flex-start",
                textAlign: "center",
              }}>
                <div style={{ fontSize: 10.5, fontWeight: 700, letterSpacing: 1.8, textTransform: "uppercase", color: p.deep }}>
                  שלב {i + 1} / {slides.length}
                </div>
                <h1 style={{ fontSize: 22, fontWeight: 800, margin: "6px 0 14px", letterSpacing: -0.4, lineHeight: 1.15 }}>{s.title}</h1>
                {Mockup ? <Mockup T={T}/> : null}
                <p style={{ fontSize: 13.5, color: T.inkSoft, lineHeight: 1.55, fontWeight: 500, marginTop: 14, maxWidth: 280 }}>
                  {s.desc}
                </p>
              </div>
            );
          })}
        </div>

        {/* Dots */}
        <div style={{ display: "flex", justifyContent: "center", gap: 7, padding: "14px 0 12px" }}>
          {slides.map((_, i) => (
            <button key={i} onClick={() => goTo(i)} aria-label={`לשקופית ${i+1}`} style={{
              width: i === idx ? 28 : 8, height: 8,
              borderRadius: 4,
              background: i === idx ? T.accent : T.lineStrong,
              border: "none", padding: 0, cursor: "pointer",
              transition: "all 250ms",
            }}/>
          ))}
        </div>

        {/* CTA */}
        <div style={{ padding: "0 22px" }}>
          <Btn T={T} onClick={isLast ? onDone : () => goTo(idx + 1)}>
            {isLast ? `כניסה ל${eventName || "הרווקות של מאיה"}` : "הבא"}
          </Btn>
        </div>
      </div>
      <HomeBar/>
    </>
  );
}

const buildSeedItems = () => {
  const out = [];
  CHECKLIST_SECTIONS.forEach(sec => sec.items.forEach((t, idx) =>
    out.push({ id: `${sec.id}-${idx}`, section: sec.id, t, done: false, custom: false })));
  return out;
};

function ScreenChecklist({ T, onBack }) {
  const [items, setItems] = React.useState(buildSeedItems);
  const [adding, setAdding] = React.useState("");
  const [addingTo, setAddingTo] = React.useState(CHECKLIST_SECTIONS[0].id);

  const done = items.filter(i => i.done).length;
  const pct = Math.round((done / items.length) * 100);
  const toggle = id => setItems(items.map(i => i.id === id ? { ...i, done: !i.done } : i));
  const removeItem = id => setItems(items.filter(i => i.id !== id));
  const add = () => {
    if (!adding.trim()) return;
    setItems([...items, { id: `c-${Date.now()}`, section: addingTo, t: adding.trim(), done: false, custom: true }]);
    setAdding("");

          <input

            onKeyDown={e => e.key === "Enter" && add()}
            placeholder="להוסיף משימה..."
            style={{
              flex: 1, padding: "12px 14px", borderRadius: 12,
              border: T.border, background: T.surface,
              fontSize: 13.5, fontWeight: 500, fontFamily: T.font,
              color: T.ink, outline: "none", boxShadow: T.shadowSm, minWidth: 0,
            }}/>
          <button onClick={add} style={{
            width: 44, flexShrink: 0, borderRadius: 12, background: T.accent, color: T.onAccent,
            border: "none", cursor: "pointer",

      <HomeBar/>

const EXPENSE_CATS = ["לוקיישן", "אוכל", "אלכוהול", "עיצוב", "אטרקציה", "תוספות", "אחר"];

const SEED_EXPENSES = [
  { id: "e1", cat: "לוקיישן",  item: "וילה",        type: "fixed",    amount: 2500 },
  { id: "e2", cat: "אוכל",     item: "שולחן שוק",  type: "variable", amount: 1500 },
  { id: "e3", cat: "אלכוהול",  type: "variable", item: "יין ובירות", amount: 400 },
  { id: "e4", cat: "עיצוב",    item: "פיצ'יפקס",    type: "fixed",    amount: 300 },
  { id: "e5", cat: "אטרקציה",  item: "מפעילה",      type: "fixed",    amount: 1800 },
  { id: "e6", cat: "אחר",      item: 'בלת"מים',     type: "variable", amount: 150 },
];
const SEED_PARTICIPANTS = Array.from({ length: 12 }, (_, i) => ({
  id: `p${i+1}`, name: `חברה ${i+1}`, coming: true, paid: i < 5,
}));

function ScreenBudget({ T, onBack }) {
  const [tab, setTab] = React.useState("summary");
  const [expenses, setExpenses] = React.useState(SEED_EXPENSES);
  const [participants, setParticipants] = React.useState(SEED_PARTICIPANTS);
  const [newExp, setNewExp] = React.useState({ cat: EXPENSE_CATS[0], item: "", type: "fixed", amount: "" });
  const [newName, setNewName] = React.useState("");

  const total     = expenses.reduce((s, e) => s + (Number(e.amount) || 0), 0);
  const comingArr = participants.filter(p => p.coming);
  const comingN   = comingArr.length;
  const perPerson = comingN > 0 ? Math.round(total / comingN) : 0;
  const collected = comingArr.filter(p => p.paid).length * perPerson;
  const remaining = Math.max(total - collected, 0);

  const addExpense = () => {
    const amt = Number(newExp.amount); if (!newExp.item.trim() || !amt) return;
    setExpenses([...expenses, { id: `e-${Date.now()}`, cat: newExp.cat, item: newExp.item.trim(), type: newExp.type, amount: amt }]);
    setNewExp({ cat: EXPENSE_CATS[0], item: "", type: "fixed", amount: "" });
  };
  const removeExpense = id => setExpenses(expenses.filter(e => e.id !== id));
  const addParticipant = () => {
    if (!newName.trim()) return;
    setParticipants([...participants, { id: `p-${Date.now()}`, name: newName.trim(), coming: true, paid: false }]);
    setNewName("");
  };
  const togglePaid   = id => setParticipants(participants.map(p => p.id === id ? { ...p, paid: !p.paid } : p));
  const toggleComing = id => setParticipants(participants.map(p => p.id === id ? { ...p, coming: !p.coming, paid: p.coming ? false : p.paid } : p));
  const removeParticipant = id => setParticipants(participants.filter(p => p.id !== id));

  const TabBtn = ({ id, label }) => (
    <button onClick={() => setTab(id)} style={{
      flex: 1, textAlign: "center", padding: "9px 4px", borderRadius: 10,
      background: tab === id ? T.surface : "transparent",
      color: tab === id ? T.ink : T.inkSoft,
      fontSize: 13, fontWeight: 700, cursor: "pointer", fontFamily: T.font,
      boxShadow: tab === id ? T.shadowSm : "none",
      border: "none", transition: "all 150ms",
    }}>{label}</button>
  );

  return (
    <>
      <StatusBar T={T}/>
      <div style={{ position: "absolute", inset: 0, padding: "48px 20px 24px", display: "flex", flexDirection: "column" }}>
        <TopBar T={T} onBack={onBack} title="תקציב"/>

        {/* Hero summary */}
        <div style={{ background: T.surfaceInk, color: "#fff", borderRadius: T.radiusLg,
          padding: "18px 18px 16px", boxShadow: T.shadow, marginTop: 12, flexShrink: 0 }}>
          <div style={{ fontSize: 12.5, color: "rgba(255,255,255,0.6)", fontWeight: 600, letterSpacing: 0.3 }}>סך הוצאות</div>
          <div className="num" style={{ fontSize: 38, fontWeight: 800, marginTop: 2, letterSpacing: -0.5 }}>₪{total.toLocaleString()}</div>
          <div style={{ display: "flex", gap: 8, marginTop: 14 }}>
            <div style={{ flex: 1, borderRadius: T.radiusSm, padding: "9px 11px",
              background: "rgba(255,255,255,0.10)", border: "1px solid rgba(255,255,255,0.16)" }}>
              <div style={{ fontSize: 10.5, fontWeight: 600, opacity: 0.82 }}>חלוקה ל-{comingN}</div>
              <div className="num" style={{ fontSize: 17, fontWeight: 800, marginTop: 1 }}>₪{perPerson.toLocaleString()}</div>
            </div>
            <div style={{ flex: 1, borderRadius: T.radiusSm, padding: "9px 11px",
              background: PB.pink.main, color: "#1A1A1A" }}>
              <div style={{ fontSize: 10.5, fontWeight: 600, opacity: 0.82 }}>נאספו</div>
              <div className="num" style={{ fontSize: 17, fontWeight: 800, marginTop: 1 }}>₪{collected.toLocaleString()}</div>
            </div>
            <div style={{ flex: 1, borderRadius: T.radiusSm, padding: "9px 11px",
              background: PB.orange.main, color: "#fff" }}>
              <div style={{ fontSize: 10.5, fontWeight: 600, opacity: 0.82 }}>חסר</div>
              <div className="num" style={{ fontSize: 17, fontWeight: 800, marginTop: 1 }}>₪{remaining.toLocaleString()}</div>
            </div>
          </div>
        </div>

        {/* Tabs */}
        <div style={{ display: "flex", gap: 4, marginTop: 14, padding: 4,
          background: T.surfaceAlt, borderRadius: T.radius, flexShrink: 0 }}>
          <TabBtn id="summary" label="סיכום"/>
          <TabBtn id="expenses" label={`הוצאות (${expenses.length})`}/>
          <TabBtn id="people" label={`בנות (${comingN})`}/>
        </div>

        {/* Body */}
        <div style={{ flex: 1, overflow: "auto", marginTop: 14, display: "flex", flexDirection: "column", gap: 9 }}>
          {tab === "summary" && (
            <>
              <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between", marginBottom: 4 }}>
                <h3 style={{ fontSize: 14.5, fontWeight: 700, margin: 0, letterSpacing: -0.2 }}>פירוט לפי קטגוריה</h3>
                <span style={{ fontSize: 12, color: T.muted, fontWeight: 600 }}>
                  {EXPENSE_CATS.filter(c => expenses.some(e => e.cat === c)).length} קטגוריות
                </span>
              </div>
              {EXPENSE_CATS.map(c => {
                const sum = expenses.filter(e => e.cat === c).reduce((s, e) => s + e.amount, 0);
                if (!sum) return null;
                const pct = total ? Math.round((sum / total) * 100) : 0;
                return (
                  <div key={c}>
                    <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between", marginBottom: 6 }}>
                      <span style={{ fontSize: 13.5, fontWeight: 600, color: T.ink }}>{c}</span>
                      <span className="num" style={{ fontSize: 13, fontWeight: 700, color: T.ink }}>
                        ₪{sum.toLocaleString()} <span style={{ color: T.muted, fontWeight: 500, fontSize: 12 }}>· {pct}%</span>
                      </span>
                    </div>
                    <div style={{ height: 6, borderRadius: 999, background: T.surfaceAlt, overflow: "hidden" }}>
                      <div style={{ height: "100%", width: `${pct}%`, background: T.accent, borderRadius: 999, transition: "width 300ms" }}/>
                    </div>
                  </div>
                );
              })}
              <div style={{
                marginTop: 10, padding: "11px 14px", background: T.surfaceAlt, borderRadius: T.radius,
                fontSize: 12, lineHeight: 1.55, color: T.inkSoft, fontWeight: 500,
              }}>
                <div><b style={{ color: T.ink }}>הוצאה קבועה</b> — לא משתנה לפי כמות הבנות (וילה, אטרקציה).</div>
                <div style={{ marginTop: 3 }}><b style={{ color: T.ink }}>הוצאה משתנה</b> — עולה או יורדת לפי כמות הבנות (אוכל, אלכוהול).</div>
              </div>
              <div style={{ flex: 1, minHeight: 8 }}/>
              <Btn T={T} icon="send" onClick={() => alert("בקשת תשלום מהבנות (דמו)")}>בקשי השלמת תשלום</Btn>
            </>
          )}

          {tab === "expenses" && (

function TimerGame({ T: parentT, game, onBack }) {
  const T = { ...parentT, accent: PB[game.pop].main, onAccent: PB[game.pop].on, accentSoft: PB[game.pop].soft, accentDeep: PB[game.pop].deep };
  const deck = TIMER_DECKS[game.id];
  const totalRounds = deck.rounds || 2;
  const secsPerRound = deck.secondsPerRound || 120;
  const isImages = !!deck.images;

  const [phase, setPhase] = React.useState("intro");
  const [round, setRound] = React.useState(1);
  const [timeLeft, setTimeLeft] = React.useState(secsPerRound);
  const [idx, setIdx] = React.useState(0);
  const [got, setGot] = React.useState(0);
  const [skipped, setSkipped] = React.useState(0);
  const [roundScores, setRoundScores] = React.useState([]);
  const [usedIdx, setUsedIdx] = React.useState([]);
  const [projecting, setProjecting] = React.useState(false);
  const order = React.useRef([]);

  const startRound = (roundNum, fresh = false) => {
    const used = fresh ? [] : usedIdx;
    const all = deck.prompts.map((_, i) => i);
    let available = all.filter(i => !used.includes(i));
    if (available.length === 0) available = all;
    order.current = available.sort(() => Math.random() - 0.5);
    setRound(roundNum); setTimeLeft(secsPerRound);
    setIdx(0); setGot(0); setSkipped(0);
    if (fresh) { setUsedIdx([]); setRoundScores([]); }
    setPhase("play");
  };

  React.useEffect(() => {
    if (phase !== "play") return;
    if (timeLeft <= 0) {
      const usedThisRound = order.current.slice(0, idx);
      setUsedIdx(prev => [...prev, ...usedThisRound]);
      setRoundScores(prev => [...prev, { got, skipped }]);
      setPhase("roundEnd"); // always — user decides whether to continue or finish
      return;
    }
    const t = setTimeout(() => setTimeLeft(s => s - 1), 1000);
    return () => clearTimeout(t);
  }, [phase, timeLeft]);

  const currentI = order.current[idx % (order.current.length || 1)];
  const prompt = deck.prompts[currentI];
  const isImagePrompt = isImages && prompt && typeof prompt === "object";
  const mins = Math.floor(timeLeft / 60);
  const secs = String(timeLeft % 60).padStart(2, "0");
  const danger = timeLeft <= 20;
  const correct = () => { setGot(g => g + 1); setIdx(i => i + 1); };
  const skip = () => { setSkipped(s => s + 1); setIdx(i => i + 1); };

  if (phase === "intro")
    return <GameIntro T={T} game={game} rules={deck.rules} onBack={onBack}
      onStart={() => startRound(1, true)} startLabel="התחילו סבב 1"/>;

  if (phase === "roundEnd") {
    return (
      <>
        <StatusBar T={T}/>
        <div style={{ position: "absolute", inset: 0, padding: "48px 22px 24px", display: "flex", flexDirection: "column" }}>
          <TopBar T={T} onBack={onBack} title={game.t}/>
          <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", textAlign: "center" }}>
            <Eyebrow T={T}>סבב {round}</Eyebrow>
            <h1 style={{ fontSize: 28, fontWeight: 800, margin: "10px 0 6px", letterSpacing: -0.5 }}>נגמר הסבב</h1>
            <p style={{ fontSize: 14, color: T.inkSoft, fontWeight: 500, margin: "0 0 20px" }}>זמן להחליף זוג ולהמשיך, או לעצור פה.</p>
            <Card T={T} padding={22} style={{ width: "100%", textAlign: "center" }}>
              <div style={{ fontSize: 12.5, fontWeight: 700, color: T.inkSoft, letterSpacing: 0.3, textTransform: "uppercase" }}>צברתן</div>
              <div className="num" style={{ fontSize: 60, fontWeight: 800, color: T.accent, lineHeight: 1, letterSpacing: -1, marginTop: 8 }}>{got}</div>
              <div style={{ fontSize: 14, fontWeight: 700, color: T.ink, marginTop: 6 }}>ניחושים נכונים בסבב הזה</div>
              <div style={{ fontSize: 12, color: T.muted, marginTop: 4 }}>דילוגים: {skipped}</div>
            </Card>
            <p style={{ fontSize: 13, color: T.inkSoft, fontWeight: 500, marginTop: 18, lineHeight: 1.5, maxWidth: 280 }}>
              בנק המילים מתחדש — לא חוזרות על מה שהיה.
            </p>
          </div>
          <Btn T={T} onClick={() => startRound(round + 1)}>התחילו סבב {round + 1}</Btn>
          <Btn T={T} variant="quiet" onClick={() => setPhase("done")} style={{ marginTop: 10 }}>סיימו משחק</Btn>
        </div>
        <HomeBar/>
      </>
    );
  }

  if (phase === "done") {
    const max = roundScores.length ? Math.max(...roundScores.map(r => r.got)) : 0;
    const winningRounds = roundScores.map((r, i) => r.got === max ? i + 1 : null).filter(Boolean);
    return (
      <>
        <StatusBar T={T}/>
        <div style={{ position: "absolute", inset: 0, padding: "48px 22px 24px", display: "flex", flexDirection: "column" }}>
          <TopBar T={T} onBack={onBack} title={game.t}/>
          <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "flex-start", textAlign: "center", overflow: "auto", paddingTop: 12 }}>
            <h1 style={{ fontSize: 28, fontWeight: 800, margin: "0 0 6px", letterSpacing: -0.5 }}>סיכום המשחק</h1>
            <p style={{ fontSize: 14, color: T.inkSoft, fontWeight: 500, margin: "0 0 18px" }}>{roundScores.length} סבבים שיחקתן</p>
            <div style={{ display: "flex", flexDirection: "column", gap: 8, width: "100%" }}>
              {roundScores.map((r, i) => {
                const isWin = r.got === max && max > 0;
                return (
                  <Card key={i} T={T} padding={14} style={{ display: "flex", alignItems: "center", gap: 12,
                    background: isWin ? T.accentSoft : T.surface,
                    border: isWin ? `1.5px solid ${T.accent}` : T.border, textAlign: "right" }}>
                    <div style={{ width: 40, height: 40, borderRadius: 10, flexShrink: 0,
                      background: isWin ? T.accent : T.surfaceAlt,
                      color: isWin ? T.onAccent : T.inkSoft,
                      display: "flex", alignItems: "center", justifyContent: "center",
                      fontSize: 13, fontWeight: 800 }} className="num">{i + 1}</div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 13.5, fontWeight: 800, color: T.ink }}>סבב {i + 1}</div>
                      <div style={{ fontSize: 11.5, color: T.inkSoft, fontWeight: 600 }}>דילוגים: {r.skipped}</div>
                    </div>
                    <div className="num" style={{ fontSize: 28, fontWeight: 800, color: isWin ? T.accent : T.ink, letterSpacing: -0.5 }}>{r.got}</div>
                    {isWin && <div style={{ padding: "3px 10px",
                      background: T.accent, color: T.onAccent, borderRadius: 999, fontSize: 10, fontWeight: 800 }}>הכי</div>}
                  </Card>
                );
              })}
            </div>
            <div style={{ marginTop: 18, padding: "10px 18px", background: T.surfaceAlt, borderRadius: T.radius,
              fontSize: 14, fontWeight: 800, color: T.ink }}>
              {winningRounds.length > 1 ? `תיקו בסבבים ${winningRounds.join(", ")} 🤝` :
               winningRounds.length === 1 ? `הזוג של סבב ${winningRounds[0]} ניצח 🎉` : "אין מנצח עדיין"}
            </div>
          </div>
          <Btn T={T} onClick={() => startRound(1, true)} style={{ marginTop: 12 }}>שחקו עוד</Btn>
          <button onClick={onBack} style={{ marginTop: 10, background: "transparent", border: "none", fontSize: 13, fontWeight: 600, color: T.inkSoft, cursor: "pointer" }}>לרשימת המשחקים</button>
        </div>
        <HomeBar/>
      </>
    );
  }

  // Card color rotation — orange / pink / deep rose / ink
  const cardCycle = [
    { bg: "#E8512A", fg: "#fff" },     // orange
    { bg: "#EAA0BA", fg: "#1A1A1A" },  // soft pink
    { bg: "#C75E82", fg: "#fff" },     // deep rose
    { bg: "#1A1A1A", fg: "#fff" },     // ink
  ];
  const cc = cardCycle[idx % cardCycle.length];

  const playBody = () => (
    <>
      {/* Top row: timer + round + score */}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8, flexWrap: "wrap" }}>
        <div style={{
          background: danger ? T.accent : T.surfaceInk,
          color: "#fff", border: `1px solid ${danger ? T.accent : T.surfaceInk}`,
          borderRadius: 999, padding: "10px 22px",
          fontSize: 30, fontWeight: 800, letterSpacing: 1.5,
          animation: danger ? "pulse 0.7s ease-in-out infinite" : "none",
        }} className="num">{mins}:{secs}</div>
        <div style={{
          background: T.surfaceAlt, color: T.ink, border: T.border,
          borderRadius: 999, padding: "7px 12px",
          fontSize: 12, fontWeight: 800, letterSpacing: 0.4,
        }}>סבב {round}</div>
      </div>

      <div style={{ display: "flex", justifyContent: "center", gap: 8, marginTop: 10 }}>
        <span style={{ fontSize: 12, fontWeight: 700, background: T.ok, color: "#fff",
          borderRadius: 999, padding: "5px 12px",
          display: "inline-flex", alignItems: "center", gap: 6 }}>✓ {got} נכון</span>
        <span style={{ fontSize: 12, fontWeight: 700, background: T.surfaceAlt, color: T.inkSoft, border: T.border,
          borderRadius: 999, padding: "5px 11px" }}>{deck.label}</span>
      </div>

      <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "12px 0", minHeight: 0 }}>
        <div key={idx} style={{
          width: "100%",
          background: cc.bg,
          color: cc.fg,
          border: "none",
          borderRadius: 22,
          boxShadow: "0 12px 28px -10px rgba(20,18,16,0.35)",
          padding: isImagePrompt ? 0 : "32px 22px",
          overflow: "hidden",
          textAlign: "center",
          animation: "cardIn 280ms cubic-bezier(.18,.89,.43,1.19)",
          display: "flex", flexDirection: "column", alignItems: "stretch", justifyContent: "center",
          minHeight: 240,
        }}>
          {isImagePrompt ? (
            <>
              <div style={{ position: "relative", width: "100%", height: 240,
                background: "rgba(0,0,0,0.15)", overflow: "hidden",
                display: "flex", alignItems: "center", justifyContent: "center" }}>
                <img
                  src={`https://loremflickr.com/600/600/${encodeURIComponent(prompt.en)}?lock=${currentI + 1}`}
                  alt={prompt.he}
                  style={{ width: "100%", height: "100%", objectFit: "cover", display: "block" }}
                  onError={(e) => {
                    e.target.style.display = "none";
                    const fallback = e.target.parentElement.querySelector("[data-fallback]");
                    if (fallback) fallback.style.display = "flex";
                  }}
                />
                <div data-fallback style={{
                  display: "none", position: "absolute", inset: 0,
                  alignItems: "center", justifyContent: "center",
                  fontSize: 24, fontWeight: 800, color: cc.fg, padding: 24, textAlign: "center",
                }}>{prompt.he}</div>
              </div>
              <div style={{
                padding: "14px 16px",
                fontSize: 22, fontWeight: 800, color: cc.fg,
                background: "rgba(0,0,0,0.18)",
                textAlign: "center", letterSpacing: -0.3,
              }}>{prompt.he}</div>
            </>
          ) : (
            <div style={{
              fontSize: 32,
              fontWeight: 800, lineHeight: 1.15,
              color: cc.fg, textWrap: "balance", letterSpacing: -0.6,
            }}>{prompt}</div>
          )}
        </div>
      </div>

      <div style={{ display: "flex", gap: 10, justifyContent: "center" }}>
        <button onClick={skip} style={{
          flex: 1, padding: "15px",
          background: T.surface, color: T.ink, border: T.border,

function QuizGame({ T: parentT, game, onBack }) {
  const T = { ...parentT, accent: PB[game.pop].main, onAccent: PB[game.pop].on, accentSoft: PB[game.pop].soft, accentDeep: PB[game.pop].deep };
  const deck = QUIZ_DECKS[game.id];
  const questions = deck.questions || [];
  const total = questions.length;
  const timerSec = deck.secondsPerQ || 10;

  // Pool of girls who joined (extracted from mock data — in real life from QR scan)
  const participants = React.useMemo(() => {
    const list = (deck.mockAnswers?.[0] || []).map(a => a.n);
    return list.length ? list : ["ליהי", "שירה", "תמר"];
  }, [deck]);

  const [phase, setPhase] = React.useState("intro"); // intro | play | timeUp | revealed | done
  const [qi, setQi] = React.useState(0);
  const [timeLeft, setTimeLeft] = React.useState(timerSec);
  const [answered, setAnswered] = React.useState([]); // names of participants who answered

  // Effect 1: timer countdown
  React.useEffect(() => {
    if (phase !== "play") return;
    if (timeLeft <= 0) { setPhase("timeUp"); return; }
    const t = setTimeout(() => setTimeLeft(s => s - 1), 1000);
    return () => clearTimeout(t);
  }, [phase, timeLeft]);

  // Effect 2: simulate participants gradually answering (random intervals)
  React.useEffect(() => {
    if (phase !== "play") return;
    if (answered.length >= participants.length) {
      // All answered — trigger overlay early
      const t = setTimeout(() => setPhase("timeUp"), 700);
      return () => clearTimeout(t);
    }
    // Schedule the next "answer" — 2-7 seconds from now
    const delay = 2000 + Math.random() * 5000;
    const t = setTimeout(() => {
      const remaining = participants.filter(p => !answered.includes(p));
      if (remaining.length > 0) {
        const next = remaining[Math.floor(Math.random() * remaining.length)];
        setAnswered(a => a.includes(next) ? a : [...a, next]);
      }
    }, delay);
    return () => clearTimeout(t);
  }, [phase, answered.length, participants.length]);

  const startQ = (idx) => { setQi(idx); setTimeLeft(timerSec); setAnswered([]); setPhase("play"); };
  const nextQ = () => { if (qi + 1 >= total) { setPhase("done"); return; } startQ(qi + 1); };
  const restart = () => { setQi(0); setAnswered([]); setPhase("intro"); };

  const question = questions[qi];
  const mockAnswers = deck.mockAnswers?.[qi] || [];
  const danger = timeLeft <= 3 && phase === "play";

  if (phase === "intro") {
    const introExtras = (
      <Card T={T} padding={"13px 14px"} style={{ marginTop: 14, background: T.surfaceAlt, border: `1px dashed ${T.lineStrong}` }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <div style={{ width: 40, height: 40, borderRadius: 11, background: T.accent, color: T.onAccent,
            display: "flex", alignItems: "center", justifyContent: "center" }}>
            <Icon name="qr" size={20} color={T.onAccent} w={1.6}/>
          </div>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 13.5, fontWeight: 800, color: T.ink }}>הצטרפות הבנות לחידון</div>
            <div style={{ fontSize: 11.5, color: T.inkSoft, fontWeight: 600, marginTop: 1 }}>
              סורקות QR מהמכשיר, רואות את השאלה ועונות.
            </div>
          </div>
          <button onClick={() => alert("פתיחת סריקה (דמו)")} style={{
            padding: "8px 12px", background: T.accent, color: T.onAccent,
            border: "none", borderRadius: T.radius,
            fontSize: 12.5, fontWeight: 800, cursor: "pointer", fontFamily: T.font,
          }}>QR</button>
        </div>
      </Card>
    );
    return <GameIntro T={T} game={game} rules={deck.rules} onBack={onBack}
      onStart={() => startQ(0)} startLabel="מתחילות חידון" extras={introExtras}/>;
  }

  if (phase === "done") {
    return (
      <>
        <StatusBar T={T}/>
        <div style={{ position: "absolute", inset: 0, padding: "48px 22px 24px", display: "flex", flexDirection: "column" }}>

              <div style={{ fontSize: 14, fontWeight: 700, color: T.ink, marginTop: 6 }}>שאלות הושלמו</div>
            </Card>

  const quizBody = (big) => (

          <div style={{
            fontSize: big ? "clamp(34px,5vw,72px)" : 24, fontWeight: 800,
            color: "#fff", lineHeight: 1.25, letterSpacing: -0.4, maxWidth: big ? "70%" : "100%",
          }}>כלתינו, זה הרגע שלך לענות!</div>
          <div style={{
            fontSize: big ? "clamp(14px,1.6vw,22px)" : 13, fontWeight: 500,

function CardGame({ T: parentT, game, onBack }) {
  const T = { ...parentT, accent: PB[game.pop].main, onAccent: PB[game.pop].on, accentSoft: PB[game.pop].soft, accentDeep: PB[game.pop].deep };
  const deck = CARD_DECKS[game.id];
  const [phase, setPhase] = React.useState("intro");
  const [i, setI] = React.useState(0);
  const [projecting, setProjecting] = React.useState(false);
  const [revealed, setRevealed] = React.useState({});
  const [groomData, setGroomData] = React.useState(loadGroomAnswers);
  const [groomMarks, setGroomMarks] = React.useState({});
  const [groomSummary, setGroomSummary] = React.useState(false);
  const [fmkChoices, setFmkChoices] = React.useState({}); // { cardIdx: { 0: 'F', 1: 'M', 2: 'K' } }

  const currentFmk = fmkChoices[i] || {};
  const assignFmk = (nameIdx, letter) => {
    const next = { ...currentFmk };
    // Remove this letter from any other name (each letter used once)
    Object.keys(next).forEach(k => { if (next[k] === letter) delete next[k]; });
    // Toggle: clicking the same again clears
    if (currentFmk[nameIdx] === letter) delete next[nameIdx];
    else next[nameIdx] = letter;
    setFmkChoices({ ...fmkChoices, [i]: next });
  };
  const fmkAllAssigned = Object.keys(currentFmk).length === 3;

  const total = deck.prompts.length;
  const prompt = deck.prompts[i];
  const next = () => setI(x => Math.min(x + 1, total - 1));
  const prev = () => setI(x => Math.max(x - 1, 0));
  const atStart = i === 0, atEnd = i === total - 1;
  const isNhie = game.id === "nhie";
  const isGroomq = game.id === "groomq";
  const isFmk = game.id === "fmk";
  const isMultiOption = Array.isArray(prompt);

  // Groom answer lookup — only meaningful for groomq game
  const groomAnswerForPrompt = (() => {
    if (!isGroomq || !groomData?.a) return null;
    // match by question text (since order may differ if questions were edited)
    const qList = groomData.q || [];
    const idx = qList.indexOf(prompt);
    if (idx >= 0) return groomData.a[idx];
    // fallback to positional match
    return groomData.a[i] || null;
  })();

  const sendToGroom = () => {
    const link = buildGroomLink({
      q: deck.prompts,
      bn: window.localStorage.getItem("chogegot_state") ? (JSON.parse(localStorage.getItem("chogegot_state"))?.name || "הכלה") : "הכלה",
      en: window.localStorage.getItem("chogegot_state") ? (JSON.parse(localStorage.getItem("chogegot_state"))?.eventName || "") : "",

    openWhatsApp(msg);

              {groomData.a.length} תשובות · במשחק תוכלי לחשוף כל אחת
